<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw RPG 控制室（中古歐風）</title>
  <style>
    :root{--ink:#2b1f15;--line:#8a6b4f;--soft:#eadac4;--panel:#f7efe2;--tile1:#6f553f;--tile2:#5f4735}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:linear-gradient(180deg,#3a2b1e,#2a1f17);color:#f4e7d3}

    .top{position:sticky;top:0;z-index:10;background:#2a1f17dd;backdrop-filter:blur(6px);border-bottom:1px solid #6f553f;padding:10px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .top h1{margin:0;font-size:18px}
    .pill{padding:4px 10px;border:1px solid #8a6b4f;border-radius:999px;font-size:12px;background:#3a2b1e;color:#f7e9d4}
    .btn{border:1px solid #8a6b4f;background:#4a3728;color:#f7e9d4;padding:7px 10px;border-radius:10px;cursor:pointer}

    .wrap{max-width:1240px;margin:0 auto;padding:14px}
    .map-wrap{overflow:auto;border:1px solid #8a6b4f;border-radius:16px;background:#2d2118}

    .map{position:relative;min-width:1060px;height:690px;
      background:
      linear-gradient(90deg,#604833 0 8px,#6f553f 8px 16px,#5a4432 16px 24px) 0 0/24px 24px,
      linear-gradient(#4b3a2c,#4b3a2c) 0 0/100% 100%;
    }

    .room{position:absolute;background:var(--panel);border:4px solid var(--line);box-shadow:0 8px 0 #3c2d21;cursor:pointer;clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0 calc(100% - 8px),0 8px)}
    .room h3{margin:0;font-size:14px;padding:10px 12px;border-bottom:2px dashed #d0b693;background:#eddcc4}
    .room .mini{padding:8px 12px;font-size:12px;color:#6f553f}
    .room.active{border-color:#b88b58;box-shadow:0 0 0 4px #f1dfc9,0 8px 0 #3c2d21}

    #room-idle{left:36px;top:36px;width:305px;height:250px}
    #room-work{left:382px;top:36px;width:305px;height:250px}
    #room-search{left:728px;top:36px;width:300px;height:250px}
    #room-code{left:170px;top:332px;width:345px;height:255px}
    #room-schedule{left:548px;top:332px;width:380px;height:255px}

    /* pixel furniture */
    .px{position:absolute;image-rendering:pixelated;pointer-events:none}
    .tv{left:102px;top:116px;width:110px;height:72px;background:#7a2f1f;border:4px solid #4a1e14;box-shadow:0 0 0 4px #ffb36a inset}
    .tv::after{content:'FIRE';position:absolute;right:7px;top:5px;color:#ffe08a;font-size:10px;font-weight:700}
    .sofa{left:138px;top:200px;width:148px;height:52px;background:#6b2431;border:4px solid #3e151d;box-shadow:0 -10px 0 #8e3344 inset}

    .desk{left:464px;top:188px;width:150px;height:60px;background:#7d5a3a;border:4px solid #4f3824}
    .kb{left:498px;top:226px;width:82px;height:18px;background:#d8c7aa;border:3px solid #9b8262}
    .monitor{left:500px;top:136px;width:92px;height:54px;background:#2f241a;border:4px solid #7a5a3a}

    .cab{left:778px;top:112px;width:66px;height:150px;background:#7a5b3f;border:4px solid #4b3828}
    .doc{width:46px;height:28px;background:#f4e8d5;border:3px solid #b79b78}
    .d1{left:856px;top:130px}.d2{left:882px;top:170px}.d3{left:848px;top:212px}

    .codepanel{left:246px;top:398px;width:128px;height:84px;background:#3a2b1f;border:4px solid #6b4f37}
    .line{position:absolute;height:6px;background:#d2b48c;border-radius:2px}
    .l1{left:262px;top:424px;width:78px}.l2{left:262px;top:442px;width:96px}.l3{left:262px;top:460px;width:64px}

    .board{left:646px;top:392px;width:196px;height:130px;background:#efe3d0;border:4px solid #8b6a47}
    .dot{width:12px;height:12px;border-radius:2px;background:#8b6a47}
    .t1{left:666px;top:418px}.t2{left:666px;top:446px}.t3{left:666px;top:474px}

    .lobster{position:absolute;left:132px;top:156px;width:74px;height:74px;border:4px solid #c77f54;background:#f2c6a0;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:38px;z-index:8;transition:left .85s cubic-bezier(.18,.7,.2,1), top .85s cubic-bezier(.18,.7,.2,1)}
    .lobster.walking{animation:hop .24s linear infinite}
    @keyframes hop{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}

    .door{position:absolute;width:26px;height:18px;background:#9f7b55;border:2px solid #6d4f34;border-radius:4px;pointer-events:none}
    .door.d1{left:352px;top:150px}.door.d2{left:700px;top:150px}.door.d3{left:536px;top:312px}

    .legend{position:absolute;right:14px;bottom:14px;background:#3a2b1e;border:1px solid #8a6b4f;border-radius:12px;padding:8px 10px;font-size:12px;color:#f4e7d3}

    dialog{border:none;border-radius:14px;max-width:560px;width:min(92vw,560px);padding:0}
    dialog::backdrop{background:#0008}
    .modal{padding:14px}
    .modal h3{margin:0 0 6px}
    .muted{color:#5f6e92;font-size:13px;line-height:1.6}
  </style>
</head>
<body>
  <div class="top">
    <h1>🦞 OpenClaw RPG 控制室</h1>
    <span class="pill" id="statePill">目前：待機室</span>
    <span class="pill" id="syncPill">同步：-</span>
    <button class="btn" onclick="toggleAuto()" id="autoBtn">開啟自動巡房</button>
    <button class="btn" onclick="go('idle')">待機室</button>
    <button class="btn" onclick="go('work')">工作室</button>
    <button class="btn" onclick="go('search')">搜尋室</button>
    <button class="btn" onclick="go('code')">開發室</button>
    <button class="btn" onclick="go('schedule')">排程室</button>
  </div>

  <div class="wrap">
    <div class="map-wrap">
      <div class="map">
        <div class="room" id="room-idle" onclick="go('idle')"><h3>待機室</h3><div class="mini">壁爐長椅區，監看通知</div></div>
        <div class="room" id="room-work" onclick="go('work')"><h3>工作室</h3><div class="mini">橡木書桌，處理任務</div></div>
        <div class="room" id="room-search" onclick="go('search')"><h3>搜尋室</h3><div class="mini">資料櫃 + 羊皮卷，查資料</div></div>
        <div class="room" id="room-code" onclick="go('code')"><h3>開發室</h3><div class="mini">工坊桌，修 bug / 寫 code</div></div>
        <div class="room" id="room-schedule" onclick="go('schedule')"><h3>排程室</h3><div class="mini">告示板待辦，規劃時程</div></div>

        <div class="px tv"></div><div class="px sofa"></div>
        <div class="px desk"></div><div class="px kb"></div><div class="px monitor"></div>
        <div class="px cab"></div><div class="px doc d1"></div><div class="px doc d2"></div><div class="px doc d3"></div>
        <div class="px codepanel"></div><div class="px line l1"></div><div class="px line l2"></div><div class="px line l3"></div>
        <div class="px board"></div><div class="px dot t1"></div><div class="px dot t2"></div><div class="px dot t3"></div>

        <div class="door d1"></div><div class="door d2"></div><div class="door d3"></div>

        <div class="lobster" id="lobster" onclick="showDetail(currentRoom)">🦞</div>
        <div class="legend">中古歐風家具已啟用｜點房間讓龍蝦跳步移動</div>
      </div>
    </div>
  </div>

  <dialog id="detail"><div class="modal"><h3 id="dTitle">詳情</h3><p id="dBody" class="muted">-</p><button class="btn" onclick="detail.close()">關閉</button></div></dialog>

  <script>
    const roomMeta = {
      idle:{name:'待機室', x:132, y:158, detail:'目前在待機室，監看通知與新任務。'},
      work:{name:'工作室', x:470, y:158, detail:'目前在工作室，處理你交辦的任務。'},
      search:{name:'搜尋室', x:800, y:158, detail:'目前在搜尋室，查找資料與驗證設定。'},
      code:{name:'開發室', x:300, y:455, detail:'目前在開發室，寫 code / 測試 / 修 bug。'},
      schedule:{name:'排程室', x:700, y:455, detail:'目前在排程室，整理待辦與時程。'}
    };

    let currentRoom='idle', autoTimer=null;

    function markRoom(){
      document.querySelectorAll('.room').forEach(el=>el.classList.remove('active'));
      document.getElementById('room-'+currentRoom).classList.add('active');
      statePill.textContent=`目前：${roomMeta[currentRoom].name}`;
      syncPill.textContent=`同步：${new Date().toLocaleTimeString()}`;
    }

    function go(key){
      const r=roomMeta[key]; if(!r) return;
      currentRoom=key;
      lobster.classList.add('walking');
      lobster.style.left=r.x+'px';
      lobster.style.top=r.y+'px';
      markRoom();
      setTimeout(()=>lobster.classList.remove('walking'),900);
    }

    function showDetail(key){
      const r=roomMeta[key]||roomMeta.idle;
      dTitle.textContent=`${r.name}｜目前狀態`;
      dBody.textContent=r.detail;
      detail.showModal();
    }

    function toggleAuto(){
      if(autoTimer){ clearInterval(autoTimer); autoTimer=null; autoBtn.textContent='開啟自動巡房'; return; }
      const seq=['idle','work','search','code','schedule'];
      autoTimer=setInterval(()=>{ go(seq[(seq.indexOf(currentRoom)+1)%seq.length]); },3800);
      autoBtn.textContent='停止自動巡房';
    }

    markRoom();
  </script>
</body>
</html>
