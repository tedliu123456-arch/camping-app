<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw RPG 控制室</title>
  <style>
    :root{--line:#dbe5ff;--txt:#1f2a44;--muted:#617099}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:linear-gradient(180deg,#eef5ff,#f9fcff);color:var(--txt)}
    .top{position:sticky;top:0;z-index:10;background:#ffffffdd;backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .top h1{margin:0;font-size:18px}
    .pill{padding:4px 10px;border:1px solid var(--line);border-radius:999px;font-size:12px;background:#fff}
    .btn{border:1px solid var(--line);background:#fff;padding:7px 10px;border-radius:10px;cursor:pointer}
    .wrap{max-width:1220px;margin:0 auto;padding:14px}

    .map-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}
    .map{position:relative;min-width:980px;height:640px;background:linear-gradient(180deg,#f4f9ff,#ecf3ff)}

    .room{position:absolute;border:3px solid #b7cdf5;border-radius:18px;background:#ffffff;box-shadow:0 8px 18px #dfeaff;cursor:pointer}
    .room h3{margin:0;font-size:14px;padding:10px 12px;border-bottom:1px solid #e5eeff;background:#f7fbff;border-radius:14px 14px 0 0}
    .room .mini{padding:10px 12px;font-size:12px;color:var(--muted)}
    .room.active{border-color:#5b8cff;box-shadow:0 0 0 4px #dfe9ff,0 8px 18px #dfeaff}

    #room-idle{left:40px;top:40px;width:280px;height:220px}
    #room-work{left:360px;top:40px;width:280px;height:220px}
    #room-search{left:680px;top:40px;width:260px;height:220px}
    #room-code{left:200px;top:300px;width:300px;height:230px}
    #room-schedule{left:560px;top:300px;width:320px;height:230px}

    .lobster{position:absolute;left:120px;top:140px;width:72px;height:72px;border-radius:22px;background:#ffe5ec;border:3px solid #ffb3c6;display:flex;align-items:center;justify-content:center;font-size:40px;z-index:8;transition:left .8s ease, top .8s ease}
    .lobster.walking{animation:hop .28s linear infinite}
    .lobster .face{transform:translateY(-1px)}

    @keyframes hop{
      0%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
      100%{transform:translateY(0)}
    }

    .legend{position:absolute;right:14px;bottom:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 10px;font-size:12px;color:var(--muted)}

    dialog{border:none;border-radius:14px;max-width:560px;width:min(92vw,560px);padding:0}
    dialog::backdrop{background:#0008}
    .modal{padding:14px}
    .modal h3{margin:0 0 6px}
    .muted{color:var(--muted);font-size:13px;line-height:1.6}
  </style>
</head>
<body>
  <div class="top">
    <h1>🦞 OpenClaw RPG 控制室</h1>
    <span class="pill" id="statePill">目前：待機室</span>
    <span class="pill" id="syncPill">同步：-</span>
    <button class="btn" onclick="toggleAuto()" id="autoBtn">開啟自動巡房</button>
    <button class="btn" onclick="go('idle')">去待機室</button>
    <button class="btn" onclick="go('work')">去工作室</button>
    <button class="btn" onclick="go('search')">去搜尋室</button>
    <button class="btn" onclick="go('code')">去開發室</button>
    <button class="btn" onclick="go('schedule')">去排程室</button>
  </div>

  <div class="wrap">
    <div class="map-wrap">
      <div class="map" id="map">
        <div class="room" id="room-idle" onclick="go('idle')">
          <h3>待機室</h3>
          <div class="mini">休息、監看、等待新任務</div>
        </div>
        <div class="room" id="room-work" onclick="go('work')">
          <h3>工作室</h3>
          <div class="mini">處理你交辦的即時任務</div>
        </div>
        <div class="room" id="room-search" onclick="go('search')">
          <h3>搜尋室</h3>
          <div class="mini">查資料、驗證設定、找原因</div>
        </div>
        <div class="room" id="room-code" onclick="go('code')">
          <h3>開發室</h3>
          <div class="mini">寫 code、修 bug、測試與部署</div>
        </div>
        <div class="room" id="room-schedule" onclick="go('schedule')">
          <h3>排程室</h3>
          <div class="mini">整理待辦、規劃下一步、版本節點</div>
        </div>

        <div class="lobster" id="lobster" onclick="showDetail(currentRoom)">
          <span class="face">🦞</span>
        </div>

        <div class="legend">點房間讓龍蝦走過去（小跳步）</div>
      </div>
    </div>
  </div>

  <dialog id="detail">
    <div class="modal">
      <h3 id="dTitle">詳情</h3>
      <p id="dBody" class="muted">-</p>
      <button class="btn" onclick="detail.close()">關閉</button>
    </div>
  </dialog>

  <script>
    const roomMeta = {
      idle:{name:'待機室', x:130, y:150, detail:'目前在待機，正在監看訊息與新任務，隨時可切換處理。'},
      work:{name:'工作室', x:450, y:150, detail:'目前在處理進行中的需求，會以小步快跑方式更新。'},
      search:{name:'搜尋室', x:760, y:150, detail:'正在查找資料、比對設定、確認外部依賴是否正常。'},
      code:{name:'開發室', x:320, y:410, detail:'正在寫程式、修正錯誤、測試流程並準備部署。'},
      schedule:{name:'排程室', x:690, y:410, detail:'正在整理待辦、安排里程碑、確認優先順序。'}
    };

    let currentRoom = 'idle';
    let autoTimer = null;

    function markRoom(){
      document.querySelectorAll('.room').forEach(el=>el.classList.remove('active'));
      document.getElementById('room-'+currentRoom).classList.add('active');
      document.getElementById('statePill').textContent = `目前：${roomMeta[currentRoom].name}`;
      document.getElementById('syncPill').textContent = `同步：${new Date().toLocaleTimeString()}`;
    }

    function go(key){
      const lob=document.getElementById('lobster');
      const r=roomMeta[key]; if(!r) return;
      currentRoom=key;
      lob.classList.add('walking');
      lob.style.left = `${r.x}px`;
      lob.style.top = `${r.y}px`;
      markRoom();
      setTimeout(()=>lob.classList.remove('walking'), 900);
    }

    function showDetail(key){
      const r=roomMeta[key] || roomMeta.idle;
      dTitle.textContent = `${r.name}｜目前狀態`;
      dBody.textContent = r.detail;
      detail.showModal();
    }

    function toggleAuto(){
      const btn=document.getElementById('autoBtn');
      if(autoTimer){
        clearInterval(autoTimer); autoTimer=null; btn.textContent='開啟自動巡房';
        return;
      }
      const order=['idle','work','search','code','schedule'];
      autoTimer=setInterval(()=>{
        const idx=(order.indexOf(currentRoom)+1)%order.length;
        go(order[idx]);
      }, 4000);
      btn.textContent='停止自動巡房';
    }

    markRoom();
  </script>
</body>
</html>
