<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw RPG 控制室（Minecraft 風）</title>
  <style>
    :root{--ink:#e8f5e9;--line:#2f5d31;--panel:#3f6f3f;--bg:#1f3a1f;--tileA:#4f7f4f;--tileB:#3f6f3f}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:linear-gradient(180deg,#1b331b,#152915);color:var(--ink)}
    .top{position:sticky;top:0;z-index:10;background:#1d2e1ddd;border-bottom:2px solid #2f5d31;padding:10px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .top h1{margin:0;font-size:18px}
    .pill{padding:4px 10px;border:2px solid #3f7a44;border-radius:4px;font-size:12px;background:#274927;color:#d9f3d9}
    .btn{border:2px solid #4a8a4e;background:#2f5f34;color:#e8f5e9;padding:7px 10px;border-radius:4px;cursor:pointer}
    .wrap{max-width:1240px;margin:0 auto;padding:14px}
    .map-wrap{overflow:auto;border:2px solid #2f5d31;border-radius:8px;background:#264426}
    .map{position:relative;min-width:1060px;height:690px;background:repeating-linear-gradient(0deg,var(--tileA) 0 22px,var(--tileB) 22px 44px),repeating-linear-gradient(90deg,#0002 0 22px,#0000 22px 44px)}

    .room{position:absolute;background:#6fa66f;border:4px solid #2f5d31;box-shadow:inset -8px -8px 0 #4f8a4f,inset 8px 8px 0 #8ec68e;cursor:pointer}
    .room h3{margin:0;font-size:14px;padding:9px 10px;border-bottom:3px solid #2f5d31;background:#7bb57b}
    .room .mini{padding:8px 10px;font-size:12px;color:#183018}
    .room.active{border-color:#d4f16d;box-shadow:0 0 0 4px #d4f16d55,inset -8px -8px 0 #4f8a4f,inset 8px 8px 0 #9ad39a}

    #room-idle{left:36px;top:36px;width:305px;height:250px}
    #room-work{left:382px;top:36px;width:305px;height:250px}
    #room-search{left:728px;top:36px;width:300px;height:250px}
    #room-code{left:170px;top:332px;width:345px;height:255px}
    #room-schedule{left:548px;top:332px;width:380px;height:255px}

    .px{position:absolute;image-rendering:pixelated;pointer-events:none}
    .tv{left:102px;top:116px;width:110px;height:72px;background:#111;border:4px solid #333;box-shadow:inset 0 0 0 6px #39ff14}
    .tv::after{content:'LIVE';position:absolute;right:8px;top:6px;color:#9eff8c;font-size:10px;font-weight:700}
    .sofa{left:138px;top:200px;width:148px;height:52px;background:#8b5a2b;border:4px solid #5a3817;box-shadow:inset 0 8px 0 #a16a35}
    .desk{left:464px;top:188px;width:150px;height:60px;background:#7d5a3a;border:4px solid #4f3824}
    .kb{left:498px;top:226px;width:82px;height:18px;background:#ddd;border:3px solid #999}
    .monitor{left:500px;top:136px;width:92px;height:54px;background:#111;border:4px solid #444;box-shadow:inset 0 0 0 5px #57a8ff}
    .cab{left:778px;top:112px;width:66px;height:150px;background:#7a7a7a;border:4px solid #4b4b4b}
    .doc{width:46px;height:28px;background:#f0f0f0;border:3px solid #aaa}.d1{left:856px;top:130px}.d2{left:882px;top:170px}.d3{left:848px;top:212px}
    .codepanel{left:246px;top:398px;width:128px;height:84px;background:#121212;border:4px solid #3a3a3a}
    .line{position:absolute;height:6px;background:#00e676}.l1{left:262px;top:424px;width:78px}.l2{left:262px;top:442px;width:96px}.l3{left:262px;top:460px;width:64px}
    .board{left:646px;top:392px;width:196px;height:130px;background:#d9f3d9;border:4px solid #3f7a44}
    .dot{width:12px;height:12px;background:#2f5d31}.t1{left:666px;top:418px}.t2{left:666px;top:446px}.t3{left:666px;top:474px}

    .lobster{position:absolute;left:132px;top:156px;width:74px;height:74px;border:4px solid #2f5d31;background:#ff7f50;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:34px;z-index:8;transition:left .6s steps(6), top .6s steps(6)}
    .lobster.walking{animation:hop .24s linear infinite}
    @keyframes hop{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}

    .door{position:absolute;width:26px;height:18px;background:#8b6b3f;border:2px solid #5a4326;pointer-events:none}.door.d1{left:352px;top:150px}.door.d2{left:700px;top:150px}.door.d3{left:536px;top:312px}
    .legend{position:absolute;right:14px;bottom:14px;background:#274927;border:2px solid #3f7a44;border-radius:6px;padding:8px 10px;font-size:12px;color:#d9f3d9}

    dialog{border:none;border-radius:10px;max-width:560px;width:min(92vw,560px);padding:0}
    dialog::backdrop{background:#0008}
    .modal{padding:14px;background:#213f21;color:#e8f5e9}
    .modal h3{margin:0 0 6px}
    .muted{color:#c7e6c7;font-size:13px;line-height:1.6}
  </style>
</head>
<body>
  <div class="top">
    <h1>🦞 OpenClaw RPG 控制室</h1>
    <span class="pill" id="statePill">目前：待機室</span>
    <span class="pill" id="syncPill">同步：-</span>
    <button class="btn" onclick="toggleAuto()" id="autoBtn">開啟自動巡房</button>
    <button class="btn" onclick="go('idle')">待機室</button>
    <button class="btn" onclick="go('work')">工作室</button>
    <button class="btn" onclick="go('search')">搜尋室</button>
    <button class="btn" onclick="go('code')">開發室</button>
    <button class="btn" onclick="go('schedule')">排程室</button>
  </div>

  <div class="wrap">
    <div class="map-wrap">
      <div class="map">
        <div class="room" id="room-idle" onclick="go('idle')"><h3>待機室</h3><div class="mini">方塊沙發區，監看通知</div></div>
        <div class="room" id="room-work" onclick="go('work')"><h3>工作室</h3><div class="mini">方塊工作桌，處理任務</div></div>
        <div class="room" id="room-search" onclick="go('search')"><h3>搜尋室</h3><div class="mini">資料箱 + 文件，查資料</div></div>
        <div class="room" id="room-code" onclick="go('code')"><h3>開發室</h3><div class="mini">程式工坊，修 bug / 寫 code</div></div>
        <div class="room" id="room-schedule" onclick="go('schedule')"><h3>排程室</h3><div class="mini">任務告示板，規劃時程</div></div>

        <div class="px tv"></div><div class="px sofa"></div>
        <div class="px desk"></div><div class="px kb"></div><div class="px monitor"></div>
        <div class="px cab"></div><div class="px doc d1"></div><div class="px doc d2"></div><div class="px doc d3"></div>
        <div class="px codepanel"></div><div class="px line l1"></div><div class="px line l2"></div><div class="px line l3"></div>
        <div class="px board"></div><div class="px dot t1"></div><div class="px dot t2"></div><div class="px dot t3"></div>

        <div class="door d1"></div><div class="door d2"></div><div class="door d3"></div>

        <div class="lobster" id="lobster" onclick="showDetail(currentRoom)">🦞</div>
        <div class="legend">Minecraft 風家具已啟用｜點房間讓龍蝦跳步移動</div>
      </div>
    </div>
  </div>

  <dialog id="detail"><div class="modal"><h3 id="dTitle">詳情</h3><p id="dBody" class="muted">-</p><button class="btn" onclick="detail.close()">關閉</button></div></dialog>

  <script>
    const roomMeta = {
      idle:{name:'待機室', x:132, y:158, detail:'目前在待機室，監看通知與新任務。'},
      work:{name:'工作室', x:470, y:158, detail:'目前在工作室，處理你交辦的任務。'},
      search:{name:'搜尋室', x:800, y:158, detail:'目前在搜尋室，查找資料與驗證設定。'},
      code:{name:'開發室', x:300, y:455, detail:'目前在開發室，寫 code / 測試 / 修 bug。'},
      schedule:{name:'排程室', x:700, y:455, detail:'目前在排程室，整理待辦與時程。'}
    };

    let currentRoom='idle', autoTimer=null;

    function markRoom(){
      document.querySelectorAll('.room').forEach(el=>el.classList.remove('active'));
      document.getElementById('room-'+currentRoom).classList.add('active');
      statePill.textContent=`目前：${roomMeta[currentRoom].name}`;
      syncPill.textContent=`同步：${new Date().toLocaleTimeString()}`;
    }

    function go(key){
      const r=roomMeta[key]; if(!r) return;
      currentRoom=key;
      lobster.classList.add('walking');
      lobster.style.left=r.x+'px';
      lobster.style.top=r.y+'px';
      markRoom();
      setTimeout(()=>lobster.classList.remove('walking'),900);
    }

    function showDetail(key){
      const r=roomMeta[key]||roomMeta.idle;
      dTitle.textContent=`${r.name}｜目前狀態`;
      dBody.textContent=r.detail;
      detail.showModal();
    }

    function toggleAuto(){
      if(autoTimer){ clearInterval(autoTimer); autoTimer=null; autoBtn.textContent='開啟自動巡房'; return; }
      const seq=['idle','work','search','code','schedule'];
      autoTimer=setInterval(()=>{ go(seq[(seq.indexOf(currentRoom)+1)%seq.length]); },3800);
      autoBtn.textContent='停止自動巡房';
    }

    markRoom();
  </script>
</body>
</html>
