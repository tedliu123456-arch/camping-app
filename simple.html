<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>露營趣 - 測試版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
        .header { background: #2d5a27; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .post-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .post-user { font-weight: bold; color: #2d5a27; }
        .post-time { color: #999; font-size: 12px; }
        .input-area { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        button { background: #2d5a27; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⛺ 露營趣 v4.0</h1>
    </div>
    
    <div class="input-area">
        <textarea id="postText" placeholder="分享你的露營經驗..."></textarea>
        <button onclick="publishPost()">發布貼文</button>
    </div>
    
    <div id="postList"></div>

    <script>
        let posts = [
            { user: "小明", content: "上週去福壽山農場，天氣超好！", time: "2小時前" }
        ];
        
        function renderPosts() {
            const list = document.getElementById('postList');
            list.innerHTML = posts.map(p => `
                <div class="post-card">
                    <div class="post-user">${p.user}</div>
                    <div class="post-time">${p.time}</div>
                    <p>${p.content}</p>
                </div>
            `).join('');
        }
        
        function publishPost() {
            const text = document.getElementById('postText').value;
            if (!text) { alert('請輸入內容'); return; }
            
            posts.unshift({
                user: '你',
                content: text,
                time: '剛剛'
            });
            
            document.getElementById('postText').value = '';
            renderPosts();
            alert('發布成功！');
        }
        
        renderPosts();
    </script>
</body>
</html>
