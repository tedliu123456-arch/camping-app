<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camping App v2.0.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1b2430;
      --accent: linear-gradient(135deg,#ff7e5f,#feb47b);
      --soft: #eef2f7;
      --radius: 18px;
    }
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --soft: #1a2233;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #ffd6c7 0%, transparent 40%),
        radial-gradient(circle at 80% 0%, #c7e9ff 0%, transparent 40%),
        var(--bg);
      color: var(--text);
      transition: background .4s ease, color .3s ease;
      min-height:100vh;
      overflow-x:hidden;
    }
    header { padding: 20px; display:flex; justify-content:space-between; align-items:center; }
    h1 { font-family:'Playfair Display', serif; font-size:28px; }
    .toggle { cursor:pointer; padding:8px 14px; border-radius:20px; background:var(--accent); color:#fff; border:none; }
    .controls { padding:20px; display:flex; gap:10px; flex-wrap:wrap; }
    input, select { padding:10px; border-radius:10px; border:1px solid #ccc; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
    .card { 
      background:var(--card); 
      border-radius:var(--radius); 
      padding:18px; 
      box-shadow:0 10px 25px rgba(0,0,0,0.08); 
      transition:transform .3s ease, box-shadow .3s ease;
      position:relative; 
      opacity:0;
      transform:translateY(20px);
      animation:fadeUp .6s forwards;
    }
    .card:hover { transform:translateY(-8px) scale(1.02); box-shadow:0 16px 35px rgba(0,0,0,0.12);} 
    .badge { position:absolute; top:15px; right:15px; background:var(--accent); color:#fff; padding:4px 10px; border-radius:12px; font-size:12px; }
    .btn { margin-top:10px; margin-right:6px; padding:8px 14px; border:none; border-radius:12px; background:var(--accent); color:#fff; cursor:pointer; }
    .btn.secondary { background:var(--soft); color:var(--text); }
    .btn.active { background:var(--accent); color:#fff; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
    .modal-content { background:var(--card); padding:30px; border-radius:20px; max-width:400px; width:90%; animation:pop .4s ease; position:relative; }
    .modal-content h2 { margin-bottom:15px; color:var(--text); }
    .modal-content p { margin:8px 0; color:var(--text); opacity:0.8; }
    .modal-close { position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; opacity:0.6; }
    @keyframes pop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
    .skeleton { background:linear-gradient(90deg,#ddd 25%,#eee 50%,#ddd 75%); background-size:200% 100%; animation:shine 1.5s infinite; height:160px; border-radius:18px; }
    @keyframes shine { to{background-position:-200% 0;} }
    .booking { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; padding:14px 28px; border-radius:30px; display:none; animation:slide .6s ease; }
    @keyframes slide { from{opacity:0; transform:translate(-50%,50px);} to{opacity:1; transform:translate(-50%,0);} }
    @keyframes fadeUp { to{opacity:1; transform:translateY(0);} }
    .favorite { position:absolute; top:15px; left:15px; cursor:pointer; font-size:18px; }
    .favorite.active { color:#ff7e5f; }
    .stats { padding:0 20px 10px; font-size:14px; opacity:.7; }
    .grid.list-view { display:flex; flex-direction:column; }
    .grid.list-view .card { display:flex; align-items:center; gap:15px; padding:12px 18px; }
    .grid.list-view .card h3 { margin:0; }
    .grid.list-view .card .badge { position:static; display:inline-block; margin-left:10px; }
    .grid.list-view .card .favorite { position:static; }
    .rating { color:#feb47b; font-weight:600; margin:4px 0; }
    .compare-bar { display:flex; position:sticky; top:0; z-index:10; }
    .card.selected { outline:3px solid #ff7e5f; }
  </style>
</head>
<body>
  <header>
    <h1>Camping Explorer v2.0.0</h1>
    <div>
      <button class="btn secondary" id="viewToggle" onclick="toggleView()">▦ Grid</button>
      <button class="toggle" onclick="toggleDark()">Dark Mode</button>
    </div>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search camps..." oninput="render()" />
    <select id="filter" onchange="render()">
      <option value="">All Types</option>
      <option value="Forest">Forest</option>
      <option value="Lake">Lake</option>
      <option value="Mountain">Mountain</option>
    </select>
    <select id="sort" onchange="render()">
      <option value="">Sort</option>
      <option value="low">Price: Low → High</option>
      <option value="high">Price: High → Low</option>
      <option value="name">Name A → Z</option>
      <option value="rating">Rating ★</option>
    </select>
    <select id="minRating" onchange="render()" style="width:90px">
      <option value="">Any Rating</option>
      <option value="4.5">4.5+ ★</option>
      <option value="4.0">4.0+ ★</option>
      <option value="3.5">3.5+ ★</option>
    </select>
    <input type="number" id="minPrice" placeholder="Min $" style="width:70px" oninput="render()" />
    <input type="number" id="maxPrice" placeholder="Max $" style="width:70px" oninput="render()" />
    <button class="btn secondary" onclick="clearFilters()">Clear</button>
    <button class="btn" id="favFilter" onclick="toggleFavFilter()">★ Favorites</button>
    <button class="btn secondary" id="recentBtn" onclick="showRecent()">🕐 Recent</button>
    <button class="btn secondary" onclick="shuffleCamps()">🔀 Shuffle</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="compare-bar" id="compareBar" style="display:none; padding:10px 20px; background:var(--soft); align-items:center; gap:10px;">
    <span id="compareCount">0 selected</span>
    <button class="btn" onclick="showCompare()">Compare</button>
    <button class="btn secondary" onclick="clearCompare()">Clear</button>
  </div>
  <div class="grid" id="grid"></div>

  <div class="modal" id="modal" onclick="closeModal(event)">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <div class="booking" id="bookingMsg">Booking Confirmed!</div>

  <footer style="text-align:center; padding:20px; opacity:0.6; font-size:13px;">
    ⌨️ D: Dark | G: Grid | F: Favorites | v2.0.0 | 22 camps
  </footer>

  <script>
    const campData = [
      {name:"Sunny Meadow",type:"Forest",price:55,description:"Peaceful forest setting with rolling meadows and wildlife.",rating:4.5},
      {name:"Lakeside Haven",type:"Lake",price:85,description:"Direct lake access with stunning sunset views.",rating:4.8},
      {name:"Mountain Peak",type:"Mountain",price:120,description:"Breathtaking mountain panoramas at 2000m altitude.",rating:4.9},
      {name:"Pine Forest",type:"Forest",price:45,description:"Dense pine forest with hiking trails.",rating:4.3},
      {name:"Crystal Lake",type:"Lake",price:95,description:"Crystal clear waters perfect for swimming.",rating:4.7},
      {name:"Eagle's Nest",type:"Mountain",price:150,description:"Remote mountain camp with adventure activities.",rating:4.6},
      {name:"River Bend",type:"Forest",price:60,description:"Riverside camping with fishing opportunities.",rating:4.4},
      {name:"Sunset Bay",type:"Lake",price:75,description:"Beautiful bay with kayaking and paddle boarding.",rating:4.5},
      {name:"Alpine Meadow",type:"Mountain",price:110,description:"High altitude meadow with wildflowers.",rating:4.7},
      {name:"Hidden Valley",type:"Forest",price:50,description:"Secluded valley away from crowds.",rating:4.2},
      {name:"Starry Night",type:"Lake",price:90,description:"Minimal light pollution for stargazing.",rating:4.8},
      {name:"Rocky Ridge",type:"Mountain",price:130,description:"Rocky terrain with rock climbing nearby.",rating:4.4},
      {name:"Willow Creek",type:"Forest",price:55,description:"Gentle creek with willow trees.",rating:4.3},
      {name:"Blue Horizon",type:"Lake",price:100,description:"Panoramic lake views from elevated site.",rating:4.6},
      {name:"Cloud Peak",type:"Mountain",price:140,description:"Above the clouds with sunrise views.",rating:4.9},
      {name:"Fern Gully",type:"Forest",price:48,description:"Lush fern-covered forest trails.",rating:4.1},
      {name:"Mirror Lake",type:"Lake",price:88,description:"Perfect mirror-like lake reflections.",rating:4.7},
      {name:"Thunder Ridge",type:"Mountain",price:125,description:"Dramatic thunderstorm views safely.",rating:4.5},
      {name:"Ancient Trees",type:"Forest",price:65,description:"Camp under centuries-old giant trees.",rating:4.6},
      {name:"Sandy Shore",type:"Lake",price:70,description:"Natural sandy beach on the lakeside.",rating:4.4},
      {name:"Summit View",type:"Mountain",price:135,description:"360-degree views from the summit.",rating:4.8},
      {name:"Whispering Pines",type:"Forest",price:52,description:"Pine trees that whisper in the wind.",rating:4.3}
    ];
    const camps = [...campData];

    const grid = document.getElementById('grid');
    const stats = document.getElementById('stats');
    let favorites = JSON.parse(localStorage.getItem('favorites')||'[]');
    let showFavOnly = false;
    let listView = false;
    let compareList = [];
    let recentlyViewed = JSON.parse(localStorage.getItem('recentlyViewed')||'[]');

    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      const filter = document.getElementById('filter').value;
      const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
      const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;
      const minRating = parseFloat(document.getElementById('minRating').value) || 0;
      grid.innerHTML = '';
      grid.classList.toggle('list-view', listView);

      let filtered = camps.filter(c =>
        c.name.toLowerCase().includes(search) &&
        (filter === '' || c.type === filter) &&
        c.price >= minPrice &&
        c.price <= maxPrice &&
        c.rating >= minRating &&
        (!showFavOnly || favorites.includes(c.name))
      );

      const sort = document.getElementById('sort').value;
      if(sort==='low') filtered.sort((a,b)=>a.price-b.price);
      if(sort==='high') filtered.sort((a,b)=>b.price-a.price);
      if(sort==='name') filtered.sort((a,b)=>a.name.localeCompare(b.name));
      if(sort==='rating') filtered.sort((a,b)=>b.rating-a.rating);

      const minP = filtered.length ? Math.min(...filtered.map(c=>c.price)) : 0;
      const maxP = filtered.length ? Math.max(...filtered.map(c=>c.price)) : 0;
      stats.textContent = `${filtered.length} camps · $${minP}-$${maxP}/night · ${favorites.length} favorites`;

      if (!filtered.length) { grid.innerHTML = '<p>No camps found.</p>'; return; }

      filtered.forEach(c => {
        const card = document.createElement('div');
        card.className = 'card' + (compareList.includes(c.name) ? ' selected' : '');
        const isFav = favorites.includes(c.name);
        card.style.animationDelay = `${Math.random()*0.3}s`;
        card.innerHTML = `
          <div class="favorite ${isFav?'active':''}" onclick="toggleFav('${c.name}')">${isFav?'★':'☆'}</div>
          <div class="badge">${c.type}</div>
          <h3>${c.name}</h3>
          <p class="rating">★ ${c.rating}</p>
          <p>$${c.price}/night</p>
          <label style="cursor:pointer"><input type="checkbox" ${compareList.includes(c.name)?'checked':''} onchange="toggleCompare('${c.name}')"> Compare</label>
          <button class="btn" onclick="openModal('${c.name}')">Details</button>
          <button class="btn secondary" onclick="book()">Book</button>
        `;
        grid.appendChild(card);
      });
      
      document.getElementById('compareBar').style.display = compareList.length ? 'flex' : 'none';
      document.getElementById('compareCount').textContent = `${compareList.length} selected`;
    }

    function openModal(name) {
      const camp = camps.find(c=>c.name===name);
      if(!camp) return;
      
      // Track recently viewed
      recentlyViewed = recentlyViewed.filter(n=>n!==name);
      recentlyViewed.unshift(name);
      recentlyViewed = recentlyViewed.slice(0,5);
      localStorage.setItem('recentlyViewed', JSON.stringify(recentlyViewed));
      
      document.getElementById('modalContent').innerHTML = `
        <h2>${camp.name}</h2>
        <p>Type: ${camp.type}</p>
        <p>${camp.description}</p>
        <p><strong>$${camp.price}/night</strong></p>
        <p class="rating">★ ${camp.rating}</p>
        <button class="btn" onclick="book()">Book Now</button>
      `;
      document.getElementById('modal').style.display='flex';
    }

    function closeModal(e){ if(e.target.id==='modal') document.getElementById('modal').style.display='none'; }

    function book(){
      const msg=document.getElementById('bookingMsg');
      msg.style.display='block';
      setTimeout(()=>msg.style.display='none',2000);
      document.getElementById('modal').style.display='none';
    }

    function toggleDark(){ document.body.classList.toggle('dark'); }

    function toggleFav(name){
      if(favorites.includes(name)){
        favorites = favorites.filter(f=>f!==name);
      }else{
        favorites.push(name);
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      render();
    }

    function clearFilters(){
      document.getElementById('search').value = '';
      document.getElementById('filter').value = '';
      document.getElementById('sort').value = '';
      document.getElementById('minRating').value = '';
      document.getElementById('minPrice').value = '';
      document.getElementById('maxPrice').value = '';
      showFavOnly = false;
      document.getElementById('favFilter').classList.remove('active');
      render();
    }

    function shuffleCamps(){
      for(let i=camps.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [camps[i],camps[j]]=[camps[j],camps[i]];
      }
      render();
    }

    function toggleFavFilter(){
      showFavOnly = !showFavOnly;
      const btn = document.getElementById('favFilter');
      btn.classList.toggle('active', showFavOnly);
      render();
    }

    function toggleView(){
      listView = !listView;
      document.getElementById('viewToggle').textContent = listView ? '☰ List' : '▦ Grid';
      render();
    }

    function toggleCompare(name){
      if(compareList.includes(name)){
        compareList = compareList.filter(c=>c!==name);
      }else if(compareList.length < 4){
        compareList.push(name);
      }
      render();
    }

    function showCompare(){
      const campsToCompare = camps.filter(c=>compareList.includes(c.name));
      if(campsToCompare.length < 2) return;
      let html = '<h2>Compare Camps</h2><table style="width:100%;text-align:left"><tr><th>Name</th><th>Type</th><th>Price</th><th>Rating</th></tr>';
      campsToCompare.forEach(c=>{
        html += `<tr><td>${c.name}</td><td>${c.type}</td><td>$${c.price}</td><td>★ ${c.rating}</td></tr>`;
      });
      html += '</table><button class="btn" onclick="document.getElementById(\'modal\').style.display=\'none\'">Close</button>';
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modal').style.display='flex';
    }

    function clearCompare(){
      compareList = [];
      render();
    }

    function showRecent(){
      if(recentlyViewed.length === 0) return;
      const recentCamps = camps.filter(c=>recentlyViewed.includes(c.name));
      // Sort by recentlyViewed order
      recentCamps.sort((a,b)=>recentlyViewed.indexOf(a.name) - recentlyViewed.indexOf(b.name));
      let html = '<h2>Recently Viewed</h2><div style="display:flex;flex-direction:column;gap:10px;">';
      recentCamps.forEach(c=>{
        html += `<div style="padding:10px;background:var(--soft);border-radius:10px;cursor:pointer" onclick="openModal('${c.name}');document.getElementById('modal').style.display='flex'">
          <strong>${c.name}</strong> - $${c.price}/night ★ ${c.rating}
        </div>`;
      });
      html += '</div><button class="btn" onclick="document.getElementById(\'modal\').style.display=\'none\'">Close</button>';
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modal').style.display='flex';
    }

    function showSkeleton(){
      for(let i=0;i<6;i++){
        const s=document.createElement('div');
        s.className='skeleton';
        grid.appendChild(s);
      }
    }

    showSkeleton();
    setTimeout(render,1200);

    document.addEventListener('keydown', e => {
      if(e.key==='d'||e.key==='D') toggleDark();
      if(e.key==='g'||e.key==='G') toggleView();
      if(e.key==='f'||e.key==='F') toggleFavFilter();
    });
  </script>
</body>
</html>
