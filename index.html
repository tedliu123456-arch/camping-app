<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>露營趣 v11.1</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #f4f1ea;
      --card: #ffffff;
      --primary: #2f5d50;
      --accent: #e09f3e;
      --text: #1f2933;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans TC", sans-serif; background: linear-gradient(180deg,#f4f1ea,#e8e2d6); color: var(--text); }
    header { padding: 16px; font-size: 20px; font-weight: 700; }
    .page { display: none; padding: 16px; padding-bottom: 80px; }
    .active { display: block; }
    .card { background: var(--card); border-radius: 16px; padding: 12px; margin-bottom: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
    .card img { width: 100%; border-radius: 12px; margin-bottom: 8px; }
    .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #fff; border-top: 1px solid #ddd; }
    .tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; cursor: pointer; }
    .tab.active { color: var(--primary); font-weight: 600; }
    button { background: var(--primary); color: #fff; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; }
    input { padding: 8px; width: 100%; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ccc; }
    .votes { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .comments { margin-top: 8px; font-size: 14px; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; }
    .modal-content { background: #fff; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; }
    #map { height: 400px; border-radius: 16px; }
    .swipe-container { overflow: hidden; }
  </style>
</head>
<body>
  <header>露營趣 v11.1</header>

  <div id="home" class="page active">
    <div class="swipe-container" id="postContainer"></div>
  </div>

  <div id="mapPage" class="page">
    <div id="map"></div>
  </div>

  <div id="shop" class="page"></div>

  <div id="community" class="page"></div>

  <div id="profile" class="page">
    <div id="loginSection"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-page="home">首頁</div>
    <div class="tab" data-page="mapPage">地圖</div>
    <div class="tab" data-page="shop">商家</div>
    <div class="tab" data-page="community">社群</div>
    <div class="tab" data-page="profile">我的</div>
  </div>

  <div class="modal" id="commentModal">
    <div class="modal-content">
      <h3>留言</h3>
      <div id="commentList"></div>
      <input id="newComment" placeholder="輸入留言" />
      <button onclick="addComment()">送出</button>
    </div>
  </div>

  <script>
    let user = localStorage.getItem("campUser") || null;
    let posts = [
      { id: 1, user: "小山", title: "合歡山星空夜", content: "第一次高山露營，星空超震撼！", img: "https://picsum.photos/seed/camp1/400/250", votes: 12, fire: 3, heart: 5, comments: ["好美！","想去！"] },
      { id: 2, user: "露營爸", title: "親子湖畔營地", content: "小孩玩到不想回家。", img: "https://picsum.photos/seed/camp2/400/250", votes: 8, fire: 2, heart: 4, comments: [] },
      { id: 3, user: "阿哲", title: "森林系秘境", content: "人少清幽，很放鬆。", img: "https://picsum.photos/seed/camp3/400/250", votes: 5, fire: 1, heart: 2, comments: [] },
      { id: 4, user: "Mina", title: "海邊車宿", content: "聽著海浪聲入睡。", img: "https://picsum.photos/seed/camp4/400/250", votes: 15, fire: 6, heart: 7, comments: [] },
      { id: 5, user: "Kevin", title: "溪邊烤肉趣", content: "溪水冰涼超消暑。", img: "https://picsum.photos/seed/camp5/400/250", votes: 3, fire: 0, heart: 1, comments: [] },
      { id: 6, user: "露營新手", title: "第一次搭帳", content: "花了2小時才搭好。", img: "https://picsum.photos/seed/camp6/400/250", votes: 6, fire: 1, heart: 3, comments: [] },
      { id: 7, user: "山女孩", title: "雲海日出", content: "清晨5點起床值得。", img: "https://picsum.photos/seed/camp7/400/250", votes: 18, fire: 8, heart: 9, comments: [] },
      { id: 8, user: "老王", title: "豪華露營體驗", content: "不用自己搭帳太爽。", img: "https://picsum.photos/seed/camp8/400/250", votes: 9, fire: 2, heart: 4, comments: [] },
      { id: 9, user: "小綠", title: "寵物友善營地", content: "毛孩跑整天。", img: "https://picsum.photos/seed/camp9/400/250", votes: 11, fire: 4, heart: 6, comments: [] },
      { id: 10, user: "阿豪", title: "雨天露營", content: "帳篷防水很重要。", img: "https://picsum.photos/seed/camp10/400/250", votes: 4, fire: 1, heart: 2, comments: [] }
    ];
    let currentPostId = null;

    function renderPosts() {
      const container = document.getElementById("postContainer");
      container.innerHTML = "";
      posts.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${p.img}" />
          <h3>${p.title}</h3>
          <p><strong>@${p.user}</strong></p>
          <p>${p.content}</p>
          <div class="votes">
            <button onclick="vote(${p.id},'like')">👍 ${p.votes}</button>
            <button onclick="vote(${p.id},'fire')">🔥 ${p.fire}</button>
            <button onclick="vote(${p.id},'heart')">❤️ ${p.heart}</button>
            <button onclick="openComments(${p.id})">💬</button>
          </div>
        `;
        addSwipe(card);
        container.appendChild(card);
      });
    }

    function vote(id, type) {
      const post = posts.find(p => p.id === id);
      if (type === 'like') post.votes++;
      if (type === 'fire') post.fire++;
      if (type === 'heart') post.heart++;
      renderPosts();
    }

    function openComments(id) {
      currentPostId = id;
      document.getElementById("commentModal").style.display = "flex";
      renderComments();
    }

    function renderComments() {
      const list = document.getElementById("commentList");
      const post = posts.find(p => p.id === currentPostId);
      list.innerHTML = post.comments.map(c => `<div>- ${c}</div>`).join("");
    }

    function addComment() {
      const input = document.getElementById("newComment");
      if (!input.value) return;
      posts.find(p => p.id === currentPostId).comments.push(input.value);
      input.value = "";
      renderComments();
    }

    function addSwipe(el) {
      let startX = 0;
      el.addEventListener("touchstart", e => startX = e.touches[0].clientX);
      el.addEventListener("touchend", e => {
        let diff = e.changedTouches[0].clientX - startX;
        if (diff > 80) el.style.transform = "translateX(100%)";
        if (diff < -80) el.style.transform = "translateX(-100%)";
      });
    }

    function renderShop() {
      const shop = document.getElementById("shop");
      const shops = [
        { name: "森林營地", desc: "山景第一排", img: "https://picsum.photos/seed/shop1/400/200" },
        { name: "湖畔露營", desc: "親子首選", img: "https://picsum.photos/seed/shop2/400/200" },
        { name: "山野改裝", desc: "露營車改裝專家", img: "https://picsum.photos/seed/shop3/400/200" },
        { name: "戶外補給站", desc: "裝備一次購足", img: "https://picsum.photos/seed/shop4/400/200" },
        { name: "星空Glamping", desc: "豪華露營體驗", img: "https://picsum.photos/seed/shop5/400/200" },
        { name: "車泊俱樂部", desc: "車宿交流改裝", img: "https://picsum.photos/seed/shop6/400/200" }
      ];
      shop.innerHTML = shops.map(s => `<div class='card'><img src='${s.img}'/><h3>${s.name}</h3><p>${s.desc}</p></div>`).join("");
    }

    function renderCommunity() {
      const c = document.getElementById("community");
      c.innerHTML = "<div class='card'>歡迎加入露營社群討論！</div>";
    }

    function renderProfile() {
      const sec = document.getElementById("loginSection");
      if (user) {
        sec.innerHTML = `<div class='card'>歡迎，${user}<br/><button onclick='logout()'>登出</button></div>`;
      } else {
        sec.innerHTML = `
          <div class='card'>
            <input id='username' placeholder='輸入使用者名稱'/>
            <button onclick='login()'>登入</button>
          </div>`;
      }
    }

    function login() {
      const name = document.getElementById("username").value;
      if (!name) return;
      user = name;
      localStorage.setItem("campUser", name);
      renderProfile();
    }

    function logout() {
      user = null;
      localStorage.removeItem("campUser");
      renderProfile();
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(tab.dataset.page).classList.add("active");
      });
    });

    document.getElementById("commentModal").addEventListener("click", e => {
      if (e.target.id === "commentModal") e.target.style.display = "none";
    });

    function initMap() {
      const map = L.map("map").setView([23.8, 120.9], 8);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
      const campgrounds = [
        { name: "台北露營點", lat: 25.03, lng: 121.56 },
        { name: "新竹營地", lat: 24.8, lng: 121.0 },
        { name: "苗栗山林營", lat: 24.5, lng: 120.9 },
        { name: "南投清境營地", lat: 24.05, lng: 121.16 },
        { name: "嘉義阿里山營地", lat: 23.5, lng: 120.8 },
        { name: "台南曾文水庫營地", lat: 23.2, lng: 120.5 },
        { name: "高雄美濃營區", lat: 22.9, lng: 120.5 },
        { name: "花蓮海岸營地", lat: 23.9, lng: 121.6 },
        { name: "台東鹿野高台", lat: 22.9, lng: 121.1 },
        { name: "宜蘭礁溪營地", lat: 24.8, lng: 121.75 }
      ];
      campgrounds.forEach(c => {
        L.marker([c.lat, c.lng]).addTo(map).bindPopup(c.name);
      });
    }

    renderPosts();
    renderShop();
    renderCommunity();
    renderProfile();
    setTimeout(initMap, 300);
  </script>
</body>
</html>
