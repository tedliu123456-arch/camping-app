<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camping App v1.5（需求整合版）</title>
  <style>
    :root{
      --bg:#f3f6fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;
      --pri:#2563eb;--ok:#16a34a;--danger:#dc2626;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
    .container{max-width:1120px;margin:0 auto;padding:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
    .muted{color:var(--muted);font-size:13px}
    .topbar{position:sticky;top:0;z-index:1000;background:#fff;border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1120px;margin:0 auto;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-weight:900;color:#0f172a}
    .btn{border:0;background:var(--pri);color:#fff;padding:8px 12px;border-radius:10px;cursor:pointer}
    .btn.ghost{background:#fff;color:#111827;border:1px solid #d1d5db}
    .btn.ok{background:var(--ok)}
    .btn.danger{background:var(--danger)}
    .tabs{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;position:sticky;top:49px;z-index:999;background:var(--bg);padding:10px 0}
    .sticky-marquee{position:sticky;top:108px;z-index:998}
    .tab{border:1px solid #d1d5db;background:#fff;color:#111827;padding:10px 6px;border-radius:10px;cursor:pointer;font-weight:700}
    .tab.active{background:var(--pri);border-color:var(--pri);color:#fff}
    .section{display:none}.section.active{display:block}

    .marquee{display:flex;gap:10px;overflow:auto;white-space:nowrap}
    .marquee-item{background:#eef2ff;border:1px solid #c7d2fe;color:#3730a3;padding:6px 10px;border-radius:999px;font-size:13px}

    .contest-banner{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border-radius:12px;padding:10px;position:relative}
    .contest-row{display:flex;gap:8px;overflow:auto;padding-top:8px}
    .contest-card{position:relative;min-width:120px;height:84px;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid rgba(255,255,255,.5)}
    .contest-card img{width:100%;height:100%;object-fit:cover}
    .contest-vote{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.65);padding:2px 6px;border-radius:999px;font-size:12px}

    .feed-item{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;background:#fff}
    .feed-media{width:100%;max-height:340px;object-fit:cover;border-radius:10px;margin-top:8px;background:#000}
    .actions{display:flex;gap:8px;margin-top:8px}
    .pill{display:inline-block;background:#e0ecff;color:#1e40af;padding:3px 8px;border-radius:999px;font-size:12px}

    .store-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
    .store-title{font-weight:800}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
    input,select,textarea{width:100%;padding:9px;border:1px solid #d1d5db;border-radius:10px}

    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-end;justify-content:center;z-index:2000}
    .sheet{width:min(820px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px 18px 0 0;padding:14px}
    .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

    .contest-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .contest-entry img{width:100%;height:auto;border-radius:12px}
    .contest-entry-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}

    .dm-fab{position:fixed;right:16px;bottom:16px;z-index:1200;background:#0ea5e9}
    .post-fab{position:fixed;right:16px;bottom:62px;z-index:1200}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;z-index:3000;display:none;box-shadow:0 8px 20px rgba(0,0,0,.22)}
    .upload-progress{margin-top:8px;display:none}
    .upload-track{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden}
    .upload-fill{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#0ea5e9);transition:width .2s ease}

    .admin-wrap{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:980px){.admin-wrap{grid-template-columns:1fr 1fr}}

    /* 手機優先優化 */
    @media (max-width: 768px){
      .container{padding:8px}
      .tabs{display:flex;overflow:auto;white-space:nowrap;gap:8px;grid-template-columns:none;top:49px;padding:8px 0}
      .sticky-marquee{top:102px}
      .tab{min-width:104px;flex:0 0 auto}
      .card{padding:10px;border-radius:12px}
      .topbar-inner{padding:9px 10px}
    }

    /* 私訊與發文改為全頁 */
    #postModal.overlay, #dmModal.overlay{align-items:stretch;justify-content:stretch;background:#fff}
    #postModal .sheet, #dmModal .sheet{width:100vw;max-width:none;max-height:100vh;border-radius:0;padding:12px}

  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">🏕️ Camping Community <span id="appVersion" class="muted" style="font-size:12px;margin-left:6px"></span></div>
      <div>
        <span id="userBadge" class="pill">訪客模式</span>
        <button id="loginBtn" class="btn" onclick="openLoginModal()">登入</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="tabs" id="tabs"></div>

    <section id="sec-social" class="section active">
      <div class="card sticky-marquee">
        <div style="font-weight:800;margin-bottom:6px">📣 活動跑馬燈</div>
        <div id="announceMarquee" class="marquee"></div>
      </div>

      <div id="contestBanner" class="card contest-banner">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="font-weight:800">📸 會員照片比賽（社群首頁限定）</div>
          <button class="btn" onclick="openPostModal('contest')">📷 我要投稿</button>
        </div>
        <div class="muted" style="color:#dbeafe">每位會員每日 2 票，不可重複投同一作品；12:10 刷新</div>
        <div id="contestBannerList" class="contest-row"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800">社群貼文</div>
          <button class="btn" onclick="openPostModal('social')">＋ 發文</button>
        </div>
        <div id="feedList" style="margin-top:10px"></div>
      </div>
    </section>

    <section id="sec-campsite" class="section">
      <div class="card">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="font-weight:800">營地搜尋（591 風格）</div>
          <input id="campSearch" placeholder="輸入地區/關鍵字（例：靠海、親子、夜景）" style="max-width:320px" />
          <button class="btn ghost" onclick="openGoogleMapSearch()">Google Maps 搜尋</button>
        </div>
      </div>
      <div id="campsiteList" class="store-grid"></div>
    </section>

    <section id="sec-mod" class="section"><div id="modList" class="store-grid"></div></section>
    <section id="sec-gear" class="section"><div id="gearList" class="store-grid"></div></section>
    <section id="sec-rental" class="section"><div id="rentalList" class="store-grid"></div></section>
  </div>

  <button class="btn dm-fab" onclick="openDM()">💬 私訊</button>
  <button class="btn post-fab" onclick="openPostModal('social')">＋ 貼文</button>

  <div id="loginModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">登入 / 訪客</h3><button class="btn ghost" onclick="closeLoginModal()">關閉</button></div>
      <div class="field"><label>暱稱</label><input id="loginName" placeholder="輸入名稱" maxlength="20" autocomplete="nickname" oninput="updateLoginNameCounter()" /><div id="loginNameCounter" class="muted" style="text-align:right">0/20</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="memberLogin('google')">Google 登入</button>
        <button class="btn" onclick="memberLogin('line')">LINE 登入</button>
        <button class="btn" onclick="memberLogin('facebook')">Facebook 登入</button>
        <button class="btn ghost" onclick="enterGuestMode()">訪客模式（免登入）</button>
        <button class="btn ghost" onclick="clearLoginName()">清空名稱</button>
        <button class="btn" onclick="openBackendLogin()">商家 / 平台後台登入</button>
      </div>
    </div>
  </div>

  <div id="postModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 id="postTitle" style="margin:0">新增貼文</h3><button class="btn ghost" onclick="closePostModal()">返回</button></div>
      <div id="postTargetBadge" class="pill">發佈到：社群媒體</div>
      <div class="field" style="margin-top:8px"><textarea id="postText" rows="4" placeholder="分享露營心得..."></textarea></div>
      <div class="field"><label>照片或影片</label><input id="postFile" type="file" accept="image/*,video/*" /></div>
      <div id="uploadProgress" class="upload-progress">
        <div class="muted" id="uploadProgressText">上傳中 0%</div>
        <div class="upload-track"><div id="uploadFill" class="upload-fill"></div></div>
      </div>
      <button id="postSubmitBtn" class="btn" onclick="submitPost()">發佈</button>
    </div>
  </div>

  <div id="contestModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">會員照片比賽</h3><button class="btn ghost" onclick="closeContestModal()">關閉</button></div>
      <div id="voteHint" class="muted"></div>
      <div id="contestEntries" class="contest-grid" style="margin-top:10px"></div>
      <div style="margin-top:10px"><button class="btn" onclick="openPostModal('contest')">📷 我要投稿</button></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>


  <div id="backendLoginModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">後台登入</h3><button class="btn ghost" onclick="closeBackendLogin()">關閉</button></div>
      <div class="field"><label>ID</label><input id="backendId" placeholder="輸入 ID（商家或 admin）" /></div>
      <div class="field"><label>密碼</label><input id="backendPwd" type="password" placeholder="輸入密碼" /></div>
      <button class="btn" onclick="backendLogin()">登入後台</button>
    </div>
  </div>

  <div id="backendWorkspace" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 id="backendTitle" style="margin:0">後台</h3><button class="btn ghost" onclick="closeBackendWorkspace()">關閉</button></div>
      <div id="backendContent"></div>
    </div>
  </div>

  <div id="dmModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">私訊</h3><button class="btn ghost" onclick="closeDM()">返回</button></div>
      <div id="dmThreads" class="muted">尚無對話，請到商家卡片按「私訊商家」。</div>
      <div id="dmComposer" style="display:none;margin-top:10px"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script>
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBrCmKeoIKhNfUBmfxrMSPQnf9CDXP3QEM",
      authDomain: "outdoorcamp.firebaseapp.com",
      projectId: "outdoorcamp",
      storageBucket: "outdoorcamp.firebasestorage.app",
      messagingSenderId: "709693825585",
      appId: "1:709693825585:web:eced280b0538cdc29bab10",
      measurementId: "G-L68VBJR8W2"
    };

    const APP_DOC = 'camping-main-v1';
    const APP_VERSION = '33.5';
    const ADMIN_PASSWORD = 'admin123';
    const tabs = [
      {key:'social',label:'社群媒體'},
      {key:'campsite',label:'營地'},
      {key:'mod',label:'露營車改裝'},
      {key:'gear',label:'露營用品'},
      {key:'rental',label:'露營車出租'},
    ];

    let db=null, storage=null;
    let postMode='social';
    let currentDMStore=null;

    const state = {
      activeTab:'social',
      user:{id:'guest',name:'訪客',mode:'guest',provider:null},
      announcements:[
        {id:'a1',text:'本週會員照片比賽開放投稿！'},
        {id:'a2',text:'清明連假營地推薦已更新。'}
      ],
      posts:[],
      contestEntries:[],
      stores:[],
      merchantAccounts:[],
      dmThreads:[]
    };

    function uid(){ return 'id'+Date.now()+Math.random().toString(36).slice(2,7); }
    function detectMediaType(file){
      if(!file) return null;
      const t=(file.type||'').toLowerCase();
      if(t.startsWith('image/')) return 'image';
      if(t.startsWith('video/')) return 'video';
      const n=(file.name||'').toLowerCase();
      if(/\.(jpg|jpeg|png|gif|webp|heic|heif)$/.test(n)) return 'image';
      if(/\.(mp4|mov|webm|m4v|avi)$/.test(n)) return 'video';
      return null;
    }
    function showToast(msg){
      const t=document.getElementById('toast');
      if(!t) return;
      t.textContent=msg;
      t.style.display='block';
      clearTimeout(window.__toastTimer);
      window.__toastTimer=setTimeout(()=>{ t.style.display='none'; },1800);
    }
    function setUploadProgress(percent){
      const box=document.getElementById('uploadProgress');
      const fill=document.getElementById('uploadFill');
      const txt=document.getElementById('uploadProgressText');
      if(!box||!fill||!txt) return;
      box.style.display='block';
      const p=Math.max(0,Math.min(100,percent||0));
      fill.style.width=`${p}%`;
      txt.textContent=`上傳中 ${p}%`;
    }
    function resetUploadProgress(){
      const box=document.getElementById('uploadProgress');
      const fill=document.getElementById('uploadFill');
      const txt=document.getElementById('uploadProgressText');
      if(!box||!fill||!txt) return;
      box.style.display='none';
      fill.style.width='0%';
      txt.textContent='上傳中 0%';
    }
    function isMember(){ return state.user.mode === 'member'; }

    function defaultSeed(){
      if(state.stores.length) return;
      state.stores = [
        {id:uid(),category:'campsite',name:'海風營地',address:'花蓮縣壽豐鄉',hours:'08:00-22:00',contact:'03-1234567',website:'',isMember:true,ownerMerchantId:'m001',description:'靠海、夜景、親子友善',features:['親子','靠海','夜景'],tentCount:60,zones:'A區/B區',elevation:'120m',accessibleVehicles:'轎車/SUV/露營車'},
        {id:uid(),category:'gear',name:'野行裝備店',address:'台中市西屯區',hours:'10:00-21:00',contact:'04-7654321',website:'',isMember:true,ownerMerchantId:'m002',description:'露營用品齊全'},
        {id:uid(),category:'mod',name:'VanPro 改裝',address:'新北市三重區',hours:'09:00-18:00',contact:'02-77778888',website:'',isMember:true,ownerMerchantId:'m003',description:'露營車改裝與客製'},
        {id:uid(),category:'rental',name:'GoCamp 租車',address:'台北市南港區',hours:'09:00-20:00',contact:'02-66667777',website:'',isMember:true,ownerMerchantId:'m004',description:'露營車出租'}
      ];
      state.merchantAccounts = [
        {merchantId:'m001',password:'123456',storeId:state.stores[0].id,enabled:true},
        {merchantId:'m002',password:'123456',storeId:state.stores[1].id,enabled:true},
        {merchantId:'m003',password:'123456',storeId:state.stores[2].id,enabled:true},
        {merchantId:'m004',password:'123456',storeId:state.stores[3].id,enabled:true},
      ];
      state.posts = [
        {id:uid(),authorId:'sys',authorName:'露營小編',text:'歡迎來到社群首頁，分享你的露營照片吧！',mediaType:null,mediaUrl:null,likes:[],comments:[],createdAt:new Date().toISOString()},
      ];
      state.contestEntries = [
        {id:uid(),authorId:'sys',authorName:'會員A',imageUrl:'https://picsum.photos/seed/c1/1000/700',voteCount:12,createdAt:new Date().toISOString()},
        {id:uid(),authorId:'sys',authorName:'會員B',imageUrl:'https://picsum.photos/seed/c2/1000/700',voteCount:7,createdAt:new Date().toISOString()}
      ];
    }

    function ensureTestData(){
      let changed = false;
      const cfg = {
        campsite: {prefix:'營地', area:'南投縣', desc:'親子、夜景、可車宿', hours:'08:00-22:00'},
        mod: {prefix:'改裝廠', area:'新北市', desc:'露營車改裝與客製', hours:'09:00-18:00'},
        gear: {prefix:'用品店', area:'台中市', desc:'露營用品與裝備', hours:'10:00-21:00'},
        rental: {prefix:'租車商家', area:'台北市', desc:'露營車出租', hours:'09:00-20:00'}
      };

      Object.keys(cfg).forEach(cat=>{
        const nowCount = state.stores.filter(s=>s.category===cat).length;
        for(let i=nowCount+1;i<=10;i++){
          const c = cfg[cat];
          const id = uid();
          state.stores.push({
            id,
            category:cat,
            name:`${c.prefix}${i}`,
            address:`${c.area} 測試路 ${i} 號`,
            hours:c.hours,
            contact:`09${String(10000000+i).slice(0,8)}`,
            website:'',
            isMember:true,
            ownerMerchantId:'',
            description:c.desc,
            features: cat==='campsite' ? ['親子','靠山','夜景'] : undefined,
            tentCount: cat==='campsite' ? (20+i) : undefined,
            zones: cat==='campsite' ? 'A區/B區' : undefined,
            elevation: cat==='campsite' ? `${100+i*5}m` : undefined,
            accessibleVehicles: cat==='campsite' ? '轎車/SUV/露營車' : undefined,
            comments: []
          });
          changed = true;
        }
      });

      // 為會員商家補足帳號
      const usedIds = new Set((state.merchantAccounts||[]).map(a=>a.merchantId));
      let seq = 1001;
      (state.stores||[]).forEach(st=>{
        if(!st.isMember) return;
        const linked = (state.merchantAccounts||[]).find(a=>a.storeId===st.id);
        if(linked) return;
        while(usedIds.has(`m${seq}`)) seq++;
        const mid = `m${seq}`;
        usedIds.add(mid);
        st.ownerMerchantId = mid;
        state.merchantAccounts.push({merchantId:mid,password:'123456',storeId:st.id,enabled:true});
        seq++;
        changed = true;
      });

      // 社群首頁測試照片貼文補滿 10 則
      const photoPosts = (state.posts||[]).filter(p=>p.mediaType==='image');
      for(let i=photoPosts.length+1;i<=10;i++){
        state.posts.unshift({
          id:uid(),
          authorId:'seed',
          authorName:`測試會員${i}`,
          text:`測試照片貼文 #${i}`,
          mediaType:'image',
          mediaUrl:`https://picsum.photos/seed/social${i}/1000/700`,
          likes:[],
          comments:[],
          createdAt:new Date().toISOString()
        });
        changed = true;
      }

      return changed;
    }

    async function initFirebase(){
      try{
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.firestore();
        storage = firebase.storage();
      }catch(e){ console.warn('firebase init fallback', e); }
    }

    async function loadState(){
      defaultSeed();
      if(!db){ ensureTestData(); return; }
      try{
        const doc = await db.collection('apps').doc(APP_DOC).get();
        if(doc.exists){
          const d = doc.data() || {};
          state.announcements = d.announcements || state.announcements;
          state.posts = d.posts || state.posts;
          state.contestEntries = d.contestEntries || state.contestEntries;
          state.stores = d.stores || state.stores;
          state.merchantAccounts = d.merchantAccounts || state.merchantAccounts;
          state.dmThreads = d.dmThreads || state.dmThreads;
        }
        if(ensureTestData()){ await saveState(); }
      }catch(e){ console.warn('load fail',e); }
    }

    async function saveState(){
      if(!db) return;
      try{
        await db.collection('apps').doc(APP_DOC).set({
          announcements:state.announcements,
          posts:state.posts,
          contestEntries:state.contestEntries,
          stores:state.stores,
          merchantAccounts:state.merchantAccounts,
          dmThreads:state.dmThreads,
          updatedAt:new Date().toISOString()
        }, {merge:true});
      }catch(e){ console.warn('save fail',e); }
    }

    async function uploadFile(file, folder, onProgress){
      if(!file) return null;

      // 備援：直接使用本地 object URL，避免長時間卡在上傳中
      const localFallback = () => {
        try { return URL.createObjectURL(file); }
        catch { return null; }
      };

      if(!storage){
        if(onProgress) onProgress(100);
        return localFallback();
      }

      try{
        const safeName = `${Date.now()}-${(file.name||'upload').replace(/\s+/g,'-')}`;
        const ref = storage.ref().child(`${folder}/${safeName}`);

        // 上傳逾時保護：12 秒內沒完成就走備援，避免 UI 無限卡住
        const timeoutMs = 12000;
        const putTask = ref.put(file);
        putTask.on('state_changed', snap => {
          if(!onProgress) return;
          const total = snap.totalBytes || 1;
          const percent = Math.min(99, Math.floor((snap.bytesTransferred / total) * 100));
          onProgress(percent);
        });

        await Promise.race([
          putTask,
          new Promise((_, reject)=>setTimeout(()=>reject(new Error('upload-timeout')), timeoutMs))
        ]);

        const url = await Promise.race([
          ref.getDownloadURL(),
          new Promise((_, reject)=>setTimeout(()=>reject(new Error('url-timeout')), timeoutMs))
        ]);

        if(onProgress) onProgress(100);
        return url || localFallback();
      }catch(e){
        console.warn('upload fallback',e);
        if(onProgress) onProgress(100);
        return localFallback();
      }
    }

    function renderTabs(){
      const el = document.getElementById('tabs');
      el.innerHTML = tabs.map(t=>`<button class="tab ${state.activeTab===t.key?'active':''}" onclick="setTab('${t.key}')">${t.label}</button>`).join('');
      document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
      document.getElementById('sec-'+state.activeTab).classList.add('active');
      document.getElementById('contestBanner').style.display = state.activeTab==='social' ? 'block' : 'none';
    }

    function setTab(k){ state.activeTab=k; renderTabs(); renderAll(); }

    function renderUser(){
      const verEl=document.getElementById('appVersion');
      if(verEl) verEl.textContent = APP_VERSION;
      document.getElementById('userBadge').textContent = isMember() ? `${state.user.name}（會員）` : '訪客模式';
      document.getElementById('loginBtn').textContent = isMember() ? '登出' : '登入';
      document.getElementById('loginBtn').onclick = isMember() ? logout : openLoginModal;
    }

    function renderAnnouncements(){
      const m = document.getElementById('announceMarquee');
      m.innerHTML = state.announcements.map(a=>`<div class="marquee-item">${a.text}</div>`).join('');
    }

    function rankedContest(){ return [...state.contestEntries].sort((a,b)=> (b.voteCount||0)-(a.voteCount||0)); }

    function renderContestBanner(){
      const list = document.getElementById('contestBannerList');
      list.innerHTML = rankedContest().slice(0,8).map(e=>`
        <div class="contest-card" onclick="openContestModal()">
          <img src="${e.imageUrl}" alt="contest" />
          <div class="contest-vote">❤️ ${e.voteCount||0}</div>
        </div>`).join('');
    }

    function renderFeed(){
      const el = document.getElementById('feedList');
      el.innerHTML = state.posts.map(p=>{
        const liked = (p.likes||[]).includes(state.user.id);
        const likeDisabled = !isMember() || liked;
        return `<div class="feed-item">
          <div style="display:flex;justify-content:space-between"><b>${p.authorName}</b><span class="muted">${new Date(p.createdAt).toLocaleString()}</span></div>
          <div style="margin-top:8px">${p.text||''}</div>
          ${p.mediaType==='image'?`<img class="feed-media" src="${p.mediaUrl}"/>`:''}
          ${p.mediaType==='video'?`<video class="feed-media" src="${p.mediaUrl}" controls playsinline></video>`:''}
          <div class="actions">
            <button class="btn ghost" ${likeDisabled?'disabled':''} onclick="likePost('${p.id}')">❤️ ${(p.likes||[]).length}</button>
            <button class="btn ghost" onclick="togglePostComments('${p.id}')">💬 ${(p.comments||[]).length}</button>
          </div>
          <div id="pc-${p.id}" style="display:none;margin-top:8px">
            ${(p.comments||[]).map(c=>`<div class='muted' style='margin-bottom:4px'><b>${c.userName}</b>：${c.text}</div>`).join('') || '<div class="muted">尚無評論</div>'}
            <div style="display:flex;gap:6px;margin-top:6px">
              <input id="pci-${p.id}" placeholder="輸入評論" />
              <button class="btn" ${!isMember()?'disabled':''} onclick="commentPost('${p.id}')">送出</button>
            </div>
            ${!isMember()?'<div class="muted">訪客不可評論</div>':''}
          </div>
        </div>`;
      }).join('');
    }

    function storeCard(s){
      const comments = s.comments || [];
      const feat = s.features?.length ? `<div class="muted">特色：${s.features.join('、')}</div>` : '';
      const campsiteExtra = s.category==='campsite' ? `
        <div class="muted">總帳數：${s.tentCount||'-'} / 分區：${s.zones||'-'}</div>
        <div class="muted">海拔：${s.elevation||'-'} / 可達車種：${s.accessibleVehicles||'-'}</div>
      ` : '';
      return `<div class="card" style="margin:0">
        <div class="store-title">${s.name}</div>
        <div class="muted">${s.address||''}</div>
        <div class="muted">營業時間：${s.hours||'-'}｜聯絡：${s.contact||'-'}</div>
        ${s.website ? `<div><a href="${s.website}" target="_blank">官網連結</a></div>` : ''}
        <div style="margin-top:6px">${s.description||''}</div>
        ${feat}
        ${campsiteExtra}
        <div class="actions">
          <button class="btn ghost" onclick="openMapTo('${encodeURIComponent(s.address||s.name)}')">地圖</button>
          <button class="btn ghost" onclick="contactStore('${s.id}')">私訊商家</button>
        </div>
        <div style="margin-top:8px">
          <div class="muted">評論 ${comments.length}</div>
          ${(comments).slice(-3).map(c=>`<div class='muted'><b>${c.userName}</b>：${c.text}</div>`).join('') || '<div class="muted">尚無評論</div>'}
          <div style="display:flex;gap:6px;margin-top:6px">
            <input id="sc-${s.id}" placeholder="會員可評論" />
            <button class="btn" ${!isMember()?'disabled':''} onclick="commentStore('${s.id}')">送出</button>
          </div>
          ${!isMember()?'<div class="muted">訪客不可評論</div>':''}
        </div>
      </div>`;
    }

    function renderStoreTabs(){
      const camps = state.stores.filter(s=>s.category==='campsite').filter(s=>{
        const kw=(document.getElementById('campSearch')?.value||'').trim().toLowerCase();
        if(!kw) return true;
        const bag = `${s.name} ${s.address} ${s.description} ${(s.features||[]).join(' ')}`.toLowerCase();
        return bag.includes(kw);
      });
      document.getElementById('campsiteList').innerHTML = camps.map(storeCard).join('');
      document.getElementById('modList').innerHTML = state.stores.filter(s=>s.category==='mod').map(storeCard).join('');
      document.getElementById('gearList').innerHTML = state.stores.filter(s=>s.category==='gear').map(storeCard).join('');
      document.getElementById('rentalList').innerHTML = state.stores.filter(s=>s.category==='rental').map(storeCard).join('');
    }

    function getVoteKey(){
      const now = new Date();
      // 12:10 刷新，00:00~12:09 算前一日配額
      if(now.getHours() < 12 || (now.getHours()===12 && now.getMinutes()<10)) now.setDate(now.getDate()-1);
      const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
      return `vote-${state.user.id}-${y}${m}${d}`;
    }

    function voteState(){
      const raw=localStorage.getItem(getVoteKey());
      try{return raw?JSON.parse(raw):{count:0,voted:[]};}catch{return {count:0,voted:[]};}
    }

    function setVoteState(v){ localStorage.setItem(getVoteKey(),JSON.stringify(v)); }

    function renderContestModal(){
      const v = voteState();
      document.getElementById('voteHint').textContent = `今日剩餘票數：${Math.max(0,2-(v.count||0))}（會員每天2票，不可重複）`;
      document.getElementById('contestEntries').innerHTML = rankedContest().map(e=>{
        const voted=(v.voted||[]).includes(e.id);
        const disabled = !isMember() || voted || (v.count||0)>=2;
        return `<div class='contest-entry card' style='margin:0'>
          <img src='${e.imageUrl}' />
          <div class='contest-entry-row'>
            <div><b>${e.authorName}</b><div class='muted'>票數：${e.voteCount||0}</div></div>
            <button class='btn' ${disabled?'disabled':''} onclick="voteContest('${e.id}')">${voted?'已投票':'投票'}</button>
          </div>
        </div>`;
      }).join('');
    }

    function renderMerchantEditor(account){
      const store = state.stores.find(s=>s.id===account.storeId);
      if(!store) return;
      const el = document.getElementById('backendContent');
      el.innerHTML = `
        <div class='muted'>編輯店鋪：${store.name}</div>
        <div class='field'><label>描述</label><textarea id='me-desc'>${store.description||''}</textarea></div>
        <div class='field'><label>地址</label><input id='me-addr' value='${store.address||''}' /></div>
        <div class='field'><label>營業時間</label><input id='me-hours' value='${store.hours||''}' /></div>
        <div class='field'><label>聯絡方式</label><input id='me-contact' value='${store.contact||''}' /></div>
        <div class='field'><label>官網</label><input id='me-web' value='${store.website||''}' /></div>
        <button class='btn ok' onclick="saveMerchantStore('${store.id}')">儲存修改</button>
      `;
    }

    function renderAdminPanel(){
      const el=document.getElementById('backendContent');
      el.innerHTML = `
        <div class='field'><label>活動公告（新增一條）</label><input id='ad-ann' placeholder='輸入公告文字' /></div>
        <button class='btn' onclick='addAnnouncement()'>新增公告</button>
        <hr/>
        <div style='font-weight:700'>新增商家資料</div>
        <div class='field'><label>類別</label><select id='ad-cat'><option value='campsite'>營地</option><option value='gear'>露營用品</option><option value='mod'>露營車改裝</option><option value='rental'>露營車出租</option></select></div>
        <div class='field'><label>店名</label><input id='ad-name' /></div>
        <div class='field'><label>地址</label><input id='ad-addr' /></div>
        <div class='field'><label>營業時間</label><input id='ad-hours' /></div>
        <div class='field'><label>聯絡方式</label><input id='ad-contact' /></div>
        <div class='field'><label>描述</label><textarea id='ad-desc'></textarea></div>
        <button class='btn ok' onclick='addStoreByAdmin()'>新增商家</button>
        <hr/>
        <div style='font-weight:700'>開通商家會員帳號</div>
        <div class='field'><label>商家 ID</label><input id='ad-mid' placeholder='m1001' /></div>
        <div class='field'><label>密碼</label><input id='ad-mpw' placeholder='123456' /></div>
        <div class='field'><label>綁定店鋪 ID</label><input id='ad-sid' placeholder='storeId' /></div>
        <button class='btn' onclick='createMerchantAccount()'>開通帳號</button>
      `;
    }

    function renderDM(){
      const box=document.getElementById('dmThreads');
      const lines=state.dmThreads.map(t=>`<button class='btn ghost' style='margin:4px 4px 0 0' onclick="openThread('${t.id}')">${t.storeName}</button>`).join('');
      box.innerHTML = lines || '尚無對話，請到商家卡片按「私訊商家」。';
      document.getElementById('dmComposer').style.display='none';
    }

    function openThread(id){
      const t=state.dmThreads.find(x=>x.id===id); if(!t) return;
      currentDMStore=id;
      const html=(t.messages||[]).map(m=>`<div class='muted'><b>${m.fromName}</b>：${m.text}</div>`).join('')||'<div class="muted">尚無訊息</div>';
      document.getElementById('dmComposer').style.display='block';
      document.getElementById('dmComposer').innerHTML=`${html}<div style='display:flex;gap:6px;margin-top:6px'><input id='dmInput' placeholder='輸入訊息'/><button class='btn' ${!isMember()?'disabled':''} onclick='sendDM()'>送出</button></div>${!isMember()?'<div class="muted">訪客不可私訊</div>':''}`;
    }

    function openMapTo(q){ window.open(`https://www.google.com/maps/search/?api=1&query=${q}`,'_blank'); }
    function openGoogleMapSearch(){ const q=encodeURIComponent(document.getElementById('campSearch').value||'台灣 營地'); openMapTo(q); }

    function updateLoginNameCounter(){
      const nameEl = document.getElementById('loginName');
      const cEl = document.getElementById('loginNameCounter');
      if(!nameEl || !cEl) return;
      cEl.textContent = `${(nameEl.value || '').length}/20`;
    }

    function clearLoginName(){
      const nameEl = document.getElementById('loginName');
      if(!nameEl) return;
      nameEl.value = '';
      updateLoginNameCounter();
      nameEl.focus();
    }

    function openBackendLogin(){ document.getElementById('backendLoginModal').style.display='flex'; }
    function closeBackendLogin(){ document.getElementById('backendLoginModal').style.display='none'; }
    function openBackendWorkspace(title){ document.getElementById('backendTitle').textContent=title; document.getElementById('backendWorkspace').style.display='flex'; }
    function closeBackendWorkspace(){ document.getElementById('backendWorkspace').style.display='none'; }

    function backendLogin(){
      const id=(document.getElementById('backendId').value||'').trim();
      const pw=(document.getElementById('backendPwd').value||'').trim();
      if(!id||!pw) return alert('請輸入 ID 與密碼');

      // 平台主帳號：admin + 後台密碼
      if(id==='admin' && pw===ADMIN_PASSWORD){
        closeBackendLogin();
        openBackendWorkspace('平台主後台（PC）');
        renderAdminPanel();
        return;
      }

      // 其餘視為商家帳號
      const acc=state.merchantAccounts.find(a=>a.merchantId===id && a.password===pw && a.enabled);
      if(!acc) return alert('帳號或密碼錯誤');
      closeBackendLogin();
      openBackendWorkspace('商家後台');
      renderMerchantEditor(acc);
    }

    function openLoginModal(){
      document.getElementById('loginModal').style.display='flex';
      const nameEl = document.getElementById('loginName');
      const lastName = localStorage.getItem('campingLastLoginName') || '';
      if(nameEl && lastName && !nameEl.value) nameEl.value = lastName;
      updateLoginNameCounter();
      if(nameEl) nameEl.focus();
    }
    function closeLoginModal(){ document.getElementById('loginModal').style.display='none'; }

    function bindLoginModalKeys(){
      const nameEl = document.getElementById('loginName');
      if(!nameEl) return;
      nameEl.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') memberLogin('google');
        if(e.key === 'Escape') closeLoginModal();
      });
    }
    function memberLogin(provider){
      const rawName=(document.getElementById('loginName').value||'會員').trim();
      const name=(rawName || '會員').slice(0,20);
      localStorage.setItem('campingLastLoginName', name);
      state.user={id:`${provider}-${Date.now()}`,name,mode:'member',provider};
      closeLoginModal();
      renderAll();
    }
    function enterGuestMode(){
      const rawName=(document.getElementById('loginName').value||'訪客').trim();
      const name=(rawName || '訪客').slice(0,20);
      localStorage.setItem('campingLastLoginName', name);
      state.user={id:'guest',name,mode:'guest',provider:null};
      closeLoginModal();
      renderAll();
    }
    function logout(){ enterGuestMode(); }

    function openPostModal(mode){
      if(!isMember()){
        alert('請先登入會員，才能發佈貼文或投稿比賽');
        openLoginModal();
        return;
      }
      postMode=mode;
      document.getElementById('postTitle').textContent = mode==='contest'?'投稿':'新增貼文';
      document.getElementById('postTargetBadge').textContent = mode==='contest'?'投稿到：會員照片比賽':'發佈到：社群媒體';
      document.getElementById('postText').placeholder = mode==='contest'?'可直接上傳照片投稿（文字可省略）':'分享露營心得...';
      document.getElementById('postModal').style.display='flex';
      showToast(mode==='contest'?'已進入投稿頁':'已進入發文頁');
    }
    function closePostModal(){ document.getElementById('postModal').style.display='none'; resetUploadProgress(); }

    async function submitPost(){
      if(!isMember()){ alert('請先登入會員'); return; }
      const text=(document.getElementById('postText').value||'').trim();
      const fileInput=document.getElementById('postFile');
      const file=fileInput && fileInput.files ? (fileInput.files[0] || null) : null;
      const submitBtn=document.getElementById('postSubmitBtn');
      const oldLabel=submitBtn ? submitBtn.textContent : '';

      if(postMode==='contest' && !file){ alert('請先選擇照片再投稿'); return; }
      if(!text && !file){ alert('請輸入內容或選擇檔案'); return; }

      const type = detectMediaType(file);
      if(postMode==='contest' && type!=='image'){
        alert('照片比賽僅接受圖片檔（jpg/png/heic 等）');
        return;
      }

      try{
        if(submitBtn){ submitBtn.disabled=true; submitBtn.textContent='上傳中...'; }
        if(file) setUploadProgress(0); else resetUploadProgress();
        const url = file ? await uploadFile(file, postMode==='contest'?'contest':'posts', setUploadProgress) : null;
        if(file && !url){
          alert('檔案上傳失敗，請重試');
          return;
        }

        if(postMode==='contest'){
          state.contestEntries.unshift({id:uid(),authorId:state.user.id,authorName:state.user.name,imageUrl:url,voteCount:0,createdAt:new Date().toISOString()});
          await saveState();
          renderContestBanner();
          closePostModal();
          openContestModal();
          showToast('投稿成功 ✅');
        }else{
          state.posts.unshift({id:uid(),authorId:state.user.id,authorName:state.user.name,text,mediaType:type,mediaUrl:url,likes:[],comments:[],createdAt:new Date().toISOString()});
          await saveState();
          renderFeed();
          closePostModal();
          showToast('貼文發佈成功 ✅');
        }

        document.getElementById('postText').value='';
        if(fileInput) fileInput.value='';
      }catch(err){
        console.error(err);
        alert('發布失敗，請稍後再試');
      }finally{
        if(submitBtn){ submitBtn.disabled=false; submitBtn.textContent=oldLabel || '發佈'; }
        resetUploadProgress();
      }
    }

    function likePost(id){
      if(!isMember()) return alert('訪客不可按愛心');
      const p=state.posts.find(x=>x.id===id); if(!p) return;
      if((p.likes||[]).includes(state.user.id)) return;
      p.likes.push(state.user.id);
      renderFeed(); saveState();
    }

    function togglePostComments(id){
      const el=document.getElementById('pc-'+id); if(!el) return;
      el.style.display = el.style.display==='none'?'block':'none';
    }

    function commentPost(id){
      if(!isMember()) return alert('訪客不可評論');
      const i=document.getElementById('pci-'+id); const txt=(i.value||'').trim(); if(!txt) return;
      const p=state.posts.find(x=>x.id===id); if(!p) return;
      p.comments.push({userId:state.user.id,userName:state.user.name,text:txt,createdAt:new Date().toISOString()});
      i.value=''; renderFeed(); saveState();
    }

    function commentStore(id){
      if(!isMember()) return alert('訪客不可評論');
      const i=document.getElementById('sc-'+id); const txt=(i.value||'').trim(); if(!txt) return;
      const s=state.stores.find(x=>x.id===id); if(!s) return;
      s.comments=s.comments||[]; s.comments.push({userId:state.user.id,userName:state.user.name,text:txt,createdAt:new Date().toISOString()});
      i.value=''; renderStoreTabs(); saveState();
    }

    function openContestModal(){ document.getElementById('contestModal').style.display='flex'; renderContestModal(); }
    function closeContestModal(){ document.getElementById('contestModal').style.display='none'; }

    function voteContest(entryId){
      if(!isMember()) return alert('訪客不可投票');
      const v=voteState(); v.count=v.count||0; v.voted=v.voted||[];
      if(v.voted.includes(entryId)) return alert('不可重複投同一作品');
      if(v.count>=2) return alert('今日票數已用完（每天2票）');
      const e=state.contestEntries.find(x=>x.id===entryId); if(!e) return;
      e.voteCount=(e.voteCount||0)+1;
      v.count+=1; v.voted.push(entryId); setVoteState(v);
      renderContestModal(); renderContestBanner(); saveState();
    }

    function contactStore(storeId){
      if(!isMember()) return alert('請先登入會員再私訊');
      const s=state.stores.find(x=>x.id===storeId); if(!s) return;
      let t=state.dmThreads.find(x=>x.storeId===storeId);
      if(!t){ t={id:uid(),storeId,storeName:s.name,messages:[]}; state.dmThreads.push(t); }
      openDM(); openThread(t.id);
    }

    function openDM(){ document.getElementById('dmModal').style.display='flex'; renderDM(); showToast('已進入私訊頁'); }
    function closeDM(){ document.getElementById('dmModal').style.display='none'; }
    function sendDM(){
      if(!isMember()) return;
      const txt=(document.getElementById('dmInput').value||'').trim(); if(!txt) return;
      const t=state.dmThreads.find(x=>x.id===currentDMStore); if(!t) return;
      t.messages.push({fromId:state.user.id,fromName:state.user.name,text:txt,createdAt:new Date().toISOString()});
      openThread(t.id); saveState();
    }


    function addAnnouncement(){
      const t=document.getElementById('ad-ann').value.trim(); if(!t) return;
      state.announcements.unshift({id:uid(),text:t});
      document.getElementById('ad-ann').value=''; renderAnnouncements(); saveState();
    }

    function addStoreByAdmin(){
      const s={
        id:uid(),
        category:document.getElementById('ad-cat').value,
        name:document.getElementById('ad-name').value.trim(),
        address:document.getElementById('ad-addr').value.trim(),
        hours:document.getElementById('ad-hours').value.trim(),
        contact:document.getElementById('ad-contact').value.trim(),
        description:document.getElementById('ad-desc').value.trim(),
        isMember:false
      };
      if(!s.name) return alert('請輸入店名');
      state.stores.unshift(s);
      renderStoreTabs(); saveState(); alert('已新增商家');
    }

    function createMerchantAccount(){
      const merchantId=document.getElementById('ad-mid').value.trim();
      const password=document.getElementById('ad-mpw').value.trim();
      const storeId=document.getElementById('ad-sid').value.trim();
      if(!merchantId||!password||!storeId) return alert('請填完整');
      const store=state.stores.find(s=>s.id===storeId); if(!store) return alert('找不到店鋪ID');
      state.merchantAccounts.push({merchantId,password,storeId,enabled:true});
      store.isMember=true; store.ownerMerchantId=merchantId;
      saveState(); alert('已開通商家會員帳號');
    }

    function renderAll(){
      renderUser();
      renderTabs();
      renderAnnouncements();
      renderContestBanner();
      renderFeed();
      renderStoreTabs();
      renderDM();
    }

    async function boot(){
      await initFirebase();
      await loadState();
      renderAll();
      bindLoginModalKeys();
      document.getElementById('campSearch').addEventListener('input', renderStoreTabs);
    }
    boot();
  </script>
</body>
</html>
