<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>露營趣 - 露營生活社群 v6.0.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ig-pink: #fd1d1d;
            --ig-purple: #c13584;
            --ig-orange: #fcb045;
            --bg-main: #fafafa;
            --card-bg: #ffffff;
            --text-main: #111;
            --text-sub: #777;
            --border-light: #e6e6e6;
        }
        body { font-family: "Noto Sans TC", "PingFang TC", sans-serif; background: var(--bg-main); color: var(--text-main); }
        .header { background:#fff; border-bottom:1px solid var(--border-light); padding:14px 16px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:20; }
        .logo { font-weight:700; font-size:20px; display:flex; gap:8px; align-items:center; }
        .ig-logo { width:26px; height:26px; border-radius:8px; background: radial-gradient(circle at 30% 30%, #fff 0%, #fff 15%, transparent 16%), linear-gradient(45deg,var(--ig-orange),var(--ig-pink),var(--ig-purple)); position:relative; }
        .version { font-size:11px; background:#f2f2f2; padding:3px 8px; border-radius:999px; }
        .stories { display:flex; gap:12px; padding:14px 16px; overflow-x:auto; background:#fff; }
        .story-card { min-width:110px; height:170px; border-radius:20px; position:relative; overflow:hidden; flex-shrink:0; }
        .story-card img { width:100%; height:100%; object-fit:cover; }
        .story-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.1)); display:flex; align-items:flex-end; padding:10px; color:#fff; font-size:13px; font-weight:600; }
        .page { display:none; padding-bottom:90px; }
        .page.active { display:block; }
        .composer { padding:16px; background:#fff; border-bottom:1px solid var(--border-light); }
        .card { background: var(--card-bg); margin-bottom:18px; }
        .post { background:#fff; border-top:1px solid var(--border-light); border-bottom:1px solid var(--border-light); }
        .post-header { display:flex; gap:10px; align-items:center; padding:14px 16px; }
        .post-content { padding:0 16px 12px 16px; font-size:15px; line-height:1.6; }
        .post img { width:100%; display:block; }
        .badge { display:inline-block; padding:4px 10px; font-size:11px; border-radius:999px; background:#f0f0f0; color:#555; margin-left:6px; }
        .reaction-bar { display:flex; justify-content:space-around; padding:10px 0; font-size:15px; color:var(--text-sub); border-top:1px solid var(--border-light); }
        .reaction-btn { cursor:pointer; }
        textarea, select, input { width:100%; padding:10px; border-radius:12px; border:1px solid var(--border-light); margin-bottom:10px; }
        .btn { padding:10px 16px; border:none; border-radius:999px; cursor:pointer; font-weight:600; }
        .btn-primary { background:linear-gradient(45deg,var(--ig-orange),var(--ig-pink),var(--ig-purple)); color:#fff; }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border-light); display:flex; justify-content:space-around; padding:8px 0; }
        .bottom-nav button { background:none; border:none; font-size:12px; display:flex; flex-direction:column; align-items:center; color:var(--text-sub); cursor:pointer; }
        .bottom-nav button.active { color: var(--ig-pink); font-weight:600; }
        .avatar { width:42px; height:42px; border-radius:50%; object-fit:cover; }
        .fab { position:fixed; right:20px; bottom:90px; width:58px; height:58px; border-radius:50%; border:none; cursor:pointer; font-size:26px; color:#fff; background:linear-gradient(45deg,var(--ig-orange),var(--ig-pink),var(--ig-purple)); box-shadow:0 8px 24px rgba(0,0,0,0.25); }
        .filter-chips { display:flex; gap:8px; overflow-x:auto; padding:12px 16px; background:#fff; }
        .chip { padding:6px 14px; border-radius:999px; background:#fff; border:1px solid var(--border-light); font-size:12px; cursor:pointer; white-space:nowrap; }
        .chip.active { background:#111; color:#fff; border-color:#111; }
         .heart-burst { position:absolute; pointer-events:none; font-size:22px; animation:burst 600ms ease-out forwards; }
        /* Profile Page */
        .profile-header { background:#fff; padding:20px 16px; border-bottom:1px solid var(--border-light); }
        .profile-top { display:flex; gap:20px; align-items:center; }
        .profile-avatar { width:96px; height:96px; border-radius:50%; padding:4px; background:linear-gradient(45deg,var(--ig-orange),var(--ig-pink),var(--ig-purple)); }
        .profile-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; border:3px solid #fff; }
        .profile-stats { display:flex; gap:18px; }
        .stat { text-align:center; font-size:14px; }
        .stat strong { display:block; font-size:18px; }
        .profile-name { font-weight:700; margin-top:14px; }
        .profile-bio { font-size:14px; color:var(--text-sub); margin-top:6px; line-height:1.5; }
        .profile-actions { display:flex; gap:10px; margin-top:14px; }
        .btn-outline { flex:1; padding:8px; border-radius:8px; border:1px solid var(--border-light); background:#fff; font-weight:600; }
        .profile-tabs { display:flex; justify-content:center; gap:40px; padding:10px 0; background:#fff; border-top:1px solid var(--border-light); border-bottom:1px solid var(--border-light); }
        .profile-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
        .profile-grid img { width:100%; aspect-ratio:1/1; object-fit:cover; }
        @keyframes burst {
            0% { opacity:1; transform:scale(0.6) translateY(0); }
            100% { opacity:0; transform:scale(1.6) translateY(-40px); }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="logo"><div class="ig-logo"></div> 露營趣 <span class="version">v6.0.0</span></div>
    <div id="authArea">

</div>
<div id="app">
    <div class="stories">
        <div class="story-card">
            <img src="https://picsum.photos/300/500?random=1">
            <div class="story-overlay">Alan · 山林秘境</div>
        </div>
        <div class="story-card">

            <div class="story-overlay">Luna · 海邊露營</div>
        </div>
        <div class="story-card">
            <img src="https://picsum.photos/300/500?random=3">
            <div class="story-overlay">Tom · 星空夜晚</div>

    </div>
    <div id="communityPage" class="page active">
        <div class="composer">
            <select id="postCategory">
                <option>新手發問</option>
                <option>裝備分享</option>
                <option>營地推薦</option>
                <option>美食料理</option>
            </select>
            <textarea id="postInput" placeholder="分享你的露營故事..."></textarea>
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
            <img id="imagePreview" style="display:none;width:100%;border-radius:12px;margin-bottom:10px;" />
            <input type="file" id="videoInput" accept="video/*" onchange="previewVideo(event)">
            <video id="videoPreview" controls style="display:none;width:100%;border-radius:12px;margin-bottom:10px;"></video>
            <input type="text" id="locationInput" placeholder="打卡地點 (點擊選擇)" readonly onclick="openMapPicker()">
            <div id="mapPicker" style="display:none;margin-bottom:10px;">
                <iframe id="mapFrame" width="100%" height="200" style="border:0;border-radius:12px;" loading="lazy"></iframe>
                <button class="btn" style="margin-top:8px;" onclick="confirmLocation()">使用此位置</button>
            </div>
            <button class="btn btn-primary" onclick="addPost()">發布貼文</button>

    <div id="explorePage" class="page">

    </div>
    <div id="messagesPage" class="page"><div class="card">訊息功能示意</div></div>
    <div id="profilePage" class="page">
        <div class="profile-header">

                <div class="profile-avatar">
                    <img src="https://picsum.photos/200?random=50">

                ⛺ 露營 5 年資歷｜山林系玩家<br>

                <button class="btn-outline">編輯個人檔案</button>
                <button class="btn-outline">分享個人檔案</button>

        </div>
        <div class="profile-tabs">
            <div>▦</div>

            <div>🔖</div>
        </div>
        <div class="profile-grid">
            <img src="https://picsum.photos/400?random=60">
            <img src="https://picsum.photos/400?random=61">
            <img src="https://picsum.photos/400?random=62">
            <img src="https://picsum.photos/400?random=63">
            <img src="https://picsum.photos/400?random=64">

</div>
<button class="fab" onclick="scrollToComposer()">＋</button>
<div class="bottom-nav">
    <button class="active" onclick="switchTab('community',this)">🏠<span>首頁</span></button>
    <button onclick="switchTab('explore',this)">🧭<span>探索</span></button>
    <button onclick="switchTab('messages',this)">💬<span>訊息</span></button>
    <button onclick="switchTab('profile',this)">👤<span>個人</span></button>
</div>
<!-- Login Modal -->
<div id="loginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;align-items:center;justify-content:center;">
    <div style="background:#fff;padding:20px;border-radius:16px;width:90%;max-width:320px;">
        <h3 style="margin-bottom:12px;">登入露營趣</h3>
        <button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="googleLogin()">使用 Google 登入</button>
        <input type="text" id="usernameLogin" placeholder="輸入暱稱">
        <button class="btn" style="width:100%;background:#111;color:#fff;" onclick="simpleLogin()">使用暱稱登入</button>
        <button class="btn" style="width:100%;margin-top:10px;" onclick="closeLogin()">取消</button>
    </div>
</div>
<script>
// Firebase (replace with real config when deploying)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

let currentUser = null;

function openLogin(){ document.getElementById('loginModal').style.display='flex'; }
function closeLogin(){ document.getElementById('loginModal').style.display='none'; }

function simpleLogin(){
    const name = document.getElementById('usernameLogin').value.trim();
    if(!name) return;
    currentUser = { name, avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random` };
    localStorage.setItem('campUser', JSON.stringify(currentUser));
    afterLogin();
}

function googleLogin(){
    if(!window.firebase){ alert('尚未設定 Firebase'); return; }
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).then(result=>{
        currentUser = { name: result.user.displayName, avatar: result.user.photoURL };
        localStorage.setItem('campUser', JSON.stringify(currentUser));
        afterLogin();
    });
}

function afterLogin(){
    closeLogin();
    renderAuthHeader();
    renderProfile();
}

function renderAuthHeader(){
    const area = document.getElementById('authArea');
    if(!currentUser){
        area.innerHTML = '<button class="btn btn-primary" style="padding:6px 12px;font-size:12px;" onclick="openLogin()">登入</button>';
        return;
    }
    area.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
            <img src="${currentUser.avatar}" class="avatar" style="width:32px;height:32px;">
            <span style="font-size:13px;font-weight:600;">${currentUser.name}</span>
            <button onclick="logout()" style="background:none;border:none;cursor:pointer;">⎋</button>
        </div>`;
}

function logout(){
    currentUser = null;
    localStorage.removeItem('campUser');
    renderAuthHeader();
    renderProfile();
}

function renderProfile(){
    const nameEl = document.querySelector('.profile-name');
    const avatarEl = document.querySelector('.profile-avatar img');
    if(!currentUser){
        nameEl.textContent = '尚未登入';
        avatarEl.src = 'https://picsum.photos/200?random=50';
        return;
    }
    nameEl.textContent = currentUser.name;
    avatarEl.src = currentUser.avatar;
}
const categories = ['全部','新手發問','裝備分享','營地推薦','美食料理'];
let currentFilter = '全部';

function initFilters() {
    const container = document.getElementById('categoryFilters');
    categories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'chip' + (cat==='全部' ? ' active':'');
        chip.textContent = cat;
        chip.onclick = () => {
            currentFilter = cat;
            document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
            chip.classList.add('active');
            filterPosts();
        };
        container.appendChild(chip);
    });
}

function switchTab(tab, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(tab + 'Page').classList.add('active');
    document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
function previewImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        const img = document.getElementById('imagePreview');
        img.src = reader.result;
        img.style.display = 'block';
    };
    reader.readAsDataURL(file);
}
function addPost() {
    const text = document.getElementById('postInput').value.trim();
    if (!text) return;
    const list = document.getElementById('postList');
    const category = document.getElementById('postCategory').value;
    const preview = document.getElementById('imagePreview').src;
    const card = document.createElement('div');
    card.className = 'post';
    card.setAttribute('data-category', category);
    card.style.position = 'relative';
    const authorName = currentUser ? currentUser.name : '你';
    const authorAvatar = currentUser ? currentUser.avatar : 'https://picsum.photos/80?random=9';
    card.innerHTML = `
        <div class="post-header">
            <img src="${authorAvatar}" class="avatar">
            <div>
                <strong>${authorName}</strong><span class="badge">${category}</span><br>
                <small style="color:#777;">${new Date().toLocaleString()} ${document.getElementById('locationInput').value ? '· 📍 ' + document.getElementById('locationInput').value : ''}</small>
            </div>
        </div>
        <div class="post-content">${text}</div>
        ${preview ? `<img src="${preview}">` : ''}
        ${document.getElementById('videoPreview').src ? `<video src="${document.getElementById('videoPreview').src}" controls></video>` : ''}
        <div class="reaction-bar">
            <div class="reaction-btn">👍</div>
            <div class="reaction-btn" onclick="heartBurst(event)">❤️</div>
            <div class="reaction-btn">💬</div>
            <div>🔖</div>
        </div>
    `;
    list.prepend(card);
    document.getElementById('postInput').value = '';
    document.getElementById('imageInput').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('videoInput').value = '';
    document.getElementById('videoPreview').style.display = 'none';
    document.getElementById('videoPreview').src = '';
    document.getElementById('locationInput').value = '';
    filterPosts();
}

function heartBurst(e) {
    const parent = e.target.closest('.post');
    const heart = document.createElement('div');
    heart.className = 'heart-burst';
    heart.textContent = '❤️';
    const rect = e.target.getBoundingClientRect();
    const parentRect = parent.getBoundingClientRect();
    heart.style.left = (rect.left - parentRect.left + 20) + 'px';
    heart.style.top = (rect.top - parentRect.top) + 'px';
    parent.appendChild(heart);
    e.target.style.transform = 'scale(1.3)';
    setTimeout(()=>{
        heart.remove();
        e.target.style.transform = 'scale(1)';
    },600);
}

function filterPosts() {
    document.querySelectorAll('#postList .post').forEach(card => {
        const cat = card.getAttribute('data-category');
        card.style.display = (currentFilter==='全部' || cat===currentFilter) ? 'block' : 'none';
    });
}

function previewVideo(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        const video = document.getElementById('videoPreview');
        video.src = reader.result;
        video.style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function openMapPicker() {
    const picker = document.getElementById('mapPicker');
    picker.style.display = 'block';
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('mapFrame').src = `https://maps.google.com/maps?q=${latitude},${longitude}&z=15&output=embed`;
        });
    }
}

function confirmLocation() {
    const frame = document.getElementById('mapFrame').src;
    if (!frame) return;
    const match = frame.match(/q=([^&]+)/);
    if (match) {
        document.getElementById('locationInput').value = decodeURIComponent(match[1]);
    }
    document.getElementById('mapPicker').style.display = 'none';
}

function scrollToComposer() {
    switchTab('community', document.querySelector('.bottom-nav button'));
    window.scrollTo({ top:0, behavior:'smooth' });
    document.getElementById('postInput').focus();
}

initFilters();

// 加入範例貼文
const samplePosts = `<div class="post" data-category="營地推薦"><div class="post-header"><img src="https://picsum.photos/80?random=10" class="avatar"><div><strong>Alan</strong><span class="badge">營地推薦</span><br><small style="color:#777;">2小時前 · 📍 宜蘭縣大同鄉</small></div></div><div class="post-content">推薦一個超棒的露營地！🌲 位於宜蘭縣大同鄉的「太平山莊」，夏天可以賞螢火蟲，冬天看雪景，一年四季都有不同風貌～<br><br>🚗 開車可達<br>⛺ 營位充足<br>🌲 原始森林環繞</div><img src="https://picsum.photos/600/400?random=11"><div class="reaction-bar"><div class="reaction-btn">👍 42</div><div class="reaction-btn">❤️ 28</div><div class="reaction-btn">💬 5</div><div>🔖</div></div></div>
<div class="post" data-category="裝備分享"><div class="post-header"><img src="https://picsum.photos/80?random=12" class="avatar"><div><strong>Luna</strong><span class="badge">裝備分享</span><br><small style="color:#777;">5小時前 · 📍 新北市</small></div></div><div class="post-content">我的新帳篷開箱！🏕️ 這次入手了 MSR Hubba Hubba，輕量又防水，很適合台灣山區的天氣。<br><br>優點：<br>✅ 輕量（只有1.5kg）<br>✅ 防水係數高<br>✅ 搭建簡單<br><br>缺點：💰 價格不便宜QQ</div><img src="https://picsum.photos/600/400?random=13"><div class="reaction-bar"><div class="reaction-btn">👍 65</div><div class="reaction-btn">❤️ 43</div><div class="reaction-btn">💬 12</div><div>🔖</div></div></div>
<div class="post" data-category="美食料理"><div class="post-header"><img src="https://picsum.photos/80?random=14" class="avatar"><div><strong>Tom</strong><span class="badge">美食料理</span><br><small style="color:#777;">昨天 · 📍 台中市和平區</small></div></div><div class="post-content">露營就是要烤肉！🔥 分享一下我的烤肉秘方～<br><br>🥩 牛肉：用醬油、味醂、糖調味<br>🥬 蔬菜：玉米、甜椒、杏鮑菇<br>🍺 啤酒：台灣精釀<br><br>大家露營都吃什麼？</div><img src="https://picsum.photos/600/400?random=15"><div class="reaction-bar"><div class="reaction-btn">👍 89</div><div class="reaction-btn">❤️ 67</div><div class="reaction-btn">💬 23</div><div>🔖</div></div></div>`;
document.getElementById('postList').innerHTML = samplePosts;

// 探索頁範例資料
const exploreData = {
    camp: [
        { name: '太平山森林遊樂區', location: '宜蘭縣大同鄉', desc: '高海拔森林營地，雲海與檜木林環繞，四季皆美。', img: 'https://picsum.photos/600/400?random=21' },
        { name: '清境小瑞士花園營地', location: '南投縣仁愛鄉', desc: '可遠眺合歡山，夜晚星空清晰，親子友善。', img: 'https://picsum.photos/600/400?random=22' },
        { name: '墾丁後灣露營區', location: '屏東縣恆春鎮', desc: '海景第一排，適合露營車與沙灘活動。', img: 'https://picsum.photos/600/400?random=23' }
    ],

function switchExploreTab(type, el) {
    document.querySelectorAll('#exploreTabs .chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    renderExplore(type);
}

function renderExplore(type) {
    const container = document.getElementById('exploreContent');
    container.innerHTML = '';
    exploreData[type].forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.borderRadius = '16px';
        card.style.overflow = 'hidden';
        card.style.marginBottom = '16px';
        card.innerHTML = `
            <img src="${item.img}" style="width:100%;height:180px;object-fit:cover;">
            <div style="padding:14px;">
                <strong style="font-size:16px;">${item.name}</strong><br>
                <small style="color:#777;">📍 ${item.location}</small>
                <p style="margin-top:8px;font-size:14px;line-height:1.5;">${item.desc}</p>
                <button class="btn btn-primary" style="margin-top:10px;">查看詳情</button>
            </div>
        `;
        container.appendChild(card);
    });
}

// 初始化探索頁
