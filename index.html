<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camping App v14.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1b2430;
      --accent: linear-gradient(135deg,#ff7e5f,#feb47b);
      --soft: #eef2f7;
    }
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --soft: #1a2233;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 20% 20%, #ffd6c7 0%, transparent 40%), var(--bg);
      color: var(--text);
      transition: .3s ease;
      min-height:100vh;
    }
    header { padding: 20px; display:flex; justify-content:space-between; align-items:center; }
    h1 { font-family:'Playfair Display', serif; font-size:28px; }
    .toggle { cursor:pointer; padding:8px 14px; border-radius:20px; background:var(--accent); color:#fff; border:none; }
    .controls { padding:20px; display:flex; gap:10px; flex-wrap:wrap; }
    input, select { padding:10px; border-radius:10px; border:1px solid #ccc; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; }
    .card { background:var(--card); border-radius:18px; padding:18px; box-shadow:0 8px 20px rgba(0,0,0,0.08); transition:.3s; position:relative; }
    .card:hover { transform:translateY(-6px); }
    .badge { position:absolute; top:15px; right:15px; background:var(--accent); color:#fff; padding:4px 10px; border-radius:12px; font-size:12px; }
    .btn { margin-top:10px; margin-right:6px; padding:8px 14px; border:none; border-radius:12px; background:var(--accent); color:#fff; cursor:pointer; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; }
    .modal-content { background:var(--card); padding:30px; border-radius:20px; max-width:400px; width:90%; animation:pop .4s ease; }
    @keyframes pop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
    .skeleton { background:linear-gradient(90deg,#ddd 25%,#eee 50%,#ddd 75%); background-size:200% 100%; animation:shine 1.5s infinite; height:160px; border-radius:18px; }
    @keyframes shine { to{background-position:-200% 0;} }
    .booking { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; padding:14px 28px; border-radius:30px; display:none; animation:slide .6s ease; }
    @keyframes slide { from{opacity:0; transform:translate(-50%,50px);} to{opacity:1; transform:translate(-50%,0);} }
  </style>
</head>
<body>
  <header>
    <h1>Camping Explorer v14.0</h1>
    <button class="toggle" onclick="toggleDark()">Dark Mode</button>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search camps..." oninput="render()" />
    <select id="filter" onchange="render()">
      <option value="">All Types</option>
      <option value="Forest">Forest</option>
      <option value="Lake">Lake</option>
      <option value="Mountain">Mountain</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

  <div class="modal" id="modal" onclick="closeModal(event)">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <div class="booking" id="bookingMsg">Booking Confirmed!</div>

  <script>
    const camps = Array.from({length:22}, (_,i)=>({
      name:`Camp ${i+1}`,
      type:["Forest","Lake","Mountain"][i%3],
      price:50 + i*5,
      description:"Beautiful scenery and peaceful vibes with full facilities."
    }));

    const grid = document.getElementById('grid');

    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      const filter = document.getElementById('filter').value;
      grid.innerHTML = '';

      const filtered = camps.filter(c =>
        c.name.toLowerCase().includes(search) &&
        (filter === '' || c.type === filter)
      );

      if (!filtered.length) { grid.innerHTML = '<p>No camps found.</p>'; return; }

      filtered.forEach(c => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="badge">${c.type}</div>
          <h3>${c.name}</h3>
          <p>$${c.price}/night</p>
          <button class="btn" onclick="openModal('${c.name}')">Shop</button>
          <button class="btn" onclick="book()">Book</button>
        `;
        grid.appendChild(card);
      });
    }

    function openModal(name) {
      const camp = camps.find(c=>c.name===name);
      document.getElementById('modalContent').innerHTML = `
        <h2>${camp.name}</h2>
        <p>Type: ${camp.type}</p>
        <p>${camp.description}</p>
        <p><strong>$${camp.price}/night</strong></p>
        <button class="btn" onclick="book()">Book Now</button>
      `;
      document.getElementById('modal').style.display='flex';
    }

    function closeModal(e){ if(e.target.id==='modal') document.getElementById('modal').style.display='none'; }

    function book(){
      const msg=document.getElementById('bookingMsg');
      msg.style.display='block';
      setTimeout(()=>msg.style.display='none',2000);
      document.getElementById('modal').style.display='none';
    }

    function toggleDark(){ document.body.classList.toggle('dark'); }

    function showSkeleton(){
      for(let i=0;i<6;i++){
        const s=document.createElement('div');
        s.className='skeleton';
        grid.appendChild(s);
      }
    }

    showSkeleton();
    setTimeout(render,1200);
  </script>
</body>
</html>
