        function doLogin() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value || username + '@example.com';
            const password = document.querySelector('#loginModal input[type="password"]').value;
            
            if (!username || !password) { alert('請輸入用戶名和密碼'); return; }
            
            if (isRegister) {
                window.createUserWithEmailAndPassword(window.firebaseAuth, email, password)
                    .then((userCredential) => {
                        firebaseUser = userCredential.user;
                        currentUser = username;
                        userProfile = { name: username, email: email, avatar: '' };
                        updateUIAfterLogin();
                        alert('註冊成功！');
                    })
                    .catch((error) => {
                        alert('註冊失敗: ' + error.message);
                    });
            } else {
                window.signInWithEmailAndPassword(window.firebaseAuth, email, password)
                    .then((userCredential) => {
                        firebaseUser = userCredential.user;
                        currentUser = username;
                        updateUIAfterLogin();
                    })
                    .catch((error) => {
                        alert('登入失敗: ' + error.message);
                    });
            }
        }
        
        function signInWithGoogle() {
            console.log('Starting Google sign in...');
            window.signInWithPopup(window.firebaseAuth, window.googleProvider)
                .then((result) => {
                    console.log('Google sign in success:', result);
                    const user = result.user;
                    currentUser = user.displayName || user.email.split('@')[0];
                    userProfile = { name: user.displayName, email: user.email, avatar: user.photoURL };
                    updateUIAfterLogin();
                }).catch((error) => {
                    console.error('Google sign in error:', error);
                    alert('Google 登入失敗: ' + error.code + ' - ' + error.message);
                });
        }
        
        function updateUIAfterLogin() {
            document.getElementById('headerButtons').innerHTML = `<div style="display:flex;align-items:center;gap:8px"><div class="post-avatar" style="width:32px;height:32px;font-size:14px;margin:0">${currentUser[0]}</div><span style="color: white;">${currentUser}</span> <button onclick="logout()">登出</button></div>`;
            document.getElementById('fabBtn').style.display = 'block';
            closeModal('loginModal');
            renderPosts();
            renderProfile();
        }
        
        function logout() {
            window.signOut(window.firebaseAuth).then(() => {
                currentUser = null;
                firebaseUser = null;
                userProfile = { name: '', email: '', avatar: '' };
                isEditingProfile = false;
                document.getElementById('headerButtons').innerHTML = '<button onclick="showLogin()">登入</button>';
                document.getElementById('fabBtn').style.display = 'none';
                renderPosts();
                renderProfile();
            });
        }
        
        // Listen for auth state changes
        window.onAuthStateChanged(window.firebaseAuth, (user) => {
            if (user) {
                firebaseUser = user;
            }
        });
        
        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(tab + 'Page').classList.add('active');
            
            const tabIndex = { 'posts': 0, 'camps': 1, 'shops': 2, 'rentals': 3 };
            document.querySelectorAll('.tab')[tabIndex[tab]].classList.add('active');
            document.querySelectorAll('.nav-item')[tabIndex[tab]].classList.add('active');
        }
        
        function renderCampList(filter = '') {
            const list = document.getElementById('campList');
            const filtered = campgrounds.filter(c => c.name.includes(filter) || c.location.includes(filter));
            
            list.innerHTML = filtered.map(camp => `
                <div class="card">
                    <img src="${camp.image}" alt="${camp.name}">
                    <div class="card-info">
                        <div class="card-name">${camp.name}</div>
                        <div class="card-location">📍 ${camp.location}</div>
                        <div class="card-tags">${camp.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                        <div class="card-price">💰 ${camp.price} / 晚</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderShopList() {
            const list = document.getElementById('shopList');
            list.innerHTML = shops.map(shop => `
                <div class="card">
                    <img src="${shop.image}" alt="${shop.name}">
                    <div class="card-info">
                        <div class="card-name">${shop.name}</div>
                        <div class="card-location">📍 ${shop.location}</div>
                        <div class="card-tags">${shop.tags.map(t => `<span class="tag orange">${t}</span>`).join('')}</div>
                        <div class="card-phone">📞 ${shop.phone}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderRentalList() {
            const list = document.getElementById('rentalList');
            list.innerHTML = rentals.map(rental => `
                <div class="card">
                    <img src="${rental.image}" alt="${rental.name}">
                    <div class="card-info">
                        <div class="card-name">${rental.name}</div>
                        <div class="card-location">📍 ${rental.location}</div>
                        <div class="card-tags">${rental.tags.map(t => `<span class="tag orange">${t}</span>`).join('')}</div>
                        <div class="card-price">💰 ${rental.price}</div>
                        <div class="card-phone">📞 ${rental.phone}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function searchCamps() {
            const query = document.getElementById('searchInput').value;
            renderCampList(query);
        }
        
        function renderStories() {
            const container = document.getElementById('storiesBar');
            if (container) {
                container.innerHTML = stories.map(s => `
                    <div class="story-item">
                        <div class="story-ring">
                            <div class="story-avatar">${s.avatar}</div>
                        </div>
                        <div class="story-name">${s.user}</div>
                    </div>
                `).join('');
            }
        }
        
        function renderBreakingNews() {
            const container = document.getElementById('breakingNews');
            if (container) {
                container.innerHTML = breakingNews.map(news => `
                    <div class="breaking-news">
                        <div class="breaking-news-title">${news.title}</div>
                        <div class="breaking-news-content">${news.content}</div>
                        <div style="font-size:12px;opacity:0.8;margin-top:5px">${news.time}</div>
                    </div>
                `).join('');
            }
        }
        
        function renderPosts() {
            const list = document.getElementById('postList');
            const allPosts = currentUser ? [
                ...posts,
                { id: 4, user: currentUser, content: "歡迎來到露營趣社群！", time: "剛剛", likes: 0, isNew: true }
            ] : posts;
            
            list.innerHTML = allPosts.map(post => {
                let mediaHtml = '';
                if (post.images && post.images.length > 0) {
                    mediaHtml += '<div class="post-images-full">' + post.images.map(img => `<img src="${img}">`).join('') + '</div>';
                }
                if (post.video) {
                    mediaHtml += '<div class="post-images"><div class="video-preview">📹 影片</div></div>';
                }
                let locationHtml = post.location ? `<div style="color:#666;font-size:12px;margin-bottom:8px">📍 ${post.location}</div>` : '';
                
                return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">${post.user[0]}</div>
                        <div>
                            <div class="post-user">${post.user}</div>
                            <div class="post-time">${post.time}</div>
                        </div>
                    </div>
                    ${locationHtml}
                    <div class="post-content">${post.content}</div>
                    ${mediaHtml}
                    <div class="post-actions">
                        <span class="post-action" onclick="likePost(${post.id})">${likedPosts.includes(post.id) ? '❤️' : '🤍'} ${(post.likes || 0) + (likedPosts.includes(post.id) ? 1 : 0)}</span>
                        <span class="post-action">💬 留言</span>
                        <span class="post-action">🔗 分享</span>
                    </div>
                </div>
            `}).join('');
            
            if (!currentUser) {
                list.innerHTML += `<div style="text-align: center; padding: 20px; color: #666;">登入後可發布貼文</div>`;
            }
        }
        
        let likedPosts = [];
        
        function likePost(id) {
            if (!currentUser) { showLogin(); return; }
            const idx = likedPosts.indexOf(id);
            if (idx > -1) {
                likedPosts.splice(idx, 1);
            } else {
                likedPosts.push(id);
            }
            renderPosts();
        }
        
        function showPostModal() {
            if (!currentUser) { showLogin(); return; }
            document.getElementById('postModal').classList.add('active');
        }
        
        let uploadedImages = [];
        let uploadedVideo = null;
        
        function handleImageUpload(input) {
            const files = input.files;
            const preview = document.getElementById('mediaPreview');
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImages.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        }
        
        function handleVideoUpload(input) {
            const file = input.files[0];
            if (file) {
                const preview = document.getElementById('mediaPreview');
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedVideo = e.target.result;
                    const div = document.createElement('div');
                    div.className = 'video-preview';
                    div.innerHTML = '📹 ' + file.name.substring(0, 10);
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            }
        }
        
        function submitPost() {
            const content = document.getElementById('postContent').value;
            const location = document.getElementById('postLocation').value;
            if (!content) { alert('請輸入內容'); return; }
            
            posts.unshift({
                id: posts.length + 1,
                user: currentUser,
                content: content,
                location: location,
                images: uploadedImages,
                video: uploadedVideo,
                time: "剛剛",
                likes: 0
            });
            
            // Reset
            document.getElementById('postContent').value = '';
            document.getElementById('postLocation').value = '';
            uploadedImages = [];
            uploadedVideo = null;
            document.getElementById('mediaPreview').innerHTML = '';
            closeModal('postModal');
            renderPosts();
            alert('發布成功！');
        }
        
        function renderProfile() {
            const content = document.getElementById('profileContent');
            if (!currentUser) {
                content.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-avatar">👤</div>
                        <div class="profile-name">訪客</div>
                        <p style="color:#666;margin:20px 0">登入後可查看個人檔案</p>
                        <button class="profile-edit-btn" onclick="showLogin()">登入</button>
                    </div>
                `;
                return;
            }
            
            if (isEditingProfile) {
                content.innerHTML = `
                    <div class="profile-card">
                        <label class="profile-avatar" style="cursor:pointer">
                            ${userProfile.avatar ? `<img src="${userProfile.avatar}">` : currentUser[0]}
                            <input type="file" accept="image/*" onchange="handleAvatarUpload(this)" style="display:none">
                        </label>
                        <input type="text" class="profile-input" id="editName" value="${userProfile.name || currentUser}" placeholder="名稱">
                        <input type="email" class="profile-input" id="editEmail" value="${userProfile.email || ''}" placeholder="Email">
                        <button class="profile-edit-btn" onclick="saveProfile()">儲存</button>
                        <button class="profile-edit-btn" onclick="cancelEditProfile()" style="background:#999;margin-left:10px">取消</button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="profile-card">
                        <label class="profile-avatar" style="cursor:pointer">
                            ${userProfile.avatar ? `<img src="${userProfile.avatar}">` : currentUser[0]}
                            <input type="file" accept="image/*" onchange="handleAvatarUpload(this)" style="display:none">
                        </label>
                        <div class="profile-name">${userProfile.name || currentUser}</div>
                        <div class="profile-email">${userProfile.email || '未設定 Email'}</div>
                        <button class="profile-edit-btn" onclick="editProfile()">頭像設定</button>
                    </div>
                `;
            }
        }
        
        function editProfile() {
            isEditingProfile = true;
            renderProfile();
        }
        
        function cancelEditProfile() {
            isEditingProfile = false;
            renderProfile();
        }
        
        function saveProfile() {
            userProfile.name = document.getElementById('editName').value;
            userProfile.email = document.getElementById('editEmail').value;
            isEditingProfile = false;
            renderProfile();
            alert('資料已儲存！');
        }
        
        function handleAvatarUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userProfile.avatar = e.target.result;
                    renderProfile();
                };
                reader.readAsDataURL(file);
            }
        }
        
        // Init
        renderCampList();
        renderShopList();
        renderRentalList();
        renderStories();
        renderBreakingNews();
        renderPosts();
        renderProfile();
    </script>
</body>
</html>
