<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>露營趣 v13.0</title>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    :root{--forest:#1f3d2b;--sand:#e6d5b8;--sun:#f2a65a;--cream:#f9f6ef}
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans TC",sans-serif}
    body{background:linear-gradient(180deg,var(--cream),var(--sand));color:var(--forest)}
    header{padding:16px;font-size:20px;font-weight:700;text-align:center;background:var(--forest);color:white}
    .container{padding:16px 16px 80px}
    .tab{display:none}
    .tab.active{display:block}
    nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;display:flex}
    nav button{flex:1;padding:12px;border:none;background:white;font-weight:600}
    nav button.active{background:var(--sun);color:white}
    input,textarea,button{padding:8px;margin:4px 0;width:100%}
    .card{background:white;padding:12px;border-radius:8px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
    .vote{cursor:pointer;margin-right:8px}
    #map{height:300px;border-radius:8px}
    .shop-item{border-bottom:1px solid #eee;padding:8px 0}
  </style>
</head>
<body>
  <header>露營趣 Camping App v13.0</header>
  <div class="container">
    <div id="home" class="tab active">
      <h3>最新貼文</h3>
      <div id="postList"></div>
      <h4>發佈貼文</h4>
      <textarea id="postContent" placeholder="分享你的露營心得..."></textarea>
      <button onclick="addPost()">發佈</button>
    </div>
    <div id="mapTab" class="tab">
      <h3>營地地圖</h3>
      <div id="map"></div>
    </div>
    <div id="shop" class="tab">
      <h3>露營商家</h3>
      <input id="shopSearch" placeholder="搜尋商家" oninput="renderShops()"/>
      <div id="shopList"></div>
    </div>
    <div id="community" class="tab">
      <h3>搜尋貼文</h3>
      <input id="searchInput" placeholder="關鍵字" oninput="renderPosts()"/>
    </div>
    <div id="me" class="tab">
      <div id="authArea"></div>
      <div id="memberArea" style="display:none">
        <h4>會員 QR Code</h4>
        <div id="qrcode"></div>
        <h4>預約營地</h4>
        <input type="date" id="bookDate"/>
        <button onclick="bookCamp()">預約</button>
        <div id="bookingList"></div>
      </div>
    </div>
  </div>
  <nav>
    <button onclick="switchTab('home')" class="active">首頁</button>
    <button onclick="switchTab('mapTab')">地圖</button>
    <button onclick="switchTab('shop')">商家</button>
    <button onclick="switchTab('community')">社群</button>
    <button onclick="switchTab('me')">我的</button>
  </nav>
  <script>
    const tabs=document.querySelectorAll('.tab');
    const navBtns=document.querySelectorAll('nav button');
    function switchTab(id){tabs.forEach(t=>t.classList.remove('active'));navBtns.forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active')}
    function renderAuth(){const user=localStorage.getItem('user');const area=document.getElementById('authArea');if(!user){area.innerHTML=`<h4>登入</h4><input id='username' placeholder='輸入名稱'/><button onclick='login()'>登入</button>`;document.getElementById('memberArea').style.display='none'}else{area.innerHTML=`<p>歡迎 ${user}</p><button onclick='logout()'>登出</button>`;document.getElementById('memberArea').style.display='block';document.getElementById('qrcode').innerHTML='';new QRCode(document.getElementById('qrcode'),user);renderBookings()}}
    function login(){const name=document.getElementById('username').value;if(name){localStorage.setItem('user',name);renderAuth()}}
    function logout(){localStorage.removeItem('user');location.reload()}
    function getPosts(){return JSON.parse(localStorage.getItem('posts')||'[]')}
    function savePosts(p){localStorage.setItem('posts',JSON.stringify(p))}
    function addPost(){const c=document.getElementById('postContent').value;if(!c)return;const p=getPosts();p.unshift({id:Date.now(),content:c,votes:0,comments:[]});savePosts(p);renderPosts();document.getElementById('postContent').value=''}
    function vote(id){const p=getPosts();const t=p.find(x=>x.id===id);t.votes++;savePosts(p);renderPosts()}
    function addComment(id){const text=document.getElementById('c'+id).value;const p=getPosts();const t=p.find(x=>x.id===id);t.comments.push(text);savePosts(p);renderPosts()}
    function renderPosts(){const k=document.getElementById('searchInput')?.value||'';const list=document.getElementById('postList');list.innerHTML='';getPosts().filter(p=>p.content.includes(k)).forEach(p=>{const d=document.createElement('div');d.className='card';d.innerHTML=`<p>${p.content}</p><span class='vote' onclick='vote(${p.id})'>👍 ${p.votes}</span><div>${p.comments.map(c=>`<p>💬 ${c}</p>`).join('')}<input id='c${p.id}' placeholder='留言...'/><button onclick='addComment(${p.id})'>留言</button></div>`;list.appendChild(d)})}
    const shops=["山林裝備","露營達人","戶外生活館"];
    function renderShops(){const q=document.getElementById('shopSearch').value||'';const list=document.getElementById('shopList');list.innerHTML='';shops.filter(s=>s.includes(q)).forEach(s=>{list.innerHTML+=`<div class='shop-item'>${s}</div>`})}
    function bookCamp(){const d=document.getElementById('bookDate').value;if(!d)return;const b=JSON.parse(localStorage.getItem('bookings')||'[]');b.push(d);localStorage.setItem('bookings',JSON.stringify(b));renderBookings()}
    function renderBookings(){const list=document.getElementById('bookingList');list.innerHTML='';const b=JSON.parse(localStorage.getItem('bookings')||'[]');b.forEach(x=>list.innerHTML+=`<p>📅 ${x}</p>`)}
    const map=L.map('map').setView([23.7,121],7);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);L.marker([24.1477,120.6736]).addTo(map).bindPopup('示範營地');
    renderAuth();renderPosts();renderShops();
  </script>
</body>
</html>
