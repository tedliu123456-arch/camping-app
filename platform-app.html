<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camping App v50.1（需求整合版）</title>
  <style>
    :root{
      --bg:#f3f6fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;
      --pri:#2563eb;--ok:#16a34a;--danger:#dc2626;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
    .container{max-width:1120px;margin:0 auto;padding:12px;padding-top:182px;padding-bottom:86px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;transition:box-shadow .18s ease,border-color .18s ease,transform .18s ease}
    .card:active{transform:translateY(1px)}
    .card:hover{box-shadow:0 8px 18px rgba(15,23,42,.08);border-color:#dbe2ea}
    .muted{color:var(--muted);font-size:13px;line-height:1.55}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:1002;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(15,23,42,.03)}
    .topbar-inner{max-width:1120px;margin:0 auto;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;transition:background-color .16s ease;padding-left:14px;padding-right:14px}
    .topbar:hover .topbar-inner{background:#f8fbff}
    .brand{font-weight:900;color:#0f172a;letter-spacing:.25px;transition:color .16s ease,text-shadow .16s ease}
    .topbar:hover .brand{color:#1d4ed8;text-shadow:0 1px 0 rgba(255,255,255,.8)}
    .btn{border:0;background:var(--pri);color:#fff;padding:8px 12px;border-radius:10px;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(37,99,235,.22)}
    .btn.ghost{background:#fff;color:#111827;border:1px solid #d1d5db}
    .btn.ghost:hover{background:#f8fafc;border-color:#94a3b8;box-shadow:0 6px 12px rgba(15,23,42,.10)}
    .btn.ok{background:var(--ok)}
    .btn.danger{background:var(--danger)}
    .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;position:fixed;top:49px;left:0;right:0;z-index:1001;background:var(--bg);padding:8px 13px}
    .sticky-marquee{position:fixed;top:103px;left:12px;right:12px;z-index:1000;padding-bottom:2px}
    .tab{border:1.5px solid #d1d5db;background:#fff;color:#111827;padding:9px 6px;cursor:pointer;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:56px;position:relative;box-shadow:0 4px 12px rgba(15,23,42,.11);transition:transform .14s ease,box-shadow .14s ease,filter .14s ease}
    .tab:hover{transform:translateY(-1px);box-shadow:0 8px 16px rgba(15,23,42,.15);filter:saturate(1.05)}
    .tab.active{background:#93c5fd;border-color:#60a5fa;color:#0f172a;transform:translateY(-2px);z-index:2;box-shadow:0 10px 18px rgba(59,130,246,.19),inset 0 1px 0 rgba(255,255,255,.55)}
    .section{display:none}.section.active{display:block}

    .tab .tab-txt{font-size:12px;line-height:1.1;white-space:nowrap;letter-spacing:.35px}
    .tab-social{border-radius:18px 8px 8px 18px;background:#dbeafe;border-color:#93c5fd;color:#1e3a8a;clip-path:polygon(0 0,84% 0,100% 28%,100% 72%,84% 100%,0 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}
    .tab-mod{margin-left:-1px;border-radius:10px;background:#dcfce7;border-color:#86efac;color:#166534;clip-path:polygon(0 28%,12% 0,84% 0,100% 28%,100% 72%,84% 100%,12% 100%,0 72%,8% 50%);box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}
    .tab-gear{margin-left:-1px;border-radius:10px;background:#fef3c7;border-color:#fcd34d;color:#92400e;clip-path:polygon(0 28%,12% 0,84% 0,100% 28%,100% 72%,84% 100%,12% 100%,0 72%,8% 50%);box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}
    .tab-rental{margin-left:-1px;border-radius:8px 18px 18px 8px;background:#fee2e2;border-color:#fca5a5;color:#991b1b;clip-path:polygon(0 28%,12% 0,100% 0,100% 100%,12% 100%,0 72%,8% 50%);box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}

    .marquee{overflow:hidden;white-space:nowrap;position:relative;border-radius:10px}
    .marquee-track{display:inline-flex;gap:10px;min-width:max-content;animation:marqueeMove 18s linear infinite}
    .marquee-item{background:#eef2ff;border:1px solid #c7d2fe;color:#3730a3;padding:6px 10px;border-radius:999px;font-size:13px;transition:transform .14s ease,box-shadow .14s ease,background-color .14s ease}
    .marquee-item:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(55,48,163,.18);background:#e3e9ff}
    @keyframes marqueeMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    .contest-banner{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border-radius:12px;padding:10px;position:relative;margin-top:120px;box-shadow:0 10px 22px rgba(37,99,235,.20)}
    .contest-row{display:flex;gap:10px;overflow:auto;padding-top:8px}
    .contest-card{position:relative;min-width:120px;height:84px;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid rgba(255,255,255,.5);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
    .contest-card:hover{transform:translateY(-2px);box-shadow:0 10px 18px rgba(15,23,42,.22);border-color:rgba(255,255,255,.9)}
    .contest-card img{width:100%;height:100%;object-fit:cover}
    .contest-vote{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.65);padding:2px 6px;border-radius:999px;font-size:12px;backdrop-filter:blur(2px);border:1px solid rgba(255,255,255,.28)}
    .contest-upload-btn{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;background:linear-gradient(135deg,#ffffff,#eef4ff);color:#1e3a8a;border:1px solid rgba(255,255,255,.78);box-shadow:0 8px 16px rgba(15,23,42,.18);font-weight:800;font-size:13px;line-height:1.1}
    .contest-upload-btn:hover{transform:translateY(-1px);box-shadow:0 10px 20px rgba(15,23,42,.22)}
    .contest-upload-btn .cam-ico{width:20px;height:14px;border:2px solid #2563eb;border-radius:4px;display:inline-block;position:relative;transform:rotate(45deg);background:rgba(255,255,255,.75)}
    .contest-upload-btn .cam-ico::before{content:'';position:absolute;left:50%;top:50%;width:6px;height:6px;border:2px solid #2563eb;border-radius:50%;transform:translate(-50%,-50%)}
    .contest-upload-btn .cam-ico::after{content:'';position:absolute;right:2px;top:-5px;width:6px;height:4px;border:2px solid #2563eb;border-bottom:none;border-radius:3px 3px 0 0;background:#fff}

    #feedList{display:flex;flex-direction:column;gap:10px;scroll-snap-type:y proximity}
    .feed-item{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;overflow:hidden;scroll-snap-align:start}
    .feed-item:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(15,23,42,.10);border-color:#d7dee8}
    .feed-item.feed-video{padding:8px}
    .feed-media{width:100%;max-height:340px;object-fit:cover;border-radius:10px;margin-top:8px;background:#000;border:1px solid #d1d5db}
    .feed-item.feed-video .feed-media{aspect-ratio:9/16;max-height:68vh;object-fit:cover}
    .actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
    .pill{display:inline-block;background:#e0ecff;color:#1e40af;padding:3px 8px;border-radius:999px;font-size:12px;transition:background-color .14s ease,color .14s ease}
    .feed-item:hover .pill{background:#dbeafe;color:#1e3a8a}

    .store-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));align-items:start}
    .store-title{font-weight:800;letter-spacing:.2px;transition:color .14s ease,transform .14s ease}
    .card:hover .store-title{color:#1d4ed8;transform:translateX(1px)}
    .store-focus{outline:3px solid #2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.15)}
    .store-photos{display:flex;gap:10px;margin-top:8px}
    .store-photo{position:relative;width:calc(50% - 4px);height:100px;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #d1d5db;background:#f3f4f6;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
    .store-photo:hover{transform:translateY(-2px);box-shadow:0 10px 18px rgba(15,23,42,.14);border-color:#9ca3af}
    .store-photo img{width:100%;height:100%;object-fit:cover}
    .store-more{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);color:#fff;font-weight:800;backdrop-filter:blur(1.5px);letter-spacing:.3px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;padding:2px 0}
    input,select,textarea{width:100%;padding:9px;border:1px solid #d1d5db;border-radius:10px;transition:border-color .15s ease, box-shadow .15s ease}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    button:focus-visible,.tab:focus-visible{outline:2px solid #2563eb;outline-offset:2px}

    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-end;justify-content:center;z-index:2000}
    .sheet{width:min(820px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px 18px 0 0;padding:14px;box-shadow:0 -18px 42px rgba(15,23,42,.28);border:1px solid #e5e7eb;border-bottom:none}
    .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eef2f7}

    .contest-grid{display:grid;grid-template-columns:1fr;gap:15px}
    .contest-entry img{width:100%;height:auto;border-radius:12px}
    .contest-entry-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}

    .dm-fab{position:fixed;right:16px;bottom:16px;z-index:1200;background:#0ea5e9}
    .post-fab{position:fixed;right:16px;bottom:62px;z-index:1200}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:1200;background:#fff;border-top:1px solid #d1d5db;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));align-items:end;backdrop-filter:saturate(1.04)}
    .bottom-nav button{width:100%;padding:10px 8px;border:1px solid #d1d5db;background:#fff;border-radius:10px;font-weight:700;color:#111827;transition:transform .14s ease,box-shadow .14s ease,background-color .14s ease,color .14s ease;letter-spacing:.1px}
    .bottom-nav button:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(15,23,42,.13)}
    .bottom-nav button.active{background:#2563eb;color:#fff;border-color:#2563eb}
    .bottom-nav .bn-go{width:100%;height:68px;margin:0 auto;transform:translateY(-6px);font-size:12px;line-height:1.2;font-weight:900;padding:0 8px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#d6bf9d;color:#4b3a27;border:1px solid #b89c76;box-shadow:0 8px 20px rgba(139,111,78,.25);clip-path:polygon(50% 0%, 100% 36%, 100% 100%, 0% 100%, 0% 36%)}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;z-index:3000;display:none;box-shadow:0 8px 20px rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.18);letter-spacing:.2px}
    .upload-progress{margin-top:8px;display:none}
    .upload-track{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;border:1px solid #d1d5db}
    .upload-fill{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#0ea5e9);transition:width .2s ease;box-shadow:0 0 0 1px rgba(255,255,255,.18) inset}
    .dm-thread-active{background:#2563eb !important;color:#fff !important;border-color:#2563eb !important}
    .dm-layout{display:grid;grid-template-columns:280px 1fr;gap:10px;min-height:56vh}
    .dm-sidebar{border:1px solid var(--line);border-radius:12px;background:#f8fafc;padding:8px;overflow:auto}
    .dm-main{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;display:flex;flex-direction:column;min-height:56vh;overflow:hidden}
    .dm-messages{flex:1;overflow:auto;padding-right:2px;padding-bottom:6px}
    .dm-input-row{display:flex;gap:6px;margin-top:6px;position:sticky;bottom:0;background:#fff;padding-top:6px;border-top:1px solid #eef2f7}
    .dm-thread-btn{width:100%;text-align:left;margin:0 0 6px 0;padding:10px;border-radius:12px;display:flex;gap:10px;align-items:flex-start}
    .dm-avatar{width:36px;height:36px;border-radius:50%;background:#dbeafe;color:#1e3a8a;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 36px}
    .dm-thread-meta{min-width:0;flex:1}
    .dm-thread-top{display:flex;justify-content:space-between;gap:8px;font-size:12px}
    .dm-thread-name{font-weight:700;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .dm-thread-time{color:#6b7280;flex:0 0 auto}
    .dm-thread-last{font-size:12px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
    .dm-msg{max-width:85%;padding:8px 10px;border-radius:12px;margin-bottom:6px;font-size:13px;line-height:1.5}
    .dm-msg.mine{margin-left:auto;background:#dbeafe;color:#0f172a}
    .dm-msg.other{background:#f3f4f6;color:#1f2937}
    .dm-main-head{font-weight:700;padding-bottom:8px;border-bottom:1px solid #e5e7eb;margin-bottom:8px}

    .admin-wrap{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:980px){.admin-wrap{grid-template-columns:1fr 1fr}}

    /* 手機優先優化 */
    @media (max-width: 768px){
      .container{padding:8px}
      .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;top:49px;padding:8px 6px;overflow:visible;white-space:normal}
      .sticky-marquee{top:102px}
      .contest-banner{margin-top:138px}
      .tab{min-width:0;flex:1 1 auto;min-height:50px;padding:7px 4px}.tab .tab-txt{font-size:11px}
      .card{padding:10px;border-radius:12px}
      .topbar-inner{padding:9px 10px}
      .container{padding-bottom:96px}
      .dm-layout{grid-template-columns:1fr;min-height:52vh}
      .dm-sidebar{max-height:170px}
      .dm-main{min-height:46vh;padding:8px}
      .dm-msg{max-width:92%}
      .feed-item.feed-video .feed-media{max-height:60vh}
    }

    /* 私訊與發文改為全頁 */
    #postModal.overlay, #dmModal.overlay{align-items:stretch;justify-content:stretch;background:#fff}
    #storeGalleryModal.overlay{align-items:stretch;justify-content:stretch;background:#fff}
    #postModal .sheet, #dmModal .sheet{width:100vw;max-width:none;max-height:100vh;border-radius:0;padding:12px}
    #storeGalleryModal .sheet{width:100vw;max-width:none;max-height:100vh;border-radius:0;padding:12px}

  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">🏕️ Go Camping <span id="appVersion" class="muted" style="font-size:12px;margin-left:6px"></span></div>
      <div style="display:flex;gap:8px;align-items:center;position:relative">
        <button id="userEntry" class="btn ghost" onclick="handleUserEntry()" style="width:40px;height:40px;border-radius:999px;padding:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-weight:800">訪客</button>
        <div id="userMenu" class="card" style="display:none;position:absolute;right:0;top:46px;min-width:140px;z-index:1300;padding:6px">
          <button id="userMenuProfile" class="btn ghost" style="width:100%;text-align:left;margin-bottom:6px" onclick="openProfileFromUserMenu()">個人資料</button>
          <button id="userMenuLogout" class="btn ghost" style="width:100%;text-align:left" onclick="logoutFromUserMenu()">登出</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="tabs" id="tabs"></div>

    <section id="sec-social" class="section active">
      <div class="card sticky-marquee">
        <div style="font-weight:800;margin-bottom:6px">📣 活動跑馬燈</div>
        <div id="announceMarquee" class="marquee"></div>
      </div>

      <div id="contestBanner" class="card contest-banner">
        <div style="display:flex;justify-content:flex-end;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px">
          <button id="contestPostBtnTop" class="btn contest-upload-btn" onclick="openPostModal('contest')"><span class="cam-ico"></span><span>我要投稿</span></button>
        </div>
        <div id="contestThemeTitle" style="font-weight:800;margin-top:6px">每月主題｜我的露營早晨</div>

        <div id="contestBannerList" class="contest-row"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800">社群貼文</div>
          <button id="socialPostBtnTop" class="btn" onclick="openPostModal('social')">＋ 發文</button>
        </div>
        <div id="feedList" style="margin-top:10px"></div>
        <div id="guestPhotoWall" style="margin-top:10px"></div>
      </div>
    </section>

    <section id="sec-campsite" class="section">
      <div class="card">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="font-weight:800">營地搜尋</div>
          <input id="campSearch" placeholder="輸入地區/關鍵字（例：靠海、親子、夜景）" style="max-width:320px" />
          <button class="btn ghost" onclick="openGoogleMapSearch()">Google Maps 搜尋</button>
          <button id="campAdminAddBtn" class="btn" style="display:none" onclick="openAdminCampsiteModal('create')">＋ 新增營區</button>
        </div>
      </div>
      <div id="campsiteList" class="store-grid"></div>
    </section>

    <section id="sec-mod" class="section"><div id="modList" class="store-grid"></div></section>
    <section id="sec-gear" class="section"><div id="gearList" class="store-grid"></div></section>
    <section id="sec-rental" class="section"><div id="rentalList" class="store-grid"></div></section>
  </div>



  <div id="bottomNav" class="bottom-nav">
    <button id="bn-post" onclick="openPostModal('social')">➕ 貼文</button>
    <button id="bn-campsite" class="bn-go" onclick="goCampsite()">🏕️<span>Go Camping</span></button>
    <button id="bn-dm" onclick="openDM()">💬 私訊</button>
  </div>

  <div id="loginModal" class="overlay" onclick="if(event.target===this) closeLoginModal()">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-head"><h3 style="margin:0">登入 / 訪客</h3><button class="btn ghost" onclick="closeLoginModal()">關閉</button></div>
      <div class="field"><label>暱稱</label><input id="loginName" placeholder="輸入名稱" maxlength="20" minlength="2" autocomplete="nickname" oninput="updateLoginNameCounter()" onblur="normalizeLoginName()" /><div id="loginNameCounter" class="muted" style="text-align:right" aria-live="polite">0/20</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="googleAuthLogin()">Google 登入</button>
        <button class="btn" onclick="lineAuthLogin()">LINE 登入</button>
        <button class="btn" onclick="memberLogin('facebook')">Facebook 登入</button>
        <button class="btn ghost" onclick="enterGuestMode()">訪客模式（免登入）</button>
        <button class="btn ghost" onclick="clearLoginName()">清空名稱</button>
        <button class="btn" onclick="openBackendLogin()">商家 / 平台後台登入</button>
      </div>
      <div id="lastProviderHint" class="muted" style="margin-top:8px"></div>
    </div>
  </div>

  <div id="profileModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">個人資料編輯</h3><button class="btn ghost" onclick="closeProfileModal()">關閉</button></div>
      <div class="field"><label>暱稱</label><input id="pf-name" maxlength="20" /></div>
      <div class="field"><label>頭像設定</label><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><img id="pf-avatar-preview" alt="avatar" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:1px solid #e5e7eb;background:#f3f4f6"/><input id="pf-avatar-file" type="file" accept="image/*" onchange="onProfileAvatarSelected()" /><button class="btn ghost" type="button" onclick="clearProfileAvatar()">清除頭像</button></div></div>
      <div class="field"><label>性別</label><select id="pf-gender"><option value="">未設定</option><option>男</option><option>女</option><option>其他</option></select></div>

      const n=(file.name||'').toLowerCase();
      if(/\.(jpg|jpeg|png|gif|webp|heic|heif)$/.test(n)) return 'image';

    function mergeTaichungCampsites(rows=[]){
      let changed = false;
      rows.forEach(r=>{
        const name = String(r.name||'').trim();
        if(!name) return;
        const ex = state.stores.find(s=>s.category==='campsite' && s.name===name);
        const payload = {
          category:'campsite',
          name,
          address:String(r.address||'').trim(),
          contact:String(r.contact||'').trim(),
          description:String(r.description||'').trim() || '台中露營區資料',
          elevation:String(r.elevation||'').trim(),
          tentCount:String(r.total_sites||'').trim(),
          zones:String(r.camp_size||'').trim(),
          sourceUrl:String(r.source_url||r.sourceUrl||'').trim(),
          hours:String(r.hours||'').trim(),
          website:String(r.website||'').trim(),
          isMember:false
        };
        if(ex){
          Object.assign(ex, {
            ...ex,
            ...payload,
            photos: []
          });
          changed = true;
        }else{
          state.stores.push({id:uid(), ...payload, photos:[]});
          changed = true;
        }
      });
      return changed;
    }

    function cleanupLegacyCampsites(){
      const before = (state.stores||[]).length;
      state.stores = (state.stores||[]).filter(s=>{
        if(s.category!=='campsite') return true;
        const name = String(s.name||'').trim();
        if(!name) return false;
        if(name==='海風營地') return false;
        if(/^營地\d+$/.test(name)) return false;
        return true;
      }).map(s=> s.category==='campsite' ? {...s, photos:[]} : s);
      return (state.stores||[]).length !== before;
    }

    async function loadBundledTaichungCampsites(){
      try{
        const res = await fetch('./data/taichung-campsites.json', {cache:'no-store'});
        if(!res.ok) return;
        const data = await res.json();
        const rows = Array.isArray(data) ? data : (data.rows||[]);
        if(!Array.isArray(rows) || !rows.length) return;
        const changed = mergeTaichungCampsites(rows);
        if(changed) await saveState();
      }catch(e){
        console.warn('load bundled taichung campsites fail', e);
      }
    }

          console.warn('firebase config missing for env', APP_ENV);
          return;
        }
        const appName = `camping-${APP_ENV}`;
        let app;
        try{ app = firebase.app(appName); }
        catch{ app = firebase.initializeApp(cfg, appName); }
        db = app.firestore();
        storage = app.storage();
        auth = app.auth();
      }catch(e){ console.warn('firebase init fallback', e); }
    }

    function normalizeAnnouncements(){
      state.announcements = (state.announcements||[]).map(a=>{
        let storeId = a.storeId || null;
        let storeCategory = a.storeCategory || null;
        if(!storeId && a.merchantId && a.merchantId !== 'system'){
          const st = (state.stores||[]).find(s=>s.ownerMerchantId===a.merchantId);
          if(st){ storeId = st.id; storeCategory = st.category; }
        }
        return {
          id:a.id||uid(),
          title:a.title||a.text||'活動資訊',
          detail:a.detail||a.text||'',
          text:a.text||a.title||'',
          merchantId:a.merchantId||'system',
          merchantName:a.merchantName||'平台公告',
          storeId,
          storeCategory,
          createdAt:a.createdAt||new Date().toISOString()
        };
      });
    }

    function applyStateSnapshot(d={}){
      state.announcements = d.announcements || state.announcements;
      state.posts = d.posts || state.posts;
      state.contestEntries = d.contestEntries || state.contestEntries;
      state.contestTheme = d.contestTheme || state.contestTheme;
      state.contestPending = d.contestPending || state.contestPending;
      state.stores = d.stores || state.stores;
      state.merchantAccounts = d.merchantAccounts || state.merchantAccounts;
      state.memberAccounts = d.memberAccounts || state.memberAccounts;
      state.adminAccount = d.adminAccount || state.adminAccount;
      state.dmThreads = d.dmThreads || state.dmThreads;
    }

    function stateSnapshot(){
      return {
        announcements:state.announcements,
        posts:state.posts,
        contestEntries:state.contestEntries,
        contestTheme:state.contestTheme,
        contestPending:state.contestPending,
        stores:state.stores,
        merchantAccounts:state.merchantAccounts,
        memberAccounts:state.memberAccounts,
        adminAccount:state.adminAccount,
        dmThreads:state.dmThreads,
        updatedAt:new Date().toISOString()
      };
    }

    function loadLocalState(){
      try{
        const raw = localStorage.getItem(LOCAL_STATE_KEY);
        if(!raw) return false;
        const d = JSON.parse(raw);
        applyStateSnapshot(d||{});
        normalizeAnnouncements();
        return true;
      }catch(e){
        console.warn('load local state fail', e);
        return false;
      }
    }

    function saveLocalState(){
      try{
        localStorage.setItem(LOCAL_STATE_KEY, JSON.stringify(stateSnapshot()));
      }catch(e){
        console.warn('save local state fail', e);
      }
    }

    async function loadState(){
      defaultSeed();
      loadLocalState();
      if(!db){ ensureTestData(); saveLocalState(); return; }
      try{
        const doc = await db.collection('apps').doc(APP_DOC).get();
        if(doc.exists){
          const d = doc.data() || {};
          applyStateSnapshot(d);
          saveLocalState();
        }
        normalizeAnnouncements();
        if(ensureTestData()){ await saveState(); }
      }catch(e){ console.warn('load fail',e); }
    }

    async function saveState(){
      saveLocalState();
      if(!db) return;
      try{
        await db.collection('apps').doc(APP_DOC).set(stateSnapshot(), {merge:true});
      }catch(e){ console.warn('save fail',e); }
    }

    async function uploadFile(file, folder, onProgress){
      if(!file) return null;

      // 備援：直接使用本地 object URL，避免長時間卡在上傳中
      const localFallback = () => {
        try { return URL.createObjectURL(file); }
        catch { return null; }
      };

      if(!storage){
        if(onProgress) onProgress(100);
        return localFallback();
      }

      try{
        const safeName = `${Date.now()}-${(file.name||'upload').replace(/\s+/g,'-')}`;
        const ref = storage.ref().child(`${folder}/${safeName}`);

        // 上傳逾時保護：12 秒內沒完成就走備援，避免 UI 無限卡住
        const timeoutMs = 12000;
        const putTask = ref.put(file);
        putTask.on('state_changed', snap => {
          if(!onProgress) return;
          const total = snap.totalBytes || 1;
          const percent = Math.min(99, Math.floor((snap.bytesTransferred / total) * 100));
          onProgress(percent);
        });

        await Promise.race([
          putTask,
          new Promise((_, reject)=>setTimeout(()=>reject(new Error('upload-timeout')), timeoutMs))
        ]);

        const url = await Promise.race([
          ref.getDownloadURL(),
          new Promise((_, reject)=>setTimeout(()=>reject(new Error('url-timeout')), timeoutMs))
        ]);

        if(onProgress) onProgress(100);
        return url || localFallback();
      }catch(e){
        console.warn('upload fallback',e);
        if(onProgress) onProgress(100);
        return localFallback();
      }
    }

      const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
      return `vote-${state.user.id}-${y}${m}${d}`;
    }

    async function approveContestSubmission(id){
      if(state.user.mode!=='admin') return alert('僅平台管理員可操作');
      const idx=(state.contestPending||[]).findIndex(x=>x.id===id);
      if(idx<0) return;
      const item=state.contestPending[idx];
      state.contestPending.splice(idx,1);
      state.contestEntries.unshift({...item,status:'approved',approvedAt:new Date().toISOString(),voteCount:item.voteCount||0});
      await saveState();
      renderContestBanner();
      renderAdminPanel();
      showToast('已通過審核並上架 ✅');
    }

    async function rejectContestSubmission(id){
      if(state.user.mode!=='admin') return alert('僅平台管理員可操作');

    function shortTime(iso){
      const d = iso ? new Date(iso) : new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${hh}:${mm}`;
    }

    function renderDM(){
      const box=document.getElementById('dmThreads');
      const composer=document.getElementById('dmComposer');
      if(!canMessage()){
        box.innerHTML = '請先登入後查看私訊。';
        composer.style.display='none';
        return;
      }
      const mine = state.dmThreads.filter(t=>{
        if(Array.isArray(t.participantIds)) return t.participantIds.includes(state.user.id);
        return (t.messages||[]).some(m=>m.fromId===state.user.id);
      });
      if(!mine.length){
        box.innerHTML = '尚無對話，請到商家卡片按「私訊商家」。';
        composer.style.display='none';
        return;
      }
      mine.sort((a,b)=>{
        const ta=(a.messages||[])[(a.messages||[]).length-1]?.createdAt||0;
        const tb=(b.messages||[])[(b.messages||[]).length-1]?.createdAt||0;
        return new Date(tb)-new Date(ta);
      });
      if(!currentDMStore || !mine.find(t=>t.id===currentDMStore)) currentDMStore=mine[0].id;
      box.innerHTML = mine.map(t=>{
        const last=(t.messages||[])[(t.messages||[]).length-1];
        const lastTxt = last?.text || '尚無訊息';
        const time = shortTime(last?.createdAt);
        const avatarTxt = (t.storeName||'店').slice(0,1);
        return `<button class='dm-thread-btn ${t.id===currentDMStore?'btn dm-thread-active':'btn ghost'}' onclick="openThread('${t.id}')"><div class='dm-avatar'>${avatarTxt}</div><div class='dm-thread-meta'><div class='dm-thread-top'><span class='dm-thread-name'>${t.storeName}</span><span class='dm-thread-time'>${time}</span></div><div class='dm-thread-last'>${lastTxt}</div></div></button>`;
      }).join('');
      openThread(currentDMStore, true);
    }

    async function googleAuthLogin(){
      if(!auth || !firebase.auth){
        showToast('Google OAuth 尚未設定，先用測試登入');
        return memberLogin('google');
      }
      try{
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({prompt:'select_account'});
        const result = await auth.signInWithPopup(provider);
        const u = result.user;
        const name = (u?.displayName || u?.email || '會員').slice(0,20);
        const uidKey = (u?.uid || name).toLowerCase().replace(/[^a-z0-9_]/g,'');
        const account = `google_${uidKey}`;

        let member = state.memberAccounts.find(m=>m.account===account);
        if(!member){
          member = {account,password:'oauth-google',name,profile:{gender:'',style:'',count:'',avatar:''}};
          state.memberAccounts.push(member);
        }
        member.name = name;
        if(!member.profile) member.profile = {gender:'',style:'',count:'',avatar:''};
        if(u?.photoURL && !member.profile.avatar) member.profile.avatar = u.photoURL;

        state.user={id:`member:${account}`,accountKey:account,name,mode:'member',provider:'google',profile:{...member.profile}};
        closeLoginModal();
        renderAll();
        saveState();
        showToast('Google 登入成功 ✅');
      }catch(err){
        console.warn('google oauth login failed', err);
        alert('Google 登入失敗，先用測試登入。');
        memberLogin('google');
      }
    }

    async function lineAuthLogin(){

        const uidKey = (u?.uid || name).toLowerCase().replace(/[^a-z0-9_]/g,'');
        const account = `line_${uidKey}`;

        let member = state.memberAccounts.find(m=>m.account===account);
        if(!member){
          member = {account,password:'oauth-line',name,profile:{gender:'',style:'',count:'',avatar:''}};
          state.memberAccounts.push(member);
        }
        member.name = name;
        if(!member.profile) member.profile = {gender:'',style:'',count:'',avatar:''};
        if(u?.photoURL && !member.profile.avatar) member.profile.avatar = u.photoURL;

        state.user={id:`member:${account}`,accountKey:account,name,mode:'member',provider:'line',profile:{...member.profile}};
        closeLoginModal();

    function memberLogin(provider){
      normalizeLoginName();
      const rawName=(document.getElementById('loginName').value||'會員').trim();
      const name=(rawName || '會員').slice(0,20);
      if(name.length < 2){
        alert('暱稱至少需要 2 個字');
        const nameEl = document.getElementById('loginName');
        if(nameEl) nameEl.focus();
        return;
      }
      localStorage.setItem('campingLastLoginName', name);
      localStorage.setItem('campingLastLoginProvider', provider);
      const account = `${provider}_${name.replace(/\s+/g,'').toLowerCase()||'member'}`;
      let member = state.memberAccounts.find(m=>m.account===account);
      if(!member){
        member = {account,password:'123456',name,profile:{gender:'',style:'',count:'',avatar:''}};
        state.memberAccounts.push(member);
      }
      member.name = name;
      if(!member.profile) member.profile = {gender:'',style:'',count:'',avatar:''};
      state.user={id:`member:${account}`,accountKey:account,name,mode:'member',provider,profile:{...member.profile}};
      closeLoginModal();
      renderAll();
      saveState();
    }

    function addProfileStyleTag(tag){
      const el = document.getElementById('pf-style');
      if(!el) return;
      const raw = (el.value||'').trim();
      const parts = raw ? raw.split(/[、,，\s]+/).map(x=>x.trim()).filter(Boolean) : [];
      if(!parts.includes(tag)) parts.push(tag);
      el.value = parts.join('、');
      el.focus();
    }

    function adjustProfileCount(delta){
      const el = document.getElementById('pf-count');

    function uniqueNonEmpty(arr){
      return [...new Set((arr||[]).map(x=>String(x||'').trim()).filter(Boolean))];
    }

    async function reverseGeoChoices(lat, lng){
      try{
        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=zh-TW`;
        const res = await fetch(url, {headers:{'Accept':'application/json'}});
        if(!res.ok) throw new Error('reverse-fail');
        const data = await res.json();
        const a = data.address || {};
        const city = a.city || a.town || a.county || '';
        const suburb = a.suburb || a.city_district || a.neighbourhood || '';
        const road = [a.road, a.house_number].filter(Boolean).join(' ');
        const choices = uniqueNonEmpty([
          data.name,
          a.attraction,
          a.tourism,
          a.leisure,
          a.amenity,
          a.shop,
          road,
          suburb,
          city,
          [suburb, city].filter(Boolean).join('｜')
        ]).slice(0,6);
        return choices.length ? choices : ['目前位置附近地標'];
      }catch{
        return ['目前位置附近地標'];
      }
    }

    function applyCheckInChoice(){
      const sel = document.getElementById('postCheckInChoice');
      if(!sel || !window.__postCheckInGeo) return;
      const label = (sel.value||'').trim();
      if(!label) return;
      window.__postCheckInGeo = {...window.__postCheckInGeo, label};
      const meta = document.getElementById('postCheckInMeta');
      if(meta) meta.textContent = `已選擇：${label}`;
    }

    function captureCheckInLocation(){
      if(postMode!=='social') return;
      if(!navigator.geolocation){
        alert('此裝置不支援 GPS 定位');
        return;
      }
      const meta = document.getElementById('postCheckInMeta');
      if(meta) meta.textContent='定位中...';
      navigator.geolocation.getCurrentPosition(async pos=>{
        const lat = Number(pos.coords.latitude || 0);
        const lng = Number(pos.coords.longitude || 0);
        const choices = await reverseGeoChoices(lat, lng);
        const label = choices[0] || '目前位置附近地標';
        window.__postCheckInGeo = {lat,lng,label};
        const sel = document.getElementById('postCheckInChoice');
        if(sel){
          sel.innerHTML = choices.map((c,i)=>`<option value="${c.replace(/"/g,'&quot;')}" ${i===0?'selected':''}>${c}</option>`).join('');
        }
        if(meta) meta.textContent = `定位成功：已提供 ${choices.length} 個附近地標可選`;
        showToast('GPS 打卡定位成功 ✅');
      },err=>{
        if(meta) meta.textContent='定位失敗，請確認定位權限';
        alert('定位失敗，請開啟定位權限後重試');
      },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
    }

    async function submitPost(){
      if(!isMember()){ alert('請先登入會員'); return; }
      const rawText=(document.getElementById('postText').value||'').trim();
      const checkInGeo = postMode==='social' ? (window.__postCheckInGeo || null) : null;
      const text = rawText;
      const fileInput=document.getElementById('postFile');
      const file=fileInput && fileInput.files ? (fileInput.files[0] || null) : null;
      const submitBtn=document.getElementById('postSubmitBtn');
      const oldLabel=submitBtn ? submitBtn.textContent : '';

      if(postMode==='contest' && !file){ alert('請先選擇照片再投稿'); return; }
      if(!text && !file && !(postMode==='social' && checkInGeo)){ alert('請輸入內容、GPS 打卡或選擇檔案'); return; }

      const type = detectMediaType(file);
      if(postMode==='contest' && type!=='image'){
        alert('照片比賽僅接受圖片檔（jpg/png/heic 等）');
        return;
      }

      try{
        if(submitBtn){ submitBtn.disabled=true; submitBtn.textContent='上傳中...'; }
        if(file) setUploadProgress(0); else resetUploadProgress();
        const url = file ? await uploadFile(file, postMode==='contest'?'contest':'posts', setUploadProgress) : null;
        if(file && !url){
          alert('檔案上傳失敗，請重試');
          return;
        }

        if(postMode==='contest'){
          state.contestPending.unshift({id:uid(),authorId:state.user.id,authorName:state.user.name,text,imageUrl:url,voteCount:0,status:'pending',createdAt:new Date().toISOString()});
          await saveState();
          renderContestBanner();
          closePostModal();
          openContestModal();
          showToast('投稿已送審，待管理員審核 ✅');
        }else{
          state.posts.unshift({id:uid(),authorId:state.user.id,authorName:state.user.name,text,checkInGeo,mediaType:type,mediaUrl:url,likes:[],comments:[],createdAt:new Date().toISOString()});
          await saveState();
          renderFeed();
          closePostModal();
          showToast('貼文發佈成功 ✅');
        }

        document.getElementById('postText').value='';
        resetPostCheckIn();
        if(fileInput) fileInput.value='';
      }catch(err){
        console.error(err);
        alert('發布失敗，請稍後再試');
      }finally{
        if(submitBtn){ submitBtn.disabled=false; submitBtn.textContent=oldLabel || '發佈'; }
        resetUploadProgress();
      }
    }

          s.address||'',
          s.hours||'',
          s.contact||'',
          s.website||'',
          s.description||'',
          (s.features||[]).join('|'),
          (s.photos||[]).join('|'),
          s.specialModels||'',
          s.vehicleTypes||'',
          s.pickupLocation||'',
          s.elevation||'',
          s.tentCount||'',
          s.zones||'',
          s.sourceUrl||'',
          s.isMember?'1':'0'
        ]));
    }

    function downloadDataExcel(filename='camping-app-data.xlsx'){
      if(typeof XLSX==='undefined') return;
      const headers=['id','category','name','address','hours','contact','website','description','features','photos','specialModels','vehicleTypes','pickupLocation','elevation','tentCount','zones','sourceUrl','isMember'];
      const wb = XLSX.utils.book_new();
      ['campsite','mod','gear','rental'].forEach(cat=>{
        const rows = [headers, ...buildStoreRows(cat)];
        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, cat);
      });

      const annRows = [['id','text','title','detail','merchantName','createdAt'], ...(state.announcements||[]).map(a=>[a.id||'',a.text||'',a.title||'',a.detail||'',a.merchantName||'',a.createdAt||''])];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(annRows), 'announcements');

      const merRows = [['merchantId','password','storeId','enabled'], ...(state.merchantAccounts||[]).map(m=>[m.merchantId||'',m.password||'',m.storeId||'',m.enabled?'1':'0'])];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(merRows), 'merchant-accounts');

      XLSX.writeFile(wb, filename);
    }

    function scheduleAutoExcelDownload(){
      if(typeof XLSX==='undefined') return;
      clearTimeout(window.__autoExcelTimer);
      window.__autoExcelTimer = setTimeout(()=>downloadDataExcel('camping-app-data.xlsx'), 900);
    }

    async function importStoresFromExcel(){
      if(state.user.mode!=='admin') return alert('僅平台管理員可操作');
      const file = document.getElementById('ad-excel')?.files?.[0];
      if(!file) return alert('請先選擇 Excel 檔案');
      if(typeof XLSX==='undefined') return alert('Excel 解析元件未載入，請重整後再試');

      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      let imported = 0, updated = 0, skipped = 0;

      for(const sheetName of wb.SheetNames){
        const sheet = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
        const fallbackCat = normalizeExcelCategory(sheetName, '');
        for(const r of rows){
          const category = normalizeExcelCategory(r.category || r.類別 || r.Category, fallbackCat);
          const name = String(r.name || r.名稱 || r.storeName || '').trim();
          if(!category || !name){ skipped++; continue; }

          const rowPhotos = photosFromCell(r.photos || r.照片 || r.photoUrls);
          const payload = {
            category,
            name,
            address: String(r.address || r.地址 || '').trim(),
            hours: String(r.hours || r.營業時間 || '').trim(),
            contact: String(r.contact || r.聯絡方式 || r.phone || '').trim(),
            website: String(r.website || r.官網 || '').trim(),
            description: String(r.description || r.描述 || '').trim(),
            photos: rowPhotos,
            specialModels: String(r.specialModels || r.專門車型 || '').trim(),
            vehicleTypes: String(r.vehicleTypes || r.露營車種類 || '').trim(),
            pickupLocation: String(r.pickupLocation || r.取車處 || '').trim(),
            elevation: String(r.elevation || r.海拔 || '').trim(),
            tentCount: String(r.total_sites || r.tentCount || r.總帳數 || '').trim(),
            zones: String(r.camp_size || r.zones || r.營區大小 || '').trim(),
            sourceUrl: String(r.sourceUrl || r.source_url || '').trim()
          };

          const ex = state.stores.find(s=>s.category===category && s.name===name);
          if(ex){
            Object.assign(ex, {
              ...ex,
              ...payload,
              photos: rowPhotos.length ? rowPhotos : (Array.isArray(ex.photos)?ex.photos:[])
            });
            updated++;
          }else{
            state.stores.unshift({
              id: uid(),
              isMember: false,
              ...payload
            });
            imported++;
          }
        }
      }

      renderStoreTabs();
      await saveState();
      scheduleAutoExcelDownload();
      showToast(`Excel 匯入完成：新增 ${imported}、更新 ${updated}、略過 ${skipped}`);
      alert(`Excel 匯入完成\n新增：${imported}\n更新：${updated}\n略過：${skipped}`);
    }

    function exportAllData(){
      const payload = {
        exportedAt: new Date().toISOString(),
        appDoc: APP_DOC,
        announcements: state.announcements,
        posts: state.posts,
        contestEntries: state.contestEntries,
        contestTheme: state.contestTheme,
        contestPending: state.contestPending,
        stores: state.stores,
        merchantAccounts: state.merchantAccounts,
        memberAccounts: state.memberAccounts,
        adminAccount: state.adminAccount,
        dmThreads: state.dmThreads
      };
      const text = JSON.stringify(payload, null, 2);
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date();
      const tag = `${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}-${String(ts.getHours()).padStart(2,'0')}${String(ts.getMinutes()).padStart(2,'0')}`;
      a.href = url;
      a.download = `camping-data-export-${tag}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('資料已匯出 ✅');
    }

    function renderBottomNav(){
      const campBtn=document.getElementById('bn-campsite');
      if(campBtn) campBtn.classList.toggle('active', state.activeTab==='campsite');
    }
    function goCampsite(){
      setTab('campsite');
    }

    function renderAll(){
      renderUser();
      renderTabs();
      renderAnnouncements();
      renderContestBanner();
      renderFeed();
      renderGuestPhotoWall();
      renderStoreTabs();
      renderDM();
      renderBottomNav();
    }

    async function boot(){
      await initFirebase();

      // 先渲染本地預設資料，避免訪客進站白畫面/看不到照片
      defaultSeed();
      ensureTestData();
      cleanupLegacyCampsites();
      await loadBundledTaichungCampsites();
      if(state.user.mode==='guest') state.activeTab='social';
      renderAll();

      // 背景載入雲端資料；若超時或失敗，保留本地可瀏覽內容
      try{
        await Promise.race([
          loadState(),
          new Promise((_,reject)=>setTimeout(()=>reject(new Error('load-timeout')), 4500))
        ]);
      }catch(e){
        console.warn('boot loadState fallback', e);
      }

      const removedLegacy = cleanupLegacyCampsites();
      await loadBundledTaichungCampsites();
      if(removedLegacy) await saveState();
      if(state.user.mode==='guest') state.activeTab='social';
      renderAll();
      bindLoginModalKeys();
      document.getElementById('campSearch').addEventListener('input', renderStoreTabs);
      document.addEventListener('click', (e)=>{
        const m=document.getElementById('userMenu');
        const b=document.getElementById('userEntry');
        if(!m||!b) return;
        if(m.style.display==='block' && !m.contains(e.target) && !b.contains(e.target)) closeUserMenu();
      });
    }
    boot();
  </script>
