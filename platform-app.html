<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣露營平台 MVP v1.5</title>
  <style>
    :root{--bg:#f6faf8;--card:#fff;--pri:#1f8f5f;--txt:#1f2937;--muted:#6b7280;--line:#e5e7eb}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--txt)}
    header{padding:16px;background:linear-gradient(120deg,#1f8f5f,#2176ff);color:#fff}
    .container{max-width:1120px;margin:0 auto;padding:16px}
    .row{display:flex;gap:12px;flex-wrap:wrap}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 6px 16px rgba(0,0,0,.06)}
    button{border:0;background:var(--pri);color:#fff;padding:9px 14px;border-radius:10px;cursor:pointer}
    button.gray{background:#6b7280} button.blue{background:#2563eb} button.orange{background:#ea580c}
    input,select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:10px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .tab-content{display:none}.tab-content.active{display:block}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#e6f7ef;color:#0f7f51;font-size:12px;margin-right:6px;margin-top:6px}
    .grid{display:grid;gap:12px}.grid2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
    .muted{color:var(--muted);font-size:13px}
    .map{height:230px;border-radius:12px;border:1px dashed #7fbba2;background:linear-gradient(180deg,#e8fff4,#f4fbff);padding:10px;position:relative}
    .dot{position:absolute;width:14px;height:14px;border-radius:50%;background:#ef4444;cursor:pointer;box-shadow:0 0 0 4px rgba(239,68,68,.16)}
    .kpi{font-weight:800;font-size:24px}
    .list-item{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;background:#fff}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}
    .social-nav{position:fixed;top:0;left:0;right:0;z-index:1200;background:#ffffff;border-bottom:1px solid #e5e7eb;padding:10px 12px;display:none;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .social-nav-inner{max-width:1120px;margin:0 auto;display:flex;gap:6px;flex-wrap:wrap}
    body.social-nav-on #communitySection{padding-top:74px}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h2 style="margin:0">台灣露營平台 MVP v1.5</h2>
      <div class="muted" style="color:#e7f8ff">使用者端 / 商家端 / 後台端（同一頁切換）</div>
      <div class="tabs" id="mainTabs" style="display:none">
        <button onclick="switchTab('user')">使用者端 APP</button>
        <button onclick="switchTab('merchant')">商家端 APP</button>
        <button onclick="switchTab('admin')">後台管理 PC</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card" id="authSection" style="margin-bottom:12px">
      <h3 style="margin-top:0">登入 / 會員</h3>
      <div class="row">
        <div style="flex:1;min-width:200px">
          <label>登入方式</label>
          <select id="loginMethod">
            <option value="line">LINE</option>
            <option value="google">Google</option>
            <option value="guest">遊客模式</option>
          </select>
        </div>
        <div style="flex:1;min-width:200px">
          <label>帳號</label>
          <input id="loginAccount" placeholder="測試帳號：tester01" />
        </div>
        <div style="flex:1;min-width:200px">
          <label>密碼</label>
          <input id="loginPassword" type="password" placeholder="測試密碼：123456" />
        </div>
        <div style="flex:1;min-width:200px">
          <label>顯示名稱</label>
          <input id="displayName" placeholder="例如：Teddy" />
        </div>
        <div style="display:flex;align-items:flex-end">
          <button onclick="login()">登入</button>
        </div>
      </div>
      <div class="card" style="margin-top:10px;background:#f8fbff">
        <b>測試帳號（已預設）</b>
        <div class="top-actions" style="margin-top:8px">
          <button class="gray" onclick="quickFill('tester01')">tester01 / 123456（LINE）</button>
          <button class="gray" onclick="quickFill('tester02')">tester02 / 123456（Google）</button>
          <button class="gray" onclick="quickFill('merchant01')">merchant01 / 123456（商家）</button>
        </div>
      </div>
      <div id="loginStatus" class="muted" style="margin-top:8px">尚未登入</div>
      <div style="margin-top:8px">
        <span class="pill" id="memberBadge">一般會員</span>
        <button class="orange" onclick="upgradeMember()">升級平台會員（取得折扣 QR）</button>
      </div>
      <div id="qrBox" style="margin-top:10px" class="muted"></div>
    </section>

    <div id="appShell" style="display:none">
    <section id="user" class="tab-content active">
      <div class="card" id="communitySection">
        <h3 style="margin-top:0">社交首頁</h3>
        <div class="muted">手機版首頁以社交貼文為主，點上方分類快速切換。</div>

        <div class="social-nav" id="socialNav">
          <div class="social-nav-inner">
            <button class="blue" onclick="setSocialCategory('露營區')">露營區</button>
            <button class="blue" onclick="setSocialCategory('社群媒體')">社群媒體</button>
            <button class="blue" onclick="setSocialCategory('露營用品')">露營用品</button>
            <button class="blue" onclick="setSocialCategory('露營車改裝')">露營車改裝</button>
            <button class="blue" onclick="setSocialCategory('露營車出租')">露營車出租</button>
            
          </div>
        </div>

        <div id="socialCategoryState" class="muted" style="margin-top:8px">目前分類：社群媒體</div>

        <textarea id="postText" rows="3" placeholder="分享你的露營心得（可顯示個人標籤）" style="margin-top:10px"></textarea>
        <div class="top-actions" style="margin-top:8px">
          <select id="postCategory" style="max-width:220px">
            <option>露營區</option>
            <option>社群媒體</option>
            <option>露營用品</option>
            <option>露營車改裝</option>
            <option>露營車出租</option>
          </select>
          <button onclick="addPost()">發佈貼文</button>
          <button class="gray" onclick="votePhoto()">圖片投票（每日 2 票）</button>
        </div>

        <div id="voteState" class="muted" style="margin-top:6px"></div>
        <div id="feed" style="margin-top:10px"></div>
      </div>
    </section>


    <section id="merchant" class="tab-content">
      <div class="grid grid2">
        <div class="card">
          <h3 style="margin-top:0">商家資訊上傳</h3>
          <input id="mName" placeholder="商家名稱" />
          <textarea id="mDesc" rows="3" placeholder="商家介紹（露營地 / 房車改裝 / 用品 / 租車）" style="margin-top:8px"></textarea>
          <div class="row" style="margin-top:8px">
            <div style="flex:1"><input id="mArea" placeholder="地區（台中/南投/花蓮）" /></div>
            <div style="flex:1"><input id="mTags" placeholder="標籤（逗號分隔）」 /></div>
          </div>
          <button style="margin-top:8px" onclick="publishMerchant()">發布商家資訊</button>
          <div id="merchantOut" class="muted" style="margin-top:8px"></div>
        </div>

        <div class="card">
          <h3 style="margin-top:0">活動發布 + 跑馬燈</h3>
          <input id="eventTitle" placeholder="活動名稱（例：春季露營節）」 />
          <textarea id="eventDesc" rows="2" placeholder="活動內容" style="margin-top:8px"></textarea>
          <button style="margin-top:8px" onclick="publishEvent()">發布活動</button>
          <div id="eventList" style="margin-top:8px"></div>
        </div>
      </div>

      <div class="card" style="margin-top:12px">
        <h3 style="margin-top:0">商家會員方案（曝光套餐）</h3>
        <div class="row">
          <div class="card" style="flex:1;min-width:220px"><b>半年方案</b><div>NT$100</div><button onclick="buyPlan('半年',100)">購買</button></div>
          <div class="card" style="flex:1;min-width:220px"><b>一年方案</b><div>NT$200</div><button onclick="buyPlan('一年',200)">購買</button></div>
        </div>
        <div id="planLog" class="muted" style="margin-top:8px"></div>
      </div>
    </section>

    <section id="admin" class="tab-content">
      <div class="grid grid2">
        <div class="card">
          <h3 style="margin-top:0">平台收益總覽</h3>
          <div class="kpi" id="kpiRevenue">NT$0</div>
          <div class="muted">來自商家曝光套餐</div>
          <hr style="border:none;border-top:1px solid #eee;margin:12px 0" />
          <div>商家數：<b id="kpiMerchants">0</b></div>
          <div>活動數：<b id="kpiEvents">0</b></div>
          <div>會員數：<b id="kpiMembers">0</b></div>
        </div>

        <div class="card">
          <h3 style="margin-top:0">管理清單</h3>
          <div id="adminMerchants"></div>
        </div>
      </div>
    </section>
    </div>
  </main>

  <script>
    const state = {
      user: { name:'', method:'guest', isMember:false, votesToday:0, lastVoteDate:'', loggedIn:false },
      testAccounts: {
        tester01: { password:'123456', method:'line', displayName:'測試用戶 A' },
        tester02: { password:'123456', method:'google', displayName:'測試用戶 B' },
        merchant01: { password:'123456', method:'google', displayName:'測試商家' }
      },
      camps: [
        { id:1,name:'溪頭松林營地', area:'南投', tags:['可進房車','靠山','親子'] },
        { id:2,name:'海風灣露營區', area:'花蓮', tags:['海景','親子'] },
        { id:3,name:'雲霧森林營地', area:'台中', tags:['靠山','可進房車'] }
      ],
      activeSocialCategory: '全部',
      bookings: [],
      posts: [
        { user:'露營達人小安', category:'露營區', text:'本週花蓮海風灣超美，晚上星星很多！', likes:12, ts:'2026/03/03 20:15' },
        { user:'親子露營媽媽', category:'社群媒體', text:'南投溪頭松林營地很適合帶小孩，廁所也乾淨。', likes:9, ts:'2026/03/04 09:22' },
        { user:'房車玩家Ken', category:'露營車改裝', text:'可進房車的營地我最推雲霧森林，路況不錯。', likes:7, ts:'2026/03/04 15:41' },
        { user:'裝備控阿哲', category:'露營用品', text:'新入手快拆天幕，10分鐘內搭好超方便。', likes:5, ts:'2026/03/04 17:05' },
        { user:'租車玩家Mia', category:'露營車出租', text:'這週租到四人露營車，內裝很新，推薦！', likes:4, ts:'2026/03/04 18:10' }
      ],
      merchants: [],
      events: [],
      revenue: 0
    };

    function switchTab(id){
      document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
      document.getElementById(id).classList.add('active');

      const nav = document.getElementById('socialNav');
      if(nav){
        nav.style.display = (id === 'user' && state.user.loggedIn) ? 'block' : 'none';
      }

      refreshAdmin();
    }

    function quickFill(account){
      const preset = state.testAccounts[account];
      if(!preset) return;
      document.getElementById('loginAccount').value = account;
      document.getElementById('loginPassword').value = preset.password;
      document.getElementById('loginMethod').value = preset.method;
      document.getElementById('displayName').value = preset.displayName;
    }

    function login(){
      const method = document.getElementById('loginMethod').value;
      const account = document.getElementById('loginAccount').value.trim();
      const password = document.getElementById('loginPassword').value;
      const customName = document.getElementById('displayName').value.trim();

      if(method !== 'guest'){
        const preset = state.testAccounts[account];
        if(!preset || preset.password !== password){
          document.getElementById('loginStatus').textContent = '登入失敗：帳號或密碼錯誤（可使用上方測試帳號）';
          return;
        }
        state.user.method = method;
        state.user.name = customName || preset.displayName;
      }else{
        state.user.method = 'guest';
        state.user.name = customName || '訪客';
      }

      state.user.loggedIn = true;

      // 登入後：隱藏登入首頁，顯示所有社群貼文
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('mainTabs').style.display = 'flex';
      document.getElementById('appShell').style.display = 'block';
      document.getElementById('loginStatus').textContent = '';
      document.getElementById('socialNav').style.display = 'block';
      document.body.classList.add('social-nav-on');

      switchTab('user');
      renderFeed();
      refreshAdmin();

      const social = document.getElementById('communitySection');
      if(social){ social.scrollIntoView({ behavior:'smooth', block:'start' }); }
    }

    function upgradeMember(){
      state.user.isMember = true;
      document.getElementById('memberBadge').textContent = '平台會員（享折扣）';
      document.getElementById('qrBox').innerHTML = '會員 QR：<b>MEMBER-' + (state.user.name || 'USER') + '-TW</b>';
      refreshAdmin();
    }

    function renderCamps(){
      const kwEl = document.getElementById('kw');
      const tagEl = document.getElementById('filterTag');
      if(!kwEl || !tagEl) return;
      const kw = kwEl.value.trim();
      const tag = tagEl.value;
      const list = state.camps.filter(c=>{
        const hitKw = !kw || c.area.includes(kw) || c.name.includes(kw);
        const hitTag = !tag || c.tags.includes(tag);
        return hitKw && hitTag;
      });
      const el = document.getElementById('campList');
      if(!list.length){ el.innerHTML = '<div class="muted">查無資料</div>'; return; }
      el.innerHTML = list.map(c=>`<div class="list-item"><b>${c.name}</b>｜${c.area}<br>${c.tags.map(t=>`<span class='pill'>${t}</span>`).join('')}</div>`).join('');
      document.getElementById('bookingCamp').innerHTML = list.map(c=>`<option>${c.name}</option>`).join('');
    }

    function pickCamp(id){
      const camp = state.camps.find(c=>c.id===id);
      document.getElementById('mapTip').textContent = `已選擇：${camp.name}，可直接到下方預約。`;
      document.getElementById('bookingCamp').value = camp.name;
    }

    function createBooking(){
      const camp = document.getElementById('bookingCamp').value;
      const date = document.getElementById('bookingDate').value;
      const pkg = document.getElementById('bookingPkg').value;
      if(!camp || !date){ alert('請選擇營地與日期'); return; }
      state.bookings.push({ camp,date,pkg,user:state.user.name||'訪客' });
      document.getElementById('bookingLogs').innerHTML = '最新預約：' + state.bookings.slice(-3).map(b=>`${b.date} ${b.camp} / ${b.pkg}`).join(' ｜ ');
    }

    function setSocialCategory(cat){
      state.activeSocialCategory = cat;
      const stateEl = document.getElementById('socialCategoryState');
      if(stateEl) stateEl.textContent = `目前分類：${cat}`;
      renderFeed();
    }

    function addPost(){
      if(state.user.method === 'guest'){ alert('遊客模式不可評論，請先使用 LINE 或 Google 登入'); return; }
      const text = document.getElementById('postText').value.trim();
      const category = document.getElementById('postCategory').value;
      if(!text) return;
      state.posts.unshift({ user:state.user.name || '匿名', category, text, likes:0, ts:new Date().toLocaleString() });
      document.getElementById('postText').value = '';
      renderFeed();
    }

    function likePost(i){ state.posts[i].likes++; renderFeed(); }

    function renderFeed(){
      const feed = document.getElementById('feed');
      const rows = state.posts
        .map((p,idx)=>({p,idx}))
        .filter(({p})=>state.activeSocialCategory === '社群媒體' || p.category===state.activeSocialCategory);
      if(!rows.length){ feed.innerHTML = '<div class="muted">此分類尚無貼文。</div>'; return; }
      feed.innerHTML = rows.map(({p,idx})=>`
        <div class="list-item">
          <b>${p.user}</b> <span class="pill">${p.category||'未分類'}</span> <span class="muted">${p.ts}</span>
          <div style="margin-top:6px">${p.text}</div>
          <button style="margin-top:6px" onclick="likePost(${idx})">👍 ${p.likes}</button>
        </div>`).join('');
    }

    function votePhoto(){
      const today = new Date().toISOString().slice(0,10);
      if(state.user.lastVoteDate !== today){ state.user.votesToday = 0; state.user.lastVoteDate = today; }
      if(state.user.votesToday >= 2){ document.getElementById('voteState').textContent = '今日票數已用完（每日 2 票）'; return; }
      state.user.votesToday++;
      document.getElementById('voteState').textContent = `投票成功，今日剩餘 ${2 - state.user.votesToday} 票`;
    }

    function publishMerchant(){
      const m = {
        name:document.getElementById('mName').value.trim(),
        desc:document.getElementById('mDesc').value.trim(),
        area:document.getElementById('mArea').value.trim(),
        tags:document.getElementById('mTags').value.trim()
      };
      if(!m.name){ alert('請填商家名稱'); return; }
      state.merchants.unshift(m);
      document.getElementById('merchantOut').textContent = `已發布：${m.name}（${m.area || '未填地區'}）`;
      renderAdminMerchants();
    }

    function publishEvent(){
      const title = document.getElementById('eventTitle').value.trim();
      const desc = document.getElementById('eventDesc').value.trim();
      if(!title) return;
      state.events.unshift({title,desc});
      document.getElementById('eventList').innerHTML = state.events.map(e=>`<div class='list-item'><b>${e.title}</b><div class='muted'>${e.desc||''}</div></div>`).join('');
      renderAdminMerchants();
    }

    function buyPlan(name,price){
      state.revenue += price;
      document.getElementById('planLog').textContent = `已購買 ${name}方案，入帳 NT$${price}`;
      refreshAdmin();
    }

    function renderAdminMerchants(){
      const box = document.getElementById('adminMerchants');
      if(!state.merchants.length){ box.innerHTML = '<div class="muted">目前尚無商家資料</div>'; return; }
      box.innerHTML = state.merchants.map((m,idx)=>`<div class='list-item'><b>${idx+1}. ${m.name}</b><div>${m.area||'未填地區'}｜${m.tags||'無標籤'}</div><div class='muted'>${m.desc||''}</div></div>`).join('');
    }

    function refreshAdmin(){
      document.getElementById('kpiRevenue').textContent = `NT$${state.revenue}`;
      document.getElementById('kpiMerchants').textContent = state.merchants.length;
      document.getElementById('kpiEvents').textContent = state.events.length;
      document.getElementById('kpiMembers').textContent = state.user.isMember ? 1 : 0;
      renderAdminMerchants();
    }

    quickFill('tester01');
    renderFeed();
    refreshAdmin();
  </script>
</body>
</html>
