<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camping App v37.8（需求整合版）</title>
  <style>
    :root{
      --bg:#f3f6fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;
      --pri:#2563eb;--ok:#16a34a;--danger:#dc2626;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
    .container{max-width:1120px;margin:0 auto;padding:12px;padding-top:180px;padding-bottom:86px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
    .muted{color:var(--muted);font-size:13px}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:1002;background:#fff;border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1120px;margin:0 auto;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;transition:background-color .16s ease}
    .topbar:hover .topbar-inner{background:#f8fbff}
    .brand{font-weight:900;color:#0f172a;letter-spacing:.2px;transition:color .16s ease,text-shadow .16s ease}
    .topbar:hover .brand{color:#1d4ed8;text-shadow:0 1px 0 rgba(255,255,255,.8)}
    .btn{border:0;background:var(--pri);color:#fff;padding:8px 12px;border-radius:10px;cursor:pointer}
    .btn.ghost{background:#fff;color:#111827;border:1px solid #d1d5db}
    .btn.ghost:hover{background:#f8fafc;border-color:#94a3b8;box-shadow:0 6px 12px rgba(15,23,42,.10)}
    .btn.ok{background:var(--ok)}
    .btn.danger{background:var(--danger)}
    .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;position:fixed;top:49px;left:0;right:0;z-index:1001;background:var(--bg);padding:8px 12px}
    .sticky-marquee{position:fixed;top:103px;left:12px;right:12px;z-index:1000}
    .tab{border:1.5px solid #d1d5db;background:#fff;color:#111827;padding:9px 6px;cursor:pointer;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:56px;position:relative;box-shadow:0 4px 12px rgba(15,23,42,.10);transition:transform .14s ease,box-shadow .14s ease,filter .14s ease}
    .tab:hover{transform:translateY(-1px);box-shadow:0 8px 16px rgba(15,23,42,.14);filter:saturate(1.04)}
    .tab.active{background:#93c5fd;border-color:#60a5fa;color:#0f172a;transform:translateY(-2px);z-index:2}
    .section{display:none}.section.active{display:block}

    .tab .tab-txt{font-size:12px;line-height:1.1;white-space:nowrap}
    .tab-social{border-radius:18px 8px 8px 18px;background:#dbeafe;border-color:#93c5fd;color:#1e3a8a;clip-path:polygon(0 0,84% 0,100% 28%,100% 72%,84% 100%,0 100%)}
    .tab-mod{margin-left:-1px;border-radius:10px;background:#dcfce7;border-color:#86efac;color:#166534;clip-path:polygon(0 28%,12% 0,84% 0,100% 28%,100% 72%,84% 100%,12% 100%,0 72%,8% 50%)}
    .tab-gear{margin-left:-1px;border-radius:10px;background:#fef3c7;border-color:#fcd34d;color:#92400e;clip-path:polygon(0 28%,12% 0,84% 0,100% 28%,100% 72%,84% 100%,12% 100%,0 72%,8% 50%)}
    .tab-rental{margin-left:-1px;border-radius:8px 18px 18px 8px;background:#fee2e2;border-color:#fca5a5;color:#991b1b;clip-path:polygon(0 28%,12% 0,100% 0,100% 100%,12% 100%,0 72%,8% 50%)}

    .marquee{overflow:hidden;white-space:nowrap;position:relative}
    .marquee-track{display:inline-flex;gap:10px;min-width:max-content;animation:marqueeMove 18s linear infinite}
    .marquee-item{background:#eef2ff;border:1px solid #c7d2fe;color:#3730a3;padding:6px 10px;border-radius:999px;font-size:13px;transition:transform .14s ease,box-shadow .14s ease,background-color .14s ease}
    .marquee-item:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(55,48,163,.18);background:#e3e9ff}
    @keyframes marqueeMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    .contest-banner{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border-radius:12px;padding:10px;position:relative;margin-top:120px}
    .contest-row{display:flex;gap:8px;overflow:auto;padding-top:8px}
    .contest-card{position:relative;min-width:120px;height:84px;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid rgba(255,255,255,.5);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
    .contest-card:hover{transform:translateY(-2px);box-shadow:0 10px 18px rgba(15,23,42,.22);border-color:rgba(255,255,255,.9)}
    .contest-card img{width:100%;height:100%;object-fit:cover}
    .contest-vote{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.65);padding:2px 6px;border-radius:999px;font-size:12px;backdrop-filter:blur(2px);border:1px solid rgba(255,255,255,.28)}

    .feed-item{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;background:#fff;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
    .feed-item:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(15,23,42,.10);border-color:#d7dee8}
    .feed-media{width:100%;max-height:340px;object-fit:cover;border-radius:10px;margin-top:8px;background:#000}
    .actions{display:flex;gap:8px;margin-top:8px}
    .pill{display:inline-block;background:#e0ecff;color:#1e40af;padding:3px 8px;border-radius:999px;font-size:12px;transition:background-color .14s ease,color .14s ease}
    .feed-item:hover .pill{background:#dbeafe;color:#1e3a8a}

    .store-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
    .store-title{font-weight:800;letter-spacing:.2px;transition:color .14s ease}
    .card:hover .store-title{color:#1d4ed8}
    .store-focus{outline:3px solid #2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.15)}
    .store-photos{display:flex;gap:8px;margin-top:8px}
    .store-photo{position:relative;width:calc(50% - 4px);height:100px;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #d1d5db;background:#f3f4f6;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
    .store-photo:hover{transform:translateY(-2px);box-shadow:0 10px 18px rgba(15,23,42,.14);border-color:#9ca3af}
    .store-photo img{width:100%;height:100%;object-fit:cover}
    .store-more{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);color:#fff;font-weight:800}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
    input,select,textarea{width:100%;padding:9px;border:1px solid #d1d5db;border-radius:10px}

    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-end;justify-content:center;z-index:2000}
    .sheet{width:min(820px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px 18px 0 0;padding:14px}
    .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

    .contest-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .contest-entry img{width:100%;height:auto;border-radius:12px}
    .contest-entry-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}

    .dm-fab{position:fixed;right:16px;bottom:16px;z-index:1200;background:#0ea5e9}
    .post-fab{position:fixed;right:16px;bottom:62px;z-index:1200}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:1200;background:#fff;border-top:1px solid #d1d5db;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));align-items:end}
    .bottom-nav button{width:100%;padding:10px 8px;border:1px solid #d1d5db;background:#fff;border-radius:10px;font-weight:700;color:#111827;transition:transform .14s ease,box-shadow .14s ease,background-color .14s ease,color .14s ease}
    .bottom-nav button:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(15,23,42,.12)}
    .bottom-nav button.active{background:#2563eb;color:#fff;border-color:#2563eb}
    .bottom-nav .bn-go{width:100%;height:68px;margin:0 auto;transform:translateY(-6px);font-size:12px;line-height:1.2;font-weight:900;padding:0 8px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#d6bf9d;color:#4b3a27;border:1px solid #b89c76;box-shadow:0 8px 20px rgba(139,111,78,.25);clip-path:polygon(50% 0%, 100% 36%, 100% 100%, 0% 100%, 0% 36%)}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;z-index:3000;display:none;box-shadow:0 8px 20px rgba(0,0,0,.22)}
    .upload-progress{margin-top:8px;display:none}
    .upload-track{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden}
    .upload-fill{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#0ea5e9);transition:width .2s ease}
    .dm-thread-active{background:#2563eb !important;color:#fff !important;border-color:#2563eb !important}

    .admin-wrap{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:980px){.admin-wrap{grid-template-columns:1fr 1fr}}

    /* 手機優先優化 */
    @media (max-width: 768px){
      .container{padding:8px}
      .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;top:49px;padding:8px 6px;overflow:visible;white-space:normal}
      .sticky-marquee{top:102px}
      .contest-banner{margin-top:138px}
      .tab{min-width:0;flex:1 1 auto;min-height:50px;padding:7px 4px}.tab .tab-txt{font-size:11px}
      .card{padding:10px;border-radius:12px}
      .topbar-inner{padding:9px 10px}
      .container{padding-bottom:96px}
    }

    /* 私訊與發文改為全頁 */
    #postModal.overlay, #dmModal.overlay{align-items:stretch;justify-content:stretch;background:#fff}
    #storeGalleryModal.overlay{align-items:stretch;justify-content:stretch;background:#fff}
    #postModal .sheet, #dmModal .sheet{width:100vw;max-width:none;max-height:100vh;border-radius:0;padding:12px}
    #storeGalleryModal .sheet{width:100vw;max-width:none;max-height:100vh;border-radius:0;padding:12px}

  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">🏕️ Go Camping <span id="appVersion" class="muted" style="font-size:12px;margin-left:6px"></span></div>
      <div style="display:flex;gap:8px;align-items:center;position:relative">
        <button id="userEntry" class="btn ghost" onclick="handleUserEntry()" style="width:40px;height:40px;border-radius:999px;padding:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-weight:800">訪客</button>
        <div id="userMenu" class="card" style="display:none;position:absolute;right:0;top:46px;min-width:140px;z-index:1300;padding:6px">
          <button id="userMenuProfile" class="btn ghost" style="width:100%;text-align:left;margin-bottom:6px" onclick="openProfileFromUserMenu()">個人資料</button>
          <button id="userMenuLogout" class="btn ghost" style="width:100%;text-align:left" onclick="logoutFromUserMenu()">登出</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="tabs" id="tabs"></div>

    <section id="sec-social" class="section active">
      <div class="card sticky-marquee">
        <div style="font-weight:800;margin-bottom:6px">📣 活動跑馬燈</div>
        <div id="announceMarquee" class="marquee"></div>
      </div>

      <div id="contestBanner" class="card contest-banner">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="font-weight:800">📸 會員照片比賽（社群首頁限定）</div>
          <button class="btn" onclick="openPostModal('contest')">📷 我要投稿</button>
        </div>
        <div class="muted" style="color:#dbeafe">每位會員每日 2 票，不可重複投同一作品；12:10 刷新</div>
        <div id="contestBannerList" class="contest-row"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800">社群貼文</div>
          <button class="btn" onclick="openPostModal('social')">＋ 發文</button>
        </div>
        <div id="feedList" style="margin-top:10px"></div>
      </div>
    </section>

    <section id="sec-campsite" class="section">
      <div class="card">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="font-weight:800">營地搜尋（591 風格）</div>
          <input id="campSearch" placeholder="輸入地區/關鍵字（例：靠海、親子、夜景）" style="max-width:320px" />
          <button class="btn ghost" onclick="openGoogleMapSearch()">Google Maps 搜尋</button>
        </div>
      </div>
      <div id="campsiteList" class="store-grid"></div>
    </section>

    <section id="sec-mod" class="section"><div id="modList" class="store-grid"></div></section>
    <section id="sec-gear" class="section"><div id="gearList" class="store-grid"></div></section>
    <section id="sec-rental" class="section"><div id="rentalList" class="store-grid"></div></section>
  </div>



  <div id="bottomNav" class="bottom-nav">
    <button id="bn-post" onclick="openPostModal('social')">➕ 貼文</button>
    <button id="bn-campsite" class="bn-go" onclick="goCampsite()">🏕️<span>Go Camping</span></button>
    <button id="bn-dm" onclick="openDM()">💬 私訊</button>
  </div>

  <div id="loginModal" class="overlay" onclick="if(event.target===this) closeLoginModal()">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-head"><h3 style="margin:0">登入 / 訪客</h3><button class="btn ghost" onclick="closeLoginModal()">關閉</button></div>
      <div class="field"><label>暱稱</label><input id="loginName" placeholder="輸入名稱" maxlength="20" autocomplete="nickname" oninput="updateLoginNameCounter()" onblur="normalizeLoginName()" /><div id="loginNameCounter" class="muted" style="text-align:right" aria-live="polite">0/20</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="memberLogin('google')">Google 登入</button>
        <button class="btn" onclick="memberLogin('line')">LINE 登入</button>
        <button class="btn" onclick="memberLogin('facebook')">Facebook 登入</button>
        <button class="btn ghost" onclick="enterGuestMode()">訪客模式（免登入）</button>
        <button class="btn ghost" onclick="clearLoginName()">清空名稱</button>
        <button class="btn" onclick="openBackendLogin()">商家 / 平台後台登入</button>
      </div>
    </div>
  </div>

  <div id="profileModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">個人資料編輯</h3><button class="btn ghost" onclick="closeProfileModal()">關閉</button></div>
      <div class="field"><label>暱稱</label><input id="pf-name" maxlength="20" /></div>
      <div class="field"><label>頭像設定</label><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><img id="pf-avatar-preview" alt="avatar" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:1px solid #e5e7eb;background:#f3f4f6"/><input id="pf-avatar-file" type="file" accept="image/*" onchange="onProfileAvatarSelected()" /><button class="btn ghost" type="button" onclick="clearProfileAvatar()">清除頭像</button></div></div>
      <div class="field"><label>性別</label><select id="pf-gender"><option value="">未設定</option><option>男</option><option>女</option><option>其他</option></select></div>
      <div class="field"><label>喜歡露營方式</label><input id="pf-style" placeholder="例如：車宿、搭帳、親子露營" /><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"><button class="btn ghost" type="button" onclick="addProfileStyleTag('車宿')">車宿</button><button class="btn ghost" type="button" onclick="addProfileStyleTag('搭帳')">搭帳</button><button class="btn ghost" type="button" onclick="addProfileStyleTag('親子露營')">親子露營</button><button class="btn ghost" type="button" onclick="addProfileStyleTag('野營')">野營</button><button class="btn ghost" type="button" onclick="addProfileStyleTag('機車露營')">機車露營</button><button class="btn ghost" type="button" onclick="addProfileStyleTag('單人露營')">單人露營</button><button class="btn ghost" type="button" onclick="addProfileStyleTag('溯溪')">溯溪</button><button class="btn ghost" type="button" onclick="addProfileStyleTag('其他')">其他</button></div></div>
      <div class="field"><label>露營次數</label><div style="display:flex;gap:6px;align-items:center"><button class="btn ghost" type="button" onclick="adjustProfileCount(-1)">－</button><input id="pf-count" type="number" inputmode="numeric" min="0" step="1" placeholder="例如：12" oninput="sanitizeProfileCount()" /><button class="btn ghost" type="button" onclick="adjustProfileCount(1)">＋</button></div><div class="muted">僅能輸入數字</div></div>
      <button class="btn" onclick="saveProfile()">儲存個人資料</button>
    </div>
  </div>

  <div id="postModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 id="postTitle" style="margin:0">新增貼文</h3><button class="btn ghost" onclick="closePostModal()">返回</button></div>
      <div id="postTargetBadge" class="pill">發佈到：社群媒體</div>
      <div class="field" style="margin-top:8px"><textarea id="postText" rows="4" placeholder="分享露營心得..."></textarea></div>
      <div class="field"><label>照片或影片</label><input id="postFile" type="file" accept="image/*,video/*" /></div>
      <div id="uploadProgress" class="upload-progress">
        <div class="muted" id="uploadProgressText">上傳中 0%</div>
        <div class="upload-track"><div id="uploadFill" class="upload-fill"></div></div>
      </div>
      <button id="postSubmitBtn" class="btn" onclick="submitPost()">發佈</button>
    </div>
  </div>

  <div id="contestModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">會員照片比賽</h3><button class="btn ghost" onclick="closeContestModal()">關閉</button></div>
      <div id="voteHint" class="muted"></div>
      <div id="contestEntries" class="contest-grid" style="margin-top:10px"></div>
      <div style="margin-top:10px"><button class="btn" onclick="openPostModal('contest')">📷 我要投稿</button></div>
    </div>
  </div>

  <div id="announcementModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 id="announcementTitle" style="margin:0">活動資訊</h3><button class="btn ghost" onclick="closeAnnouncementModal()">關閉</button></div>
      <div id="announcementMeta" class="muted"></div>
      <div id="announcementDetail" style="margin-top:8px;line-height:1.6"></div>
    </div>
  </div>

  <div id="storeGalleryModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 id="storeGalleryTitle" style="margin:0">商家照片</h3><button class="btn ghost" onclick="closeStoreGallery()">關閉</button></div>
      <div id="storeDetailMeta" class="muted" style="margin-bottom:8px"></div>
      <div id="storeDetailBody" style="line-height:1.7"></div>
      <div id="storeGalleryGrid" class="store-grid" style="margin-top:10px"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>


  <div id="backendLoginModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">後台登入</h3><button class="btn ghost" onclick="closeBackendLogin()">關閉</button></div>
      <div class="field"><label>ID</label><input id="backendId" placeholder="輸入 ID（商家或 admin）" /></div>
      <div class="field"><label>密碼</label><input id="backendPwd" type="password" placeholder="輸入密碼" /></div>
      <button class="btn" onclick="backendLogin()">登入後台</button>
    </div>
  </div>

  <div id="backendWorkspace" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 id="backendTitle" style="margin:0">後台</h3><button class="btn ghost" onclick="closeBackendWorkspace()">關閉</button></div>
      <div id="backendContent"></div>
    </div>
  </div>

  <div id="dmModal" class="overlay">
    <div class="sheet">
      <div class="sheet-head"><h3 style="margin:0">私訊</h3><button class="btn ghost" onclick="closeDM()">返回</button></div>
      <div id="dmThreads" class="muted">尚無對話，請到商家卡片按「私訊商家」。</div>
      <div id="dmComposer" style="display:none;margin-top:10px"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script>
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBrCmKeoIKhNfUBmfxrMSPQnf9CDXP3QEM",
      authDomain: "outdoorcamp.firebaseapp.com",
      projectId: "outdoorcamp",
      storageBucket: "outdoorcamp.firebasestorage.app",
      messagingSenderId: "709693825585",
      appId: "1:709693825585:web:eced280b0538cdc29bab10",
      measurementId: "G-L68VBJR8W2"
    };

    const APP_DOC = 'camping-main-v1';
    const APP_VERSION = '39.4';
    const ADMIN_PASSWORD = 'admin123';
    const tabs = [
      {key:'social',label:'社群媒體'},

    async function uploadFile(file, folder, onProgress){
      if(!file) return null;

      // 備援：直接使用本地 object URL，避免長時間卡在上傳中
      const localFallback = () => {
        try { return URL.createObjectURL(file); }
        catch { return null; }
      };

      if(!storage){
        if(onProgress) onProgress(100);
        return localFallback();
      }

      try{
        const safeName = `${Date.now()}-${(file.name||'upload').replace(/\s+/g,'-')}`;
        const ref = storage.ref().child(`${folder}/${safeName}`);

        // 上傳逾時保護：12 秒內沒完成就走備援，避免 UI 無限卡住
        const timeoutMs = 12000;
        const putTask = ref.put(file);
        putTask.on('state_changed', snap => {
          if(!onProgress) return;
          const total = snap.totalBytes || 1;
          const percent = Math.min(99, Math.floor((snap.bytesTransferred / total) * 100));
          onProgress(percent);
        });

        await Promise.race([
          putTask,
          new Promise((_, reject)=>setTimeout(()=>reject(new Error('upload-timeout')), timeoutMs))
        ]);

        const url = await Promise.race([
          ref.getDownloadURL(),
          new Promise((_, reject)=>setTimeout(()=>reject(new Error('url-timeout')), timeoutMs))
        ]);

        if(onProgress) onProgress(100);
        return url || localFallback();
      }catch(e){
        console.warn('upload fallback',e);
        if(onProgress) onProgress(100);
        return localFallback();
      }
    }

    function getVoteKey(){
      const now = new Date();
      // 12:10 刷新，00:00~12:09 算前一日配額
      if(now.getHours() < 12 || (now.getHours()===12 && now.getMinutes()<10)) now.setDate(now.getDate()-1);
      const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
      return `vote-${state.user.id}-${y}${m}${d}`;
    }

    async function submitPost(){
      if(!isMember()){ alert('請先登入會員'); return; }
      const text=(document.getElementById('postText').value||'').trim();
      const fileInput=document.getElementById('postFile');
      const file=fileInput && fileInput.files ? (fileInput.files[0] || null) : null;
      const submitBtn=document.getElementById('postSubmitBtn');
      const oldLabel=submitBtn ? submitBtn.textContent : '';

      if(postMode==='contest' && !file){ alert('請先選擇照片再投稿'); return; }
      if(!text && !file){ alert('請輸入內容或選擇檔案'); return; }

      const type = detectMediaType(file);
      if(postMode==='contest' && type!=='image'){
        alert('照片比賽僅接受圖片檔（jpg/png/heic 等）');
        return;
      }

      try{
        if(submitBtn){ submitBtn.disabled=true; submitBtn.textContent='上傳中...'; }
        if(file) setUploadProgress(0); else resetUploadProgress();
        const url = file ? await uploadFile(file, postMode==='contest'?'contest':'posts', setUploadProgress) : null;
        if(file && !url){
          alert('檔案上傳失敗，請重試');
          return;
        }

        if(postMode==='contest'){
          state.contestEntries.unshift({id:uid(),authorId:state.user.id,authorName:state.user.name,imageUrl:url,voteCount:0,createdAt:new Date().toISOString()});
          await saveState();
          renderContestBanner();
          closePostModal();
          openContestModal();
          showToast('投稿成功 ✅');
        }else{
          state.posts.unshift({id:uid(),authorId:state.user.id,authorName:state.user.name,text,mediaType:type,mediaUrl:url,likes:[],comments:[],createdAt:new Date().toISOString()});
          await saveState();
          renderFeed();
          closePostModal();
          showToast('貼文發佈成功 ✅');
        }

        document.getElementById('postText').value='';
        if(fileInput) fileInput.value='';
      }catch(err){
        console.error(err);
        alert('發布失敗，請稍後再試');
      }finally{
        if(submitBtn){ submitBtn.disabled=false; submitBtn.textContent=oldLabel || '發佈'; }
        resetUploadProgress();
      }
    }

      el.style.display = el.style.display==='none'?'block':'none';
    }

    function commentPost(id){
      if(!canComment()) return alert('訪客不可評論');
      const i=document.getElementById('pci-'+id); const txt=(i.value||'').trim(); if(!txt) return;
      const p=state.posts.find(x=>x.id===id); if(!p) return;
      p.comments.push({userId:state.user.id,userName:state.user.name,text:txt,createdAt:new Date().toISOString()});
      i.value=''; renderFeed(); saveState();
    }

    function replyStoreComment(storeId, targetName){
      if(!(isMerchant() && currentMerchantAccount && currentMerchantAccount.storeId===storeId)) return;
      const i=document.getElementById('sc-'+storeId);
      if(!i) return;
      i.value = `@${targetName} `;
      i.focus();
    }

    function merchantReplyFromBackend(storeId, commentIndex){
      if(!(isMerchant() && currentMerchantAccount && currentMerchantAccount.storeId===storeId)) return alert('僅可回覆自己商家評論');
      const input = document.getElementById(`mr-${commentIndex}`);
      const text = (input?.value||'').trim();
      if(!text) return;
      const store = state.stores.find(s=>s.id===storeId);
      if(!store) return;
      store.comments = store.comments || [];
      const c = store.comments[commentIndex];
      if(!c) return;
      c.replies = c.replies || [];
      c.replies.push({userId:state.user.id,userName:state.user.name,text,createdAt:new Date().toISOString()});
      saveState();
      renderStoreTabs();
      renderMerchantEditor(currentMerchantAccount);
      showToast('已回覆評論 ✅');
    }

    function commentStore(id){
      if(!canComment()) return alert('訪客不可評論');
      const i=document.getElementById('sc-'+id); const txt=(i.value||'').trim(); if(!txt) return;
      const s=state.stores.find(x=>x.id===id); if(!s) return;
      if(isMerchant() && currentMerchantAccount && currentMerchantAccount.storeId !== id){
        return alert('商家模式僅可回覆自己商家的訊息');
      }
      s.comments=s.comments||[];
      if(isMerchant() && currentMerchantAccount && currentMerchantAccount.storeId===id && txt.startsWith('@')){
        const m = txt.match(/^@(\S+)\s+(.*)$/);
        if(m){
          const targetName = m[1];
          const body = (m[2]||'').trim();
          const target = [...s.comments].reverse().find(c=>c.userName===targetName);
          if(target && body){
            target.replies = target.replies || [];
            target.replies.push({userId:state.user.id,userName:state.user.name,text:body,createdAt:new Date().toISOString()});
            i.value=''; renderStoreTabs(); saveState();
            return;
          }
        }
      }
      s.comments.push({userId:state.user.id,userName:state.user.name,text:txt,createdAt:new Date().toISOString()});
      i.value=''; renderStoreTabs(); saveState();
    }

    function openContestModal(){ document.getElementById('contestModal').style.display='flex'; renderContestModal(); }
    function closeContestModal(){ document.getElementById('contestModal').style.display='none'; }

    function voteContest(entryId){
      if(!isMember()) return alert('訪客不可投票');
      const v=voteState(); v.count=v.count||0; v.voted=v.voted||[];
      if(v.voted.includes(entryId)) return alert('不可重複投同一作品');
      if(v.count>=2) return alert('今日票數已用完（每天2票）');
      const e=state.contestEntries.find(x=>x.id===entryId); if(!e) return;
      e.voteCount=(e.voteCount||0)+1;
      v.count+=1; v.voted.push(entryId); setVoteState(v);
      renderContestModal(); renderContestBanner(); saveState();
    }

    function contactStore(storeId){
      if(!isMember()) return alert('請先登入會員再私訊');
      const s=state.stores.find(x=>x.id===storeId); if(!s) return;
      let t=state.dmThreads.find(x=>x.storeId===storeId && Array.isArray(x.participantIds) && x.participantIds.includes(state.user.id));
      if(!t){
        t={id:uid(),storeId,storeName:s.name,messages:[],participantIds:[state.user.id,`store:${storeId}`]};
        state.dmThreads.push(t);
      } else if(!Array.isArray(t.participantIds)) {
        t.participantIds=[state.user.id,`store:${storeId}`];
      }
      openDM(); openThread(t.id);
    }

    function openDM(){
      if(!canMessage()){
        alert('請先登入才能查看私訊');
        openLoginModal();
        return;
      }
      document.getElementById('dmModal').style.display='flex';
      renderDM();
      showToast('已進入私訊頁');
    }
    function closeDM(){ document.getElementById('dmModal').style.display='none'; }
    function sendDM(){
      if(!canMessage()) return;
      const txt=(document.getElementById('dmInput').value||'').trim(); if(!txt) return;
      const t=state.dmThreads.find(x=>x.id===currentDMStore); if(!t) return;
      if(Array.isArray(t.participantIds) && !t.participantIds.includes(state.user.id)) return;
      t.messages.push({fromId:state.user.id,fromName:state.user.name,text:txt,createdAt:new Date().toISOString()});
      openThread(t.id); saveState();
    }


    function addMerchantAnnouncement(){
      if(!currentMerchantAccount) return alert('請先登入商家後台');
      const store = state.stores.find(s=>s.id===currentMerchantAccount.storeId);
      if(!store) return alert('找不到商家資料');
      const title = (document.getElementById('ma-title')?.value || '').trim();
      const detail = (document.getElementById('ma-detail')?.value || '').trim();
      if(!title || !detail) return alert('請填寫活動標題與詳情');

      const now = new Date();
      const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      const used = state.announcements.filter(a=>a.merchantId===currentMerchantAccount.merchantId && (a.createdAt||'').slice(0,7)===ym).length;
      if(used >= 2) return alert('本月已達 2 則上限');

      state.announcements.unshift({
        id: uid(),
        title,
        detail,
        text: title,
        merchantId: currentMerchantAccount.merchantId,
        merchantName: store.name,
        storeId: store.id,
        storeCategory: store.category,
        createdAt: new Date().toISOString()
      });
      document.getElementById('ma-title').value='';
      document.getElementById('ma-detail').value='';
      renderAnnouncements();
      saveState();
      showToast('活動跑馬燈新增成功 ✅');
    }

    function saveMerchantStore(storeId){
      const s=state.stores.find(x=>x.id===storeId); if(!s) return;
      s.description=document.getElementById('me-desc').value.trim();
      s.address=document.getElementById('me-addr').value.trim();
      s.hours=document.getElementById('me-hours').value.trim();
      s.contact=document.getElementById('me-contact').value.trim();
      const modelsEl=document.getElementById('me-models');
      if(modelsEl) s.specialModels=modelsEl.value.trim();
      const rentalTypesEl=document.getElementById('me-rental-types');
      if(rentalTypesEl) s.vehicleTypes=rentalTypesEl.value.trim();
      const pickupEl=document.getElementById('me-pickup');
      if(pickupEl) s.pickupLocation=pickupEl.value.trim();
      s.website=document.getElementById('me-web').value.trim();
      saveState();
      renderStoreTabs();
      showToast('商家資料已儲存 ✅');
    }

    function addAnnouncement(){
      const t=document.getElementById('ad-ann').value.trim(); if(!t) return;
      state.announcements.unshift({id:uid(),text:t});
      document.getElementById('ad-ann').value=''; renderAnnouncements(); saveState();
    }

    function addStoreByAdmin(){
      const cat=document.getElementById('ad-cat').value;
      const s={
        id:uid(),
        category:cat,
        name:document.getElementById('ad-name').value.trim(),
        address:document.getElementById('ad-addr').value.trim(),
        hours:document.getElementById('ad-hours').value.trim(),
        contact:document.getElementById('ad-contact').value.trim(),
        specialModels: cat==='mod' ? document.getElementById('ad-models').value.trim() : undefined,
        vehicleTypes: cat==='rental' ? document.getElementById('ad-rental-types').value.trim() : undefined,
        pickupLocation: cat==='rental' ? document.getElementById('ad-pickup').value.trim() : undefined,
        description:document.getElementById('ad-desc').value.trim(),
        isMember:false
      };
      if(!s.name) return alert('請輸入店名');
      state.stores.unshift(s);
      renderStoreTabs(); saveState(); alert('已新增商家');
    }

    function createMerchantAccount(){
      const merchantId=document.getElementById('ad-mid').value.trim();
      const password=document.getElementById('ad-mpw').value.trim();
      const storeId=document.getElementById('ad-sid').value.trim();
      if(!merchantId||!password||!storeId) return alert('請填完整');
      const store=state.stores.find(s=>s.id===storeId); if(!store) return alert('找不到店鋪ID');
      state.merchantAccounts.push({merchantId,password,storeId,enabled:true});
      store.isMember=true; store.ownerMerchantId=merchantId;
      saveState(); alert('已開通商家會員帳號');
    }

    function exportAllData(){
      const payload = {
        exportedAt: new Date().toISOString(),
        appDoc: APP_DOC,
        announcements: state.announcements,
        posts: state.posts,
        contestEntries: state.contestEntries,
        stores: state.stores,
        merchantAccounts: state.merchantAccounts,
        memberAccounts: state.memberAccounts,
        adminAccount: state.adminAccount,
        dmThreads: state.dmThreads
      };
      const text = JSON.stringify(payload, null, 2);
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date();
      const tag = `${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}-${String(ts.getHours()).padStart(2,'0')}${String(ts.getMinutes()).padStart(2,'0')}`;
      a.href = url;
      a.download = `camping-data-export-${tag}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('資料已匯出 ✅');
    }

    function renderBottomNav(){
      const campBtn=document.getElementById('bn-campsite');
      if(campBtn) campBtn.classList.toggle('active', state.activeTab==='campsite');
    }
    function goCampsite(){
      setTab('campsite');
    }

    function renderAll(){
      renderUser();
      renderTabs();
      renderAnnouncements();
      renderContestBanner();
      renderFeed();
      renderStoreTabs();
      renderDM();
      renderBottomNav();
    }

    async function boot(){
      await initFirebase();
      await loadState();
      renderAll();
      bindLoginModalKeys();
      document.getElementById('campSearch').addEventListener('input', renderStoreTabs);
      document.addEventListener('click', (e)=>{
        const m=document.getElementById('userMenu');
        const b=document.getElementById('userEntry');
        if(!m||!b) return;
        if(m.style.display==='block' && !m.contains(e.target) && !b.contains(e.target)) closeUserMenu();
      });
    }
    boot();
  </script>
</body>
</html>
