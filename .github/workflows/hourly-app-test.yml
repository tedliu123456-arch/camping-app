name: Hourly App Test & UI Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run hourly smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Auto open/update optimization checklist issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = '🛠️ 每小時優化清單（自動）';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();

            const body = [
              '此清單由每小時測試流程自動更新。',
              '',
              `- 最近執行時間：${now}`,
              `- 測試執行：${runUrl}`,
              '',
              '### 優化待辦（可持續迭代）',
              '- [ ] 檢查社群首頁載入與貼文互動速度',
              '- [ ] 檢查「會員照片比賽」投稿流程與投票規則',
              '- [ ] 檢查四大分類頁（露營區/用品/改裝/出租）資料完整度',
              '- [ ] 檢查手機版 UI（按鈕、間距、可讀性）',
              '- [ ] 修正本輪測試失敗項目（若有）',
              '',
              '> 這是持續優化用的工作清單，完成項目可手動勾選。'
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
              core.info(`Created issue #${created.data.number}`);
            }
