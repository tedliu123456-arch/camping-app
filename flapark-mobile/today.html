<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLAPark 今日數據 | <span id="date"></span></title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header .date { opacity: 0.9; font-size: 16px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 25px; }
    .stat-card { background: #f8f9ff; border-radius: 15px; padding: 20px; text-align: center; }
    .stat-card .value { font-size: 36px; font-weight: bold; color: #667eea; }
    .stat-card .label { font-size: 14px; color: #666; margin-top: 5px; }
    .stat-card.highlight { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .stat-card.highlight .value { color: white; }
    .stat-card.highlight .label { color: rgba(255,255,255,0.8); }
    .section { padding: 0 25px 25px; }
    .age-dist { background: #f8f9ff; border-radius: 15px; padding: 20px; }
    .age-dist h3 { font-size: 16px; color: #333; margin-bottom: 15px; }
    .age-bar { display: flex; height: 30px; border-radius: 15px; overflow: hidden; background: #e0e0e0; }
    .age-bar span { display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
    .age-0-2 { background: #ff6b6b; width: 0%; }
    .age-3-5 { background: #ffd93d; width: 0%; }
    .age-6-8 { background: #6bcb77; width: 100%; }
    .age-9plus { background: #4d96ff; width: 0%; }
    .age-labels { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #666; }
    .chart-container { padding: 0 25px 25px; }
    .chart-box { background: #f8f9ff; border-radius: 15px; padding: 20px; }
    .chart-box h3 { font-size: 16px; color: #333; margin-bottom: 15px; }
    .hours-chart { display: flex; align-items: flex-end; height: 100px; gap: 8px; }
    .hours-chart .hour-bar { flex: 1; background: linear-gradient(to top, #667eea, #764ba2); border-radius: 5px 5px 0 0; position: relative; }
    .hours-chart .hour-bar:hover { opacity: 0.8; }
    .hours-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: #999; }
    .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
    .new-old { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 25px 25px; }
    .visitor-tag { background: #f8f9ff; border-radius: 15px; padding: 15px; text-align: center; }
    .visitor-tag.new { border: 2px solid #667eea; }
    .visitor-tag.old { border: 2px solid #764ba2; }
    .visitor-tag .value { font-size: 24px; font-weight: bold; }
    .visitor-tag.new .value { color: #667eea; }
    .visitor-tag.old .value { color: #764ba2; }
    .visitor-tag .label { font-size: 12px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏕️ FLAPark 今日分析</h1>
      <div class="date">2026-06-04</div>
    </div>
    
    <div class="stats">
      <div class="stat-card highlight">
        <div class="value">2</div>
        <div class="label">入園筆數</div>
      </div>
      <div class="stat-card">
        <div class="value">2</div>
        <div class="label">大人數量</div>
      </div>
      <div class="stat-card">
        <div class="value">2</div>
        <div class="label">孩童總數</div>
      </div>
      <div class="stat-card">
        <div class="value">1</div>
        <div class="label">目前在園</div>
      </div>
    </div>

    <div class="new-old">
      <div class="visitor-tag new">
        <div class="value">0</div>
        <div class="label">新客</div>
      </div>
      <div class="visitor-tag old">
        <div class="value">2</div>
        <div class="label">舊客</div>
      </div>
    </div>

    <div class="section">
      <div class="age-dist">
        <h3>年齡分布</h3>
        <div class="age-bar">
          <span class="age-0-2" style="width:0%">0%</span>
          <span class="age-3-5" style="width:0%">0%</span>
          <span class="age-6-8" style="width:100%">100%</span>
          <span class="age-9plus" style="width:0%">0%</span>
        </div>
        <div class="age-labels">
          <span>0-2 歲</span>
          <span>3-5 歲</span>
          <span>6-8 歲</span>
          <span>9+ 歲</span>
        </div>
      </div>
    </div>

    <div class="chart-container">
      <div class="chart-box">
        <h3>入園時段</h3>
        <div class="hours-chart">
          <div class="hour-bar" style="height:50%" title="12:00 - 1筆"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:50%" title="14:00 - 1筆"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
          <div class="hour-bar" style="height:0%"></div>
        </div>
        <div class="hours-labels">
          <span>10:00</span>
          <span>12:00</span>
          <span>14:00</span>
          <span>16:00</span>
          <span>18:00</span>
        </div>
      </div>
    </div>

    <div class="footer">
      更新时间: 2026-06-04 18:00 | 数据来源: FLAPark 管理后台
    </div>
  </div>
</body>
</html>
