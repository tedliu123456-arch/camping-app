<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Room Art Draft (2.5D)</title>
  <style>
    body{margin:0;background:#1a1714;color:#f3e6d0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
    .wrap{max-width:1200px;margin:0 auto;padding:18px}
    h1{font-size:20px;margin:0 0 10px}
    .stage{background:linear-gradient(180deg,#2a241f,#1a1714);border:1px solid #5a4a3a;border-radius:14px;padding:14px}
    svg{width:100%;height:auto;display:block}
    .note{margin-top:10px;color:#cbb79b;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🦞 OpenClaw 控制室｜純畫風版（2.5D 等角）</h1>
    <div class="stage">
      <svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="floor" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#7a6148"/><stop offset="100%" stop-color="#5c4735"/>
          </linearGradient>
        </defs>

        <!-- floor -->
        <polygon points="130,150 1020,150 1130,360 240,360" fill="url(#floor)" stroke="#8b7258" stroke-width="3"/>

        <!-- rooms (2.5D blocks) -->
        <!-- idle -->
        <g>
          <polygon points="170,180 350,180 380,235 200,235" fill="#a78663"/>
          <polygon points="170,180 200,235 200,320 170,265" fill="#87674d"/>
          <polygon points="350,180 380,235 380,320 350,265" fill="#6f543f"/>
          <rect x="200" y="235" width="180" height="85" fill="#f3e5cf" stroke="#8e745a" stroke-width="3"/>
          <text x="215" y="258" fill="#4d3929" font-size="16" font-weight="700">待機室</text>
        </g>

        <!-- work -->
        <g>
          <polygon points="430,180 630,180 660,238 460,238" fill="#a78663"/>
          <polygon points="430,180 460,238 460,330 430,272" fill="#87674d"/>
          <polygon points="630,180 660,238 660,330 630,272" fill="#6f543f"/>
          <rect x="460" y="238" width="200" height="92" fill="#f3e5cf" stroke="#8e745a" stroke-width="3"/>
          <text x="478" y="262" fill="#4d3929" font-size="16" font-weight="700">工作室</text>
        </g>

        <!-- search -->
        <g>
          <polygon points="710,175 910,175 940,232 740,232" fill="#a78663"/>
          <polygon points="710,175 740,232 740,322 710,265" fill="#87674d"/>
          <polygon points="910,175 940,232 940,322 910,265" fill="#6f543f"/>
          <rect x="740" y="232" width="200" height="90" fill="#f3e5cf" stroke="#8e745a" stroke-width="3"/>
          <text x="758" y="255" fill="#4d3929" font-size="16" font-weight="700">搜尋室</text>
        </g>

        <!-- code -->
        <g>
          <polygon points="310,395 550,395 590,470 350,470" fill="#a78663"/>
          <polygon points="310,395 350,470 350,600 310,525" fill="#87674d"/>
          <polygon points="550,395 590,470 590,600 550,525" fill="#6f543f"/>
          <rect x="350" y="470" width="240" height="130" fill="#f3e5cf" stroke="#8e745a" stroke-width="3"/>
          <text x="370" y="500" fill="#4d3929" font-size="16" font-weight="700">開發室</text>
        </g>

        <!-- schedule -->
        <g>
          <polygon points="640,390 930,390 970,468 680,468" fill="#a78663"/>
          <polygon points="640,390 680,468 680,612 640,534" fill="#87674d"/>
          <polygon points="930,390 970,468 970,612 930,534" fill="#6f543f"/>
          <rect x="680" y="468" width="290" height="144" fill="#f3e5cf" stroke="#8e745a" stroke-width="3"/>
          <text x="700" y="500" fill="#4d3929" font-size="16" font-weight="700">排程室</text>
        </g>

        <!-- furniture hints -->
        <rect x="245" y="278" width="95" height="30" fill="#8a3f3f" stroke="#5f2828" stroke-width="3" rx="4"/>
        <rect x="270" y="252" width="46" height="22" fill="#333" stroke="#111" stroke-width="3"/>

        <rect x="515" y="286" width="95" height="26" fill="#9b7754" stroke="#6f543f" stroke-width="3"/>
        <rect x="540" y="264" width="44" height="20" fill="#1f2a3b" stroke="#101722" stroke-width="3"/>

        <rect x="810" y="258" width="38" height="58" fill="#8f877b" stroke="#6f695f" stroke-width="3"/>
        <rect x="860" y="278" width="30" height="16" fill="#eadfcf" stroke="#b9aa95" stroke-width="2"/>

        <rect x="420" y="545" width="88" height="38" fill="#1f2430" stroke="#0f1218" stroke-width="3"/>
        <rect x="735" y="540" width="110" height="62" fill="#e7dbc7" stroke="#ad9578" stroke-width="3"/>

        <!-- lobster sprite -->
        <g transform="translate(255 430)">
          <ellipse cx="0" cy="40" rx="34" ry="8" fill="#0006"/>
          <rect x="-24" y="-4" width="48" height="34" rx="10" fill="#f4875a" stroke="#7a2e19" stroke-width="3"/>
          <rect x="-16" y="-16" width="32" height="16" rx="7" fill="#ffb085" stroke="#934126" stroke-width="3"/>
          <circle cx="-6" cy="-6" r="3" fill="#111"/><circle cx="6" cy="-6" r="3" fill="#111"/>
          <rect x="-38" y="6" width="14" height="12" rx="4" fill="#de5d39" stroke="#7a2e19" stroke-width="2"/>
          <rect x="24" y="6" width="14" height="12" rx="4" fill="#de5d39" stroke="#7a2e19" stroke-width="2"/>
        </g>
      </svg>
    </div>
    <div class="note">純畫風驗收稿：先確認視覺方向，確認後我再加上互動移動與房間點擊資訊。</div>
  </div>
</body>
</html>
